<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>New Letter · Our World</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{font-family:sans-serif;background:#f2ede6;padding:40px;color:#1e2d4a;}
textarea{width:100%;height:120px;margin-top:10px;}
button{padding:10px 20px;margin-top:10px;}
#nb{display:none;background:#fff;padding:10px;margin-bottom:20px;border:1px solid #ccc;}
</style>
</head>

<body>

<h2>New Letter</h2>

<div id="nb" onclick="window.location.href='postbox.html'">
  <b id="nt">New message</b>
</div>

<textarea id="msg" placeholder="Write something..."></textarea>
<br>
<button onclick="sendMsg()">Send</button>

<p id="sn"></p>

<script>
const user = localStorage.getItem("user");
if(!user) window.location.href="index.html";

document.getElementById("sn").innerText = "Writing as: " + user;

/* SUPABASE CONNECTION */
const supabase = window.supabase.createClient(
  "https://zxcukkzokvhhqiczeeac.supabase.co",
  "sb_publishable_ZQSdEDnFEunf6b922ApaFA_jscwAbQD"
);

/* SEND MESSAGE */
async function sendMsg(){
  const text = document.getElementById("msg").value.trim();
  if(!text) return;

  let { error } = await supabase.from("messages").insert([
    {
      text: text,
      sender: user
    }
  ]);

  if(error){
    console.log(error);
    alert("Error sending message");
    return;
  }

  document.getElementById("msg").value = "";
  alert("Letter sent ♥");
}

/* CHECK NEW MESSAGE */
async function checkN(){
  let { data, error } = await supabase
    .from("messages")
    .select("*")
    .order("created_at", { ascending: true });

  if(error) return;

  const box = document.getElementById("nb");

  if(!data || data.length === 0){
    box.style.display = "none";
    return;
  }

  const last = data[data.length - 1];

  if(last.sender !== user){
    box.style.display = "block";
    document.getElementById("nt").innerText =
      last.sender + " sent you a letter";
  } else {
    box.style.display = "none";
  }
}

checkN();
setInterval(checkN, 4000);
</script>

</body>
</html>
