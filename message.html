<!DOCTYPE html>
<html>
<head>
<title>Message Room</title>
</head>

<body style="background:#0f172a;color:white;font-family:sans-serif;padding:20px;">

<h2>Message Room</h2>

<h3>PostBox</h3>
<div id="latest" style="background:#1e293b;padding:15px;border-radius:10px;margin-bottom:20px;">
No message yet
</div>

<textarea id="msg" placeholder="Write message..." style="width:100%;height:80px;"></textarea><br><br>

<button onclick="sendMessage()">Send</button>

<h3 style="margin-top:30px;">All Messages</h3>
<div id="history" style="background:#1e293b;padding:15px;border-radius:10px;max-height:300px;overflow:auto;">
No messages yet
</div>

<br>
<button onclick="window.location.href='home.html'">Back</button>

<script>
let user = localStorage.getItem("user");

// Load messages
function loadMessages(){
  let messages = JSON.parse(localStorage.getItem("allMessages")) || [];

  let historyDiv = document.getElementById("history");
  let latestDiv = document.getElementById("latest");

  if(messages.length === 0){
    historyDiv.innerHTML = "No messages yet";
    latestDiv.innerHTML = "No message yet";
    return;
  }

  let html = "";

  messages.forEach(m => {
    html += "<div style='margin-bottom:10px;padding:10px;background:#334155;border-radius:8px'>" +
            "<b>" + m.sender + "</b><br>" +
            m.text + "<br>" +
            "<small>" + m.time + "</small>" +
            "</div>";
  });

  historyDiv.innerHTML = html;

  let last = messages[messages.length - 1];
  latestDiv.innerHTML =
    "<b>" + last.sender + "</b><br>" +
    last.text + "<br><small>" + last.time + "</small>";
}

// Send message
function sendMessage(){
  let text = document.getElementById("msg").value.trim();
  if(text === "") return;

  let messages = JSON.parse(localStorage.getItem("allMessages")) || [];

  messages.push({
    sender: user,
    text: text,
    time: new Date().toLocaleString()
  });

  localStorage.setItem("allMessages", JSON.stringify(messages));

  document.getElementById("msg").value = "";

  loadMessages();
}

loadMessages();
</script>

</body>
</html>
