<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Letter · Our World</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Lato:wght@300;400;700&family=Dancing+Script:wght@500;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{--bg:#160808;--surface:#1e0d0d;--surface2:#261010;--blush:#e8b4b8;--rose:#c97b84;--deep-rose:#8b3a42;--cream:#f5ede4;--cream2:#ede0d4;--text:#f0e4dc;--muted:#8a6a68;--border:rgba(232,180,184,0.15);--glow:rgba(201,123,132,0.13);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
.bg-warm{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 70% 60% at 50% 110%,rgba(100,30,30,.5) 0%,transparent 65%),radial-gradient(ellipse 50% 40% at 0% 0%,rgba(60,18,18,.3) 0%,transparent 55%);}
.candle-glow{position:fixed;bottom:-80px;left:50%;transform:translateX(-50%);width:700px;height:350px;background:radial-gradient(ellipse,rgba(255,110,40,.08) 0%,rgba(180,50,20,.04) 45%,transparent 70%);border-radius:50%;animation:flicker 4s ease-in-out infinite alternate;z-index:0;pointer-events:none;}
@keyframes flicker{0%{transform:translateX(-50%) scale(1);opacity:.8;}40%{transform:translateX(-50%) scaleX(1.04) scaleY(.97);opacity:1;}70%{transform:translateX(-50%) scaleX(.98) scaleY(1.02);opacity:.85;}100%{transform:translateX(-50%) scaleX(1.02) scaleY(.99);opacity:.9;}}
.page{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:22px 52px;border-bottom:1px solid var(--border);flex-shrink:0;}
.brand{display:flex;align-items:center;gap:12px;}
.brand-heart{font-size:18px;animation:heartbeat 2.8s ease-in-out infinite;filter:drop-shadow(0 0 7px rgba(200,100,100,.4));}
@keyframes heartbeat{0%,100%{transform:scale(1);}14%{transform:scale(1.18);}28%{transform:scale(1);}42%{transform:scale(1.1);}56%{transform:scale(1);}}
.brand-name{font-family:'Dancing Script',cursive;font-size:20px;color:var(--blush);opacity:.8;}
.back-btn{font-size:11px;letter-spacing:.12em;color:var(--muted);background:transparent;border:1px solid rgba(138,106,104,.3);border-radius:2px;padding:7px 16px;cursor:pointer;transition:all .25s;text-transform:uppercase;font-family:'Lato',sans-serif;}
.back-btn:hover{color:var(--blush);border-color:var(--border);}

/* MAIN */
.main{flex:1;display:flex;align-items:stretch;}
.compose{flex:1;padding:52px 60px;display:flex;flex-direction:column;max-width:680px;margin:0 auto;width:100%;}

.pre{font-family:'Dancing Script',cursive;font-size:17px;color:var(--rose);opacity:.6;margin-bottom:6px;}
.title{font-family:'Playfair Display',serif;font-size:36px;font-weight:400;color:var(--cream);margin-bottom:8px;line-height:1.15;}
.title em{font-style:italic;color:var(--blush);}
.subtitle{font-size:13px;font-style:italic;color:var(--muted);margin-bottom:36px;line-height:1.65;letter-spacing:.04em;}

/* Notif banner */
.notif-banner{display:none;align-items:center;gap:12px;background:linear-gradient(135deg,rgba(180,80,80,.1),rgba(140,50,50,.06));border:1px solid rgba(201,123,132,.22);border-left:3px solid var(--rose);border-radius:2px;padding:14px 16px;margin-bottom:28px;cursor:pointer;transition:background .3s;animation:notifSlide .5s ease both;}
.notif-banner:hover{background:linear-gradient(135deg,rgba(180,80,80,.16),rgba(140,50,50,.1));}
.notif-banner.show{display:flex;}
@keyframes notifSlide{from{opacity:0;transform:translateX(-12px);}to{opacity:1;transform:none;}}
.notif-icon{font-size:22px;animation:swing 2.5s ease-in-out infinite;flex-shrink:0;}
@keyframes swing{0%,100%{transform:rotate(-10deg);}50%{transform:rotate(10deg);}}
.notif-title{font-family:'Playfair Display',serif;font-size:14px;font-style:italic;color:var(--blush);margin-bottom:2px;}
.notif-sub{font-size:11px;color:var(--muted);letter-spacing:.04em;}

/* Paper writing area */
.paper-wrap{flex:1;display:flex;flex-direction:column;position:relative;}
.paper-label{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.paper{flex:1;min-height:220px;background:rgba(255,240,235,.03);border:none;border-bottom:1px solid rgba(232,180,184,.2);padding:16px 4px;font-family:'Playfair Display',serif;font-size:18px;color:var(--cream);line-height:1.9;resize:none;outline:none;letter-spacing:.02em;transition:border-color .3s,background .3s;}
.paper::placeholder{color:var(--muted);font-style:italic;}
.paper:focus{border-bottom-color:var(--rose);background:rgba(201,123,132,.03);}
.paper-footer{display:flex;align-items:center;justify-content:space-between;margin-top:16px;}
#cc{font-size:11px;color:var(--muted);}
.send-btn{font-family:'Playfair Display',serif;font-size:15px;font-style:italic;color:var(--blush);background:transparent;border:1px solid var(--rose);border-radius:2px;padding:12px 32px;cursor:pointer;position:relative;overflow:hidden;transition:color .35s,box-shadow .35s;letter-spacing:.04em;}
.send-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(201,123,132,.18),rgba(139,58,66,.1));transform:translateX(-101%);transition:transform .35s cubic-bezier(.22,1,.36,1);}
.send-btn:hover{color:var(--cream);box-shadow:0 0 20px rgba(201,123,132,.2);}
.send-btn:hover::before{transform:translateX(0);}
.send-btn span{position:relative;z-index:1;}
.sending-as{margin-top:20px;padding-top:18px;border-top:1px solid var(--border);font-family:'Dancing Script',cursive;font-size:15px;color:var(--muted);display:flex;align-items:center;gap:8px;}
.sender-heart{color:var(--rose);opacity:.6;font-size:13px;}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(22,8,8,.95);border:1px solid rgba(201,123,132,.22);border-radius:2px;padding:10px 28px;font-family:'Dancing Script',cursive;font-size:15px;color:var(--blush);opacity:0;transition:all .3s ease;z-index:100;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:none;}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="bg-warm"></div>
<div class="candle-glow"></div>
<div class="page">
<header class="header">
  <div class="brand"><span class="brand-heart">🌹</span><span class="brand-name">New Letter</span></div>
  <button class="back-btn" onclick="goHome()">← Home</button>
</header>
<div class="main">
<div class="compose" style="animation:fadeUp .8s ease .1s both">
  <div class="pre">write something beautiful</div>
  <div class="title">A New <em>Letter</em></div>
  <p class="subtitle">Words are the closest thing to magic.<br>Write yours here, sealed and sent with love.</p>

  <div class="notif-banner" id="notif-banner" onclick="window.location.href='postbox.html'">
    <span class="notif-icon">💌</span>
    <div>
      <div class="notif-title" id="notif-title">A letter arrived for you</div>
      <div class="notif-sub">go to postbox to read ♥</div>
    </div>
  </div>

  <div class="paper-wrap">
    <div class="paper-label">Your words</div>
    <textarea class="paper" id="msg" placeholder="My love, today I wanted to tell you..." maxlength="800"></textarea>
    <div class="paper-footer">
      <span id="cc">0 / 800</span>
      <button class="send-btn" onclick="sendMsg()"><span>Send with love ♥</span></button>
    </div>
  </div>

  <div class="sending-as">
    <span class="sender-heart">♥</span>
    writing as <strong style="color:var(--blush);margin-left:4px;" id="sname">—</strong>
  </div>
</div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
(function(){const c=document.getElementById('c'),ctx=c.getContext('2d');let W,H;function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}resize();window.addEventListener('resize',resize);const S=['❤','♥','·','·','✿','·'],ps=[];for(let i=0;i<45;i++)ps.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight+window.innerHeight,sym:S[Math.floor(Math.random()*S.length)],size:Math.random()*8+4,speed:Math.random()*.4+.15,drift:(Math.random()-.5)*.3,alpha:Math.random()*.18+.04,rot:Math.random()*Math.PI*2,rotSpeed:(Math.random()-.5)*.01,phase:Math.random()*Math.PI*2,sway:Math.random()*.5+.2});let t=0;function draw(){ctx.clearRect(0,0,W,H);t+=.01;for(const p of ps){p.y-=p.speed;p.x+=Math.sin(t*p.sway+p.phase)*p.drift;p.rot+=p.rotSpeed;if(p.y<-30){p.y=H+20;p.x=Math.random()*W;}ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.globalAlpha=p.alpha;ctx.font=p.size+'px serif';ctx.fillStyle=(p.sym==='·'||p.sym==='✿')?'rgba(240,215,205,1)':'rgba(210,120,130,1)';ctx.textAlign='center';ctx.fillText(p.sym,0,0);ctx.restore();}requestAnimationFrame(draw);}draw();})();

const user=localStorage.getItem('user');
if(!user)window.location.href='index.html';
document.getElementById('sname').textContent=user;

// Notif check
function checkNotif(){
  const msgs=JSON.parse(localStorage.getItem('msgs'))||[];
  const lastRead=parseInt(localStorage.getItem('lastRead_'+user)||'0');
  const nm=msgs.filter(m=>m.sender!==user&&m.ts>lastRead);
  const b=document.getElementById('notif-banner');
  if(nm.length>0){b.classList.add('show');document.getElementById('notif-title').textContent=nm.length===1?`${nm[nm.length-1].sender} sent you a letter ♥`:`${nm.length} new letters are waiting for you`;}
  else b.classList.remove('show');
}
checkNotif();
setInterval(checkNotif,4000);

const msgEl=document.getElementById('msg');
msgEl.addEventListener('input',()=>{const l=msgEl.value.length;const el=document.getElementById('cc');el.textContent=l+' / 800';el.style.color=l>720?'#c97a7a':'var(--muted)';});
msgEl.addEventListener('keydown',e=>{if(e.key==='Enter'&&(e.ctrlKey||e.metaKey))sendMsg();});

function sendMsg(){
  const text=msgEl.value.trim();if(!text)return;
  const msgs=JSON.parse(localStorage.getItem('msgs'))||[];
  const ts=Date.now();
  msgs.push({text,sender:user,ts,time:new Date().toLocaleString()});
  localStorage.setItem('msgs',JSON.stringify(msgs));
  localStorage.setItem('lastRead_'+user,String(ts));
  msgEl.value='';document.getElementById('cc').textContent='0 / 800';
  showToast('your letter has been sent ♥');
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function goHome(){window.location.href='home.html';}
</script>
</body>
</html>
