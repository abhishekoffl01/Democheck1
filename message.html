<!DOCTYPE html>
<html>
<head>
<title>Message Room</title>
</head>

<body style="background:#0f172a;color:white;font-family:sans-serif;padding:20px;">

<h2>Message Room</h2>

<h3>PostBox (Latest Message)</h3>
<div id="latest" style="background:#1e293b;padding:15px;border-radius:10px;margin-bottom:20px;">
No message yet
</div>

<h3>Write Message</h3>
<textarea id="msg" placeholder="Write something..." style="width:100%;height:80px;"></textarea><br><br>

<button onclick="sendMessage()">Send</button>

<h3 style="margin-top:30px;">All Messages</h3>
<div id="history" style="background:#1e293b;padding:15px;border-radius:10px;max-height:300px;overflow:auto;">
No messages yet
</div>

<br>
<button onclick="goBack()">Back</button>

<script>
let user = localStorage.getItem("user");

// Load all messages
function loadMessages(){
  let data = localStorage.getItem("allMessages");

  if(data){
    let messages = JSON.parse(data);

    let historyHTML = "";

    messages.forEach(msg => {
      historyHTML += 
        "<div style='margin-bottom:10px;padding:10px;background:#334155;border-radius:8px;'>" +
        "<b>" + msg.sender + "</b><br>" +
        msg.text + "<br>" +
        "<small>" + msg.time + "</small>" +
        "</div>";
    });

    document.getElementById("history").innerHTML = historyHTML;

    // show latest
    let last = messages[messages.length - 1];
    document.getElementById("latest").innerHTML =
      "<b>" + last.sender + "</b><br>" +
      last.text + "<br><small>" + last.time + "</small>";
  }
}

// Send message
function sendMessage(){
  let text = document.getElementById("msg").value;

  if(text.trim() === "") return;

  let message = {
    sender: user,
    text: text,
    time: new Date().toLocaleString()
  };

  let data = localStorage.getItem("allMessages");
  let messages = data ? JSON.parse(data) : [];

  messages.push(message);

  localStorage.setItem("allMessages", JSON.stringify(messages));

  document.getElementById("msg").value = "";

  loadMessages();
}

function goBack(){
  window.location.href="home.html";
}

loadMessages();
</script>

</body>
</html>
