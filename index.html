<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Room</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #070b12;
    --surface: #0d1520;
    --surface2: #111c2d;
    --border: rgba(99,179,255,0.12);
    --accent: #3b9eff;
    --accent2: #7c3dff;
    --accent-glow: rgba(59,158,255,0.25);
    --text: #e2eeff;
    --muted: #4a6280;
    --latest-bg: linear-gradient(135deg, #0d1a2e 0%, #111c38 100%);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,158,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,158,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Ambient glow orbs */
  body::after {
    content: '';
    position: fixed;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(59,158,255,0.07) 0%, transparent 70%);
    top: -100px; right: -100px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }

  .orb2 {
    position: fixed;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(124,61,255,0.06) 0%, transparent 70%);
    bottom: -80px; left: -80px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 40px 24px;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 40px;
    animation: fadeDown 0.6s ease both;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
    letter-spacing: -0.5px;
    background: linear-gradient(90deg, var(--text), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .status-dot {
    width: 6px; height: 6px;
    background: #22d97a;
    border-radius: 50%;
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,217,122,0.4); }
    50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(34,217,122,0); }
  }

  /* Latest message */
  .latest-card {
    background: var(--latest-bg);
    border: 1px solid rgba(59,158,255,0.2);
    border-radius: 18px;
    padding: 24px;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.6s ease 0.1s both;
  }

  .latest-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.5;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  #latest-text {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
    min-height: 30px;
    word-break: break-word;
  }

  #latest-text.empty {
    font-size: 15px;
    font-weight: 400;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    font-style: italic;
  }

  #latest-time {
    margin-top: 10px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* Compose area */
  .compose-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 4px;
    margin-bottom: 28px;
    animation: fadeUp 0.6s ease 0.2s both;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .compose-card:focus-within {
    border-color: rgba(59,158,255,0.4);
    box-shadow: 0 0 30px rgba(59,158,255,0.08);
  }

  #msg {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--text);
    padding: 18px 20px 12px;
    min-height: 100px;
    line-height: 1.6;
  }

  #msg::placeholder { color: var(--muted); }

  .compose-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
  }

  #char-count {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .send-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    border-radius: 10px;
    padding: 10px 22px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: all 0.25s ease;
    box-shadow: 0 4px 20px rgba(59,158,255,0.3);
  }

  .send-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(59,158,255,0.4);
  }

  .send-btn:active { transform: translateY(0); }

  .send-btn svg { transition: transform 0.25s ease; }
  .send-btn:hover svg { transform: translateX(3px); }

  /* Messages history */
  .history-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    animation: fadeUp 0.6s ease 0.3s both;
  }

  .history-header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .history-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #msg-count {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 2px 10px;
    font-size: 11px;
    color: var(--muted);
  }

  .clear-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .clear-btn:hover {
    color: #ff5a5a;
    border-color: rgba(255,90,90,0.3);
    background: rgba(255,90,90,0.06);
  }

  #history {
    max-height: 340px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  #history::-webkit-scrollbar { width: 4px; }
  #history::-webkit-scrollbar-track { background: transparent; }
  #history::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg-item {
    display: flex;
    gap: 14px;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    transition: background 0.2s;
    animation: slideIn 0.4s ease both;
  }

  .msg-item:last-child { border-bottom: none; }
  .msg-item:hover { background: var(--surface2); }

  .msg-index {
    font-size: 11px;
    color: var(--muted);
    min-width: 22px;
    padding-top: 2px;
    letter-spacing: 0.05em;
  }

  .msg-content { flex: 1; }

  .msg-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.6;
    word-break: break-word;
    margin-bottom: 6px;
  }

  .msg-time {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .empty-state {
    padding: 50px 24px;
    text-align: center;
    color: var(--muted);
  }

  .empty-state .empty-icon {
    font-size: 36px;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  .empty-state p {
    font-size: 13px;
    letter-spacing: 0.05em;
  }

  /* Back button */
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 24px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 18px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
    animation: fadeUp 0.6s ease 0.4s both;
  }

  .back-btn:hover {
    color: var(--text);
    border-color: rgba(99,179,255,0.3);
    background: var(--surface);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid rgba(34,217,122,0.3);
    border-radius: 100px;
    padding: 10px 24px;
    font-size: 12px;
    color: #22d97a;
    letter-spacing: 0.08em;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s ease;
    z-index: 100;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-12px); }
    to   { opacity: 1; transform: translateX(0); }
  }
</style>
</head>
<body>

<div class="orb2"></div>

<div class="wrapper">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">💬</div>
      <span class="logo-text">MessageRoom</span>
    </div>
    <div class="status-pill">
      <div class="status-dot"></div>
      Live
    </div>
  </header>

  <!-- Latest Message -->
  <div class="latest-card">
    <div class="section-label">Postbox · Latest</div>
    <div id="latest-text" class="empty">No message yet...</div>
    <div id="latest-time"></div>
  </div>

  <!-- Compose -->
  <div class="compose-card">
    <textarea id="msg" placeholder="Write something..." maxlength="500"></textarea>
    <div class="compose-footer">
      <span id="char-count">0 / 500</span>
      <button class="send-btn" onclick="sendMessage()">
        Send
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- History -->
  <div class="history-card">
    <div class="history-header">
      <div class="history-title">
        All Messages
        <span id="msg-count">0</span>
      </div>
      <button class="clear-btn" onclick="clearMessages()">Clear all</button>
    </div>
    <div id="history">
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <p>No messages yet</p>
      </div>
    </div>
  </div>

  <button class="back-btn" onclick="window.location.href='home.html'">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
    </svg>
    Back to Home
  </button>

</div>

<!-- Toast -->
<div class="toast" id="toast">Message sent ✓</div>

<script>
  const msgInput = document.getElementById("msg");
  const charCount = document.getElementById("char-count");

  msgInput.addEventListener("input", () => {
    const len = msgInput.value.length;
    charCount.textContent = `${len} / 500`;
    charCount.style.color = len > 450 ? '#ff5a5a' : 'var(--muted)';
  });

  msgInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) sendMessage();
  });

  function sendMessage() {
    const text = msgInput.value.trim();
    if (!text) return;

    const messages = JSON.parse(localStorage.getItem("allMessages")) || [];
    messages.push({ text, time: new Date().toLocaleString() });
    localStorage.setItem("allMessages", JSON.stringify(messages));

    msgInput.value = "";
    charCount.textContent = "0 / 500";
    loadMessages();
    showToast("Message sent ✓");
  }

  function clearMessages() {
    if (!confirm("Clear all messages?")) return;
    localStorage.removeItem("allMessages");
    loadMessages();
    showToast("Cleared ✓");
  }

  function loadMessages() {
    const messages = JSON.parse(localStorage.getItem("allMessages")) || [];
    const historyDiv = document.getElementById("history");
    const latestText = document.getElementById("latest-text");
    const latestTime = document.getElementById("latest-time");
    const countEl = document.getElementById("msg-count");

    countEl.textContent = messages.length;

    if (messages.length === 0) {
      historyDiv.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <p>No messages yet</p>
        </div>`;
      latestText.textContent = "No message yet...";
      latestText.className = "empty";
      latestTime.textContent = "";
      return;
    }

    const last = messages[messages.length - 1];
    latestText.textContent = last.text;
    latestText.className = "";
    latestTime.textContent = last.time;

    const html = [...messages].reverse().map((m, i) => `
      <div class="msg-item" style="animation-delay:${i * 0.04}s">
        <div class="msg-index">${String(messages.length - i).padStart(2, '0')}</div>
        <div class="msg-content">
          <div class="msg-text">${escapeHTML(m.text)}</div>
          <div class="msg-time">${m.time}</div>
        </div>
      </div>
    `).join('');

    historyDiv.innerHTML = html;
  }

  function escapeHTML(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg) {
    const toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 2200);
  }

  loadMessages();
</script>
</body>
</html>
