<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PostBox · Our World</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<style>
/* ROOM.CSS — paste this <style> block into message/postbox/calendar/gallery */
/* Warm wood museum room — self contained */

@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&family=Dancing+Script:wght@600;700&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{overflow-x:hidden;}
body{font-family:'Cormorant Garamond',serif;background:#0a0502;color:#2a1e0e;min-height:100vh;}

.room-wall{position:fixed;inset:0;z-index:0;will-change:transform;
  background:radial-gradient(ellipse 95% 65% at 50% 28%,#c4b490 0%,#b0a278 25%,#948a64 55%,#786e50 80%,#605840 100%);}
.room-wall::before{content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 35% 100% at 0% 50%,rgba(25,12,4,.58) 0%,transparent 65%),radial-gradient(ellipse 35% 100% at 100% 50%,rgba(25,12,4,.58) 0%,transparent 65%),radial-gradient(ellipse 100% 25% at 50% 0%,rgba(15,8,2,.68) 0%,transparent 55%),radial-gradient(ellipse 100% 18% at 50% 100%,rgba(8,4,1,.78) 0%,transparent 60%);}
.room-wall::after{content:'';position:absolute;left:0;right:0;bottom:0;height:28%;
  background:linear-gradient(to top,#3c2610 0px,#4e3218 12px,#624020 24px,#7a5230 40px,#8a6040 55%,rgba(130,90,55,.25) 100%);
  border-top:2px solid rgba(160,120,70,.38);}

.room-ceiling{position:fixed;top:0;left:0;right:0;z-index:10;height:22vh;will-change:transform;
  background:linear-gradient(to bottom,#0e0704 0%,#1c0e06 20%,#2c1a0a 45%,#3c2412 65%,rgba(60,34,14,.4) 85%,transparent 100%);}
.room-ceiling::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,rgba(0,0,0,.28) 0px,rgba(0,0,0,.28) 3px,transparent 3px,transparent calc(100%/8 - 3px),rgba(0,0,0,.18) calc(100%/8 - 3px),rgba(0,0,0,.18) calc(100%/8)),repeating-linear-gradient(0deg,transparent 0px,transparent 28px,rgba(0,0,0,.1) 28px,rgba(0,0,0,.1) 29px);}
.room-ceiling::after{content:'';position:absolute;bottom:0;left:0;right:0;height:50%;background:radial-gradient(ellipse 100% 100% at 50% 100%,rgba(255,180,80,.055) 0%,transparent 70%);}

.track-rail{position:fixed;top:22vh;left:4%;right:4%;z-index:11;height:10px;
  background:linear-gradient(to bottom,#120a04,#201408,#120a04);border-radius:5px;
  box-shadow:0 3px 10px rgba(0,0,0,.7),0 6px 20px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.03);}

.room-floor{position:fixed;bottom:0;left:0;right:0;z-index:10;height:26vh;will-change:transform;overflow:hidden;}
.fp{position:absolute;inset:0;background:repeating-linear-gradient(90deg,#5a3c18 0px,#6a4820 58px,#4e3212 58px,#5a3c18 60px,#7a5830 60px,#8a6840 118px,#5a3c18 118px,#5a3c18 120px),linear-gradient(to top,#1e0e06 0%,#3a2010 18%,#6a4828 42%,#9a7858 68%,#b89070 88%,#c8a880 100%);background-blend-mode:multiply;}
.fs2{position:absolute;inset:0;background:linear-gradient(to top,rgba(255,210,130,.1) 0%,rgba(255,220,150,.04) 35%,transparent 60%);animation:fs 7s ease-in-out infinite alternate;}
@keyframes fs{0%{opacity:.4;}100%{opacity:1;}}
.fao{position:absolute;top:0;left:0;right:0;height:45%;background:linear-gradient(to bottom,rgba(15,8,2,.42),transparent);}

.baseboard{position:fixed;bottom:26vh;left:0;right:0;z-index:11;height:12px;
  background:linear-gradient(to top,#1c0e06,#2c1a0a,#1c0e06);
  box-shadow:0 -3px 10px rgba(0,0,0,.4),0 3px 6px rgba(0,0,0,.3);}
.baseboard::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(180,140,60,.38),transparent);}

.spots-fixed{position:fixed;top:0;left:0;right:0;bottom:0;z-index:3;pointer-events:none;}
.sp-h{position:absolute;top:calc(22vh + 10px);width:16px;height:16px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#f0e8c0,#c0a050 55%,#504020);transform:translateX(-50%);box-shadow:0 0 5px rgba(240,220,140,.28),0 2px 5px rgba(0,0,0,.8);}
.sp-c{position:absolute;top:calc(22vh + 20px);transform:translateX(-50%);width:190px;height:52vh;background:linear-gradient(to bottom,rgba(255,235,150,.1) 0%,rgba(255,215,110,.055) 22%,rgba(255,195,80,.022) 48%,transparent 78%);clip-path:polygon(34% 0%,66% 0%,100% 100%,0% 100%);animation:spf var(--spd,5s) ease-in-out infinite alternate;}
@keyframes spf{0%{opacity:.52;transform:translateX(-50%) skewX(0deg);}30%{opacity:.86;transform:translateX(-50%) skewX(.8deg);}60%{opacity:.62;transform:translateX(-50%) skewX(-.5deg);}100%{opacity:.58;transform:translateX(-50%) skewX(.3deg);}}
.sp-p{position:absolute;bottom:calc(26vh + 2px);transform:translateX(-50%);width:130px;height:22px;background:radial-gradient(ellipse,rgba(255,225,140,.17) 0%,transparent 70%);border-radius:50%;animation:spf var(--spd,5s) ease-in-out infinite alternate;}

canvas.dust{position:fixed;inset:0;z-index:5;pointer-events:none;}
.vignette{position:fixed;inset:0;z-index:6;pointer-events:none;background:radial-gradient(ellipse 82% 82% at 50% 48%,transparent 35%,rgba(6,3,1,.62) 100%);}

.site-header{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:16px 56px;background:linear-gradient(to bottom,rgba(10,5,2,.94) 60%,transparent);}
.brand{display:flex;align-items:center;gap:12px;}
.brand-r{font-size:16px;}
.brand-n{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:300;font-style:italic;color:rgba(230,215,190,.82);letter-spacing:.06em;}
.hbtn{font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:.2em;color:rgba(220,200,160,.38);background:transparent;border:1px solid rgba(220,200,160,.12);border-radius:1px;padding:7px 14px;cursor:pointer;transition:all .25s;text-transform:uppercase;}
.hbtn:hover{color:rgba(220,200,160,.75);border-color:rgba(220,200,160,.28);}

.scroll-content{position:relative;z-index:15;padding:calc(22vh + 60px) 0 calc(26vh + 60px);min-height:100vh;}
.content-box{max-width:780px;width:100%;margin:0 auto;padding:40px 56px 0;}

.page-pre{font-family:'Dancing Script',cursive;font-size:17px;color:rgba(200,170,110,.52);margin-bottom:6px;}
.page-title{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:300;color:rgba(230,215,185,.92);margin-bottom:8px;line-height:1.1;text-shadow:0 2px 16px rgba(0,0,0,.35);}
.page-title em{font-style:italic;color:#d4a84c;}
.page-sub{font-size:13px;font-style:italic;color:rgba(190,165,120,.5);margin-bottom:28px;line-height:1.65;letter-spacing:.04em;}

.toast{position:fixed;bottom:calc(26vh + 20px);left:50%;transform:translateX(-50%) translateY(12px);background:rgba(240,232,215,.97);border:1px solid rgba(120,90,40,.2);border-radius:1px;padding:10px 28px;font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;color:#3a2810;opacity:0;transition:all .3s;z-index:100;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.2);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@keyframes fu{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}

/* Parallax scroll JS helper classes */


@import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap');
.fbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:24px;}
.fb{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.16em;text-transform:uppercase;padding:5px 14px;background:transparent;border:1px solid rgba(160,130,70,.18);border-radius:18px;color:rgba(180,155,110,.45);cursor:pointer;transition:all .25s;}
.fb.active,.fb:hover{color:rgba(200,165,90,.8);border-color:rgba(180,140,60,.35);background:rgba(180,140,60,.08);}
.mc{margin-left:auto;font-family:'Dancing Script',cursive;font-size:15px;color:rgba(160,135,95,.4);}
.letter{position:relative;margin-bottom:28px;animation:fu .55s ease both;cursor:default;}
.letter:hover .lp{transform:translateY(-4px);box-shadow:0 10px 32px rgba(0,0,0,.18);}
.lp{background:linear-gradient(158deg,#f0e6c6 0%,#e6d6a4 55%,#d8c688 100%);border-radius:1px;padding:28px 34px 24px;position:relative;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.15),2px 2px 0 rgba(100,75,25,.08);transition:transform .35s ease,box-shadow .35s;}
.lp::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 29px,rgba(100,75,25,.05) 29px,rgba(100,75,25,.05) 30px);pointer-events:none;}
.lp::after{content:'';position:absolute;top:0;bottom:0;left:58px;width:1px;background:rgba(140,100,50,.08);pointer-events:none;}
.fold{position:absolute;bottom:0;right:0;width:22px;height:22px;background:linear-gradient(225deg,#d8c688 50%,rgba(0,0,0,.07) 50%);border-top:1px solid rgba(100,75,25,.12);border-left:1px solid rgba(100,75,25,.12);}
.new-b{position:absolute;top:-9px;right:14px;background:#804040;color:rgba(255,240,215,.95);font-family:'Cinzel',serif;font-size:7px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;padding:3px 10px;border-radius:1px;box-shadow:0 0 10px rgba(128,64,64,.4);}
.lh{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid rgba(100,70,25,.14);}
.lf{font-family:'Dancing Script',cursive;font-size:20px;color:#281808;line-height:1;}
.lf.mine{color:#202058;}
.ld{font-size:10px;color:#6a4820;letter-spacing:.05em;font-style:italic;opacity:.7;}
.lb2{font-family:'IM Fell English',Georgia,serif;font-size:17px;color:#1c1208;line-height:1.95;letter-spacing:.01em;word-break:break-word;}
.seal{position:absolute;bottom:12px;right:32px;font-size:18px;opacity:.1;transform:rotate(-12deg);}
.empty{padding:60px 0;text-align:center;}
.empty-i{font-size:48px;display:block;margin-bottom:18px;opacity:.25;}
.empty-t{font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;color:rgba(180,155,110,.45);line-height:1.7;}

</style>
</head>
<body>

<div class="room-wall" id="rwall"></div>
<div class="room-ceiling" id="rceil"></div>
<div class="track-rail"></div>
<div class="baseboard"></div>
<div class="room-floor" id="rfloor">
  <div class="fp"></div><div class="fs2"></div><div class="fao"></div>
</div>
<div class="spots-fixed">
  <div class="sp-h" style="left:18%"></div><div class="sp-h" style="left:50%"></div><div class="sp-h" style="left:82%"></div>
  <div class="sp-c" style="left:18%;--spd:4.8s"></div><div class="sp-c" style="left:50%;--spd:6.4s"></div><div class="sp-c" style="left:82%;--spd:5.2s"></div>
  <div class="sp-p" style="left:18%;--spd:4.8s"></div><div class="sp-p" style="left:50%;--spd:6.4s"></div><div class="sp-p" style="left:82%;--spd:5.2s"></div>
</div>
<canvas class="dust" id="dust"></canvas>
<div class="vignette"></div>

<header class="site-header">
  <div class="brand"><span class="brand-r">🌹</span><span class="brand-n">PostBox</span></div>
  <button class="hbtn" onclick="window.location.href='home.html'">← Home</button>
</header>
<div class="scroll-content">
  <div class="content-box">

<div style="animation:fu .8s ease .1s both">
<div class="page-pre">every word, kept forever</div>
<div class="page-title">Our <em>PostBox</em></div>
<p class="page-sub">Every letter from the very beginning — sealed in time, always readable, never forgotten.</p>
<div class="fbar">
  <button class="fb active" onclick="setF('all',this)">All Letters</button>
  <button class="fb" id="fbme" onclick="setF('me',this)">From Me</button>
  <button class="fb" id="fbthem" onclick="setF('them',this)">From Them</button>
  <span class="mc" id="mc">0 letters</span>
</div>
<div id="letters"></div>
</div>

  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const user=localStorage.getItem('user');if(!user)window.location.href='index.html';

(function(){
  const c=document.getElementById('dust'),ctx=c.getContext('2d');
  let W,H;function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  const spotXs=[.18,.50,.82];const motes=[];
  for(let i=0;i<80;i++)motes.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,r:Math.random()*1.6+.25,vx:(Math.random()-.5)*.22,vy:-(Math.random()*.24+.04),a:Math.random()*.14+.022,phase:Math.random()*Math.PI*2,freq:Math.random()*.006+.002});
  let t=0;
  function draw(){ctx.clearRect(0,0,W,H);t+=.009;
    for(const m of motes){
      m.x+=m.vx+Math.sin(t*m.freq+m.phase)*.32;m.y+=m.vy;
      if(m.y<-5){m.y=H+5;m.x=Math.random()*W;}if(m.x<0)m.x=W;if(m.x>W)m.x=0;
      let alpha=m.a;
      if(m.y>H*.22&&m.y<H*.74){for(const sx of spotXs){const cx=sx*W,coneW=95,dx=Math.abs(m.x-cx);if(dx<coneW){const frac=1-dx/coneW,yfrac=Math.max(0,1-(m.y-H*.22)/(H*.52)*.7);alpha=Math.min(.78,alpha+frac*yfrac*.38);}}}
      ctx.beginPath();ctx.arc(m.x,m.y,m.r,0,Math.PI*2);ctx.fillStyle='rgba(240,220,155,'+alpha+')';ctx.fill();
    }requestAnimationFrame(draw);}draw();
})();
const rceil=document.getElementById('rceil'),rfloor=document.getElementById('rfloor'),rwall=document.getElementById('rwall');
let tk=false;window.addEventListener('scroll',()=>{if(!tk){requestAnimationFrame(()=>{const sy=window.scrollY;if(rceil)rceil.style.transform='translateY('+(sy*.05)+'px)';if(rfloor)rfloor.style.transform='translateY('+(-sy*.12)+'px)';if(rwall)rwall.style.transform='translateY('+(sy*.02)+'px)';tk=false;});tk=true;}},{passive:true});

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');}

const other=user==='person1'?'person2':'person1';
document.getElementById('fbthem').textContent='From '+other;
document.getElementById('fbme').textContent='From Me';
let cf='all';
function setF(f,btn){cf=f;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}
function render(){
  const msgs=JSON.parse(localStorage.getItem('msgs'))||[];
  const lr=parseInt(localStorage.getItem('lastRead_'+user)||'0');
  let fil=msgs;if(cf==='me')fil=msgs.filter(m=>m.sender===user);if(cf==='them')fil=msgs.filter(m=>m.sender!==user);
  document.getElementById('mc').textContent=fil.length+' letter'+(fil.length===1?'':'s');
  const el=document.getElementById('letters');
  if(!fil.length){el.innerHTML='<div class="empty"><span class="empty-i">📭</span><div class="empty-t">No letters here yet.</div></div>';return;}
  const sorted=[...fil].reverse();
  el.innerHTML=sorted.map((m,i)=>{
    const isNew=m.sender!==user&&m.ts>lr,isMine=m.sender===user,delay=Math.min(i*.06,.5);
    const spots=Array.from({length:3},()=>`<div style="position:absolute;width:${18+Math.random()*34}px;height:${12+Math.random()*26}px;top:${Math.random()*80}%;left:${Math.random()*80}%;transform:rotate(${Math.random()*360}deg);border-radius:50%;background:rgba(100,75,25,.03);pointer-events:none"></div>`).join('');
    return `<div class="letter" style="animation-delay:${delay}s">
      ${isNew?'<div class="new-b">New ♥</div>':''}
      <div class="lp">${spots}<div class="fold"></div>
        <div class="lh"><span class="lf ${isMine?'mine':''}">${esc(m.sender)}</span><span class="ld">${m.time}</span></div>
        <div class="lb2">${esc(m.text)}</div><div class="seal">♥</div>
      </div></div>`;
  }).join('');
  if(msgs.length>0){const latest=Math.max(...msgs.map(m=>m.ts));localStorage.setItem('lastRead_'+user,String(latest));}
}
render();setInterval(render,5000);

</script>
</body>
</html>
