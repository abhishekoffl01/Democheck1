<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PostBox · Our World</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Jost:wght@300;400;500&family=Cormorant+Garamond:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
<style>

:root{--wall:#f2ede6;--navy:#1e2d4a;--navy2:#2d3f5e;--navy-light:#4a6080;--slate:#6a7d94;--cream:#f8f4ee;--text:#1e2d4a;--text-mid:#3a4e68;--text-soft:#6a7d94;--border:rgba(30,45,74,.1);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}html,body{overflow-x:hidden;}
body{font-family:'Jost',sans-serif;background:var(--wall);color:var(--text);min-height:100vh;}
.room-wall{position:fixed;inset:0;z-index:0;will-change:transform;background:radial-gradient(ellipse 110% 70% at 50% 32%,#f8f4ee 0%,#f2ede6 20%,#ebe3d8 45%,#e2d8cc 70%,#d8cec0 100%);}
.room-wall::before{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 28% 100% at 0% 50%,rgba(20,15,10,.1) 0%,transparent 62%),radial-gradient(ellipse 28% 100% at 100% 50%,rgba(20,15,10,.1) 0%,transparent 62%),radial-gradient(ellipse 100% 18% at 50% 0%,rgba(20,15,10,.09) 0%,transparent 52%),radial-gradient(ellipse 100% 14% at 50% 100%,rgba(20,15,10,.07) 0%,transparent 48%);}
.room-wall::after{content:'';position:absolute;left:0;right:0;bottom:0;height:26%;background:linear-gradient(to top,#cfc5b5 0%,#d8d0c2 14%,#e0d8ca 30%,rgba(224,216,202,.35) 65%,transparent 100%);border-top:1px solid rgba(180,165,145,.3);}
.room-ceiling{position:fixed;top:0;left:0;right:0;z-index:8;height:20vh;will-change:transform;background:linear-gradient(to bottom,#ddd5c8 0%,#e5ddd2 25%,#ede7de 55%,rgba(237,231,222,.45) 80%,transparent 100%);}
.room-ceiling::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(30,45,74,.12),transparent);}
.track-rail{position:fixed;top:20vh;left:5%;right:5%;z-index:9;height:8px;background:linear-gradient(to bottom,#b0a898,#c4bcb0,#b0a898);border-radius:4px;box-shadow:0 2px 8px rgba(20,15,10,.1),inset 0 1px 0 rgba(255,255,255,.5);}
.room-floor{position:fixed;bottom:0;left:0;right:0;z-index:8;height:24vh;will-change:transform;overflow:hidden;}
.fp{position:absolute;inset:0;background:repeating-linear-gradient(90deg,#c8b898 0px,#d8c8a8 59px,#b8a888 59px,#c8b898 60px,#ddd0b0 60px,#e8dcc0 119px,#c8b898 119px,#c8b898 120px),linear-gradient(to top,#a09070 0%,#b4a080 18%,#c8b090 40%,#d8c4a4 62%,#e8d8bc 85%,#f0e4cc 100%);background-blend-mode:multiply;}
.fs2{position:absolute;inset:0;background:linear-gradient(to top,rgba(255,250,235,.12) 0%,rgba(255,248,230,.05) 35%,transparent 65%);animation:fsn 8s ease-in-out infinite alternate;}
@keyframes fsn{0%{opacity:.4;}100%{opacity:1;}}
.fao{position:absolute;top:0;left:0;right:0;height:38%;background:linear-gradient(to bottom,rgba(20,15,10,.07),transparent);}
.baseboard{position:fixed;bottom:24vh;left:0;right:0;z-index:9;height:11px;background:linear-gradient(to top,#c0b8ac,#d0c8bc,#c0b8ac);box-shadow:0 -1px 4px rgba(20,15,10,.07);}
.baseboard::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(30,45,74,.15),transparent);}
.spots{position:fixed;top:0;left:0;right:0;bottom:0;z-index:2;pointer-events:none;}
.sp-h{position:absolute;top:calc(20vh + 8px);width:14px;height:14px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#fff,#d8d0c4 55%,#a0988c);transform:translateX(-50%);box-shadow:0 0 5px rgba(255,255,255,.7),0 2px 4px rgba(20,15,10,.15);}
.sp-c{position:absolute;top:calc(20vh + 16px);transform:translateX(-50%);width:200px;height:56vh;background:linear-gradient(to bottom,rgba(255,245,215,.16) 0%,rgba(255,240,200,.08) 22%,rgba(255,235,190,.03) 48%,transparent 78%);clip-path:polygon(34% 0%,66% 0%,100% 100%,0% 100%);animation:spB var(--spd,5s) ease-in-out infinite alternate;}
@keyframes spB{0%{opacity:.5;transform:translateX(-50%);}40%{opacity:.88;transform:translateX(-50%) skewX(.5deg);}70%{opacity:.6;transform:translateX(-50%) skewX(-.3deg);}100%{opacity:.55;transform:translateX(-50%);}}
.sp-p{position:absolute;bottom:calc(24vh + 2px);transform:translateX(-50%);width:140px;height:18px;background:radial-gradient(ellipse,rgba(255,245,215,.2) 0%,transparent 70%);border-radius:50%;animation:spB var(--spd,5s) ease-in-out infinite alternate;}
canvas.dust{position:fixed;inset:0;z-index:4;pointer-events:none;}
.vignette{position:fixed;inset:0;z-index:5;pointer-events:none;background:radial-gradient(ellipse 88% 88% at 50% 50%,transparent 42%,rgba(20,15,10,.09) 100%);}
.site-header{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:18px 60px;background:linear-gradient(to bottom,rgba(242,237,230,.96) 65%,transparent);backdrop-filter:blur(8px);}
.brand{display:flex;align-items:center;gap:12px;}
.brand-mono{width:32px;height:32px;border:1.5px solid rgba(30,45,74,.18);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;color:var(--navy);}
.brand-name{font-family:'Playfair Display',serif;font-size:17px;font-weight:400;font-style:italic;color:var(--navy);letter-spacing:.02em;}
.hbtn{font-family:'Jost',sans-serif;font-size:9px;letter-spacing:.2em;color:var(--text-soft);background:transparent;border:1px solid rgba(30,45,74,.14);border-radius:2px;padding:7px 16px;cursor:pointer;transition:all .25s;text-transform:uppercase;font-weight:500;}
.hbtn:hover{color:var(--navy);border-color:rgba(30,45,74,.3);background:rgba(30,45,74,.04);}
.scroll-content{position:relative;z-index:15;padding:calc(20vh + 56px) 0 calc(24vh + 56px);min-height:100vh;}
.content-wrap{max-width:800px;width:100%;margin:0 auto;padding:40px 56px 0;}
.page-pre{font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;color:var(--text-soft);margin-bottom:8px;letter-spacing:.05em;}
.page-title{font-family:'Playfair Display',serif;font-size:38px;font-weight:400;color:var(--navy);margin-bottom:8px;line-height:1.1;}
.page-title em{font-style:italic;color:var(--navy-light);}
.page-sub{font-size:13px;color:var(--text-soft);margin-bottom:28px;line-height:1.65;letter-spacing:.03em;font-family:'Jost',sans-serif;font-weight:300;}
.toast{position:fixed;bottom:calc(24vh + 16px);left:50%;transform:translateX(-50%) translateY(12px);background:var(--cream);border:1px solid rgba(30,45,74,.12);border-radius:2px;padding:10px 28px;font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;color:var(--navy);opacity:0;transition:all .3s;z-index:100;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(20,15,10,.1);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@keyframes fu{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}

@import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap');
.fbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:24px;}
.fb{font-family:'Jost',sans-serif;font-size:9px;letter-spacing:.16em;text-transform:uppercase;padding:6px 16px;background:transparent;border:1px solid rgba(30,45,74,.12);border-radius:20px;color:var(--text-soft);cursor:pointer;transition:all .25s;font-weight:500;}
.fb.active,.fb:hover{color:var(--navy);border-color:rgba(30,45,74,.3);background:rgba(30,45,74,.06);}
.mc{margin-left:auto;font-family:'Cormorant Garamond',serif;font-size:15px;font-style:italic;color:var(--text-soft);}
.letter{position:relative;margin-bottom:28px;animation:fu .55s ease both;cursor:default;}
.letter:hover .lp{transform:translateY(-3px);box-shadow:0 8px 28px rgba(20,15,10,.12);}
.lp{background:linear-gradient(158deg,#f5ecd0 0%,#ede4be 55%,#e5dc aa 100%);background:linear-gradient(158deg,#f5ecd0 0%,#ede4be 55%,#e5dcaa 100%);border-radius:2px;padding:28px 34px 24px;position:relative;overflow:hidden;box-shadow:0 2px 12px rgba(20,15,10,.1),1px 1px 0 rgba(100,80,30,.08);transition:transform .35s ease,box-shadow .35s;}
.lp::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 29px,rgba(100,80,30,.04) 29px,rgba(100,80,30,.04) 30px);pointer-events:none;}
.lp::after{content:'';position:absolute;top:0;bottom:0;left:58px;width:1px;background:rgba(100,80,30,.07);pointer-events:none;}
.fold{position:absolute;bottom:0;right:0;width:20px;height:20px;background:linear-gradient(225deg,#e5dcaa 50%,rgba(0,0,0,.06) 50%);border-top:1px solid rgba(100,80,30,.1);border-left:1px solid rgba(100,80,30,.1);}
.new-b{position:absolute;top:-8px;right:14px;background:var(--navy);color:white;font-family:'Jost',sans-serif;font-size:8px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;padding:3px 10px;border-radius:2px;box-shadow:0 2px 8px rgba(30,45,74,.25);}
.lh{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid rgba(100,80,30,.12);}
.lf{font-family:'Playfair Display',serif;font-size:18px;font-style:italic;color:#2a1808;line-height:1;}
.lf.mine{color:var(--navy);}
.ld{font-size:10px;color:#7a6030;letter-spacing:.05em;font-family:'Jost',sans-serif;font-weight:300;}
.lb2{font-family:'IM Fell English',Georgia,serif;font-size:17px;color:#1c1208;line-height:1.95;letter-spacing:.01em;word-break:break-word;}
.seal{position:absolute;bottom:12px;right:32px;font-size:16px;opacity:.1;transform:rotate(-12deg);}
.empty{padding:60px 0;text-align:center;}
.empty-i{font-size:48px;display:block;margin-bottom:18px;opacity:.2;}
.empty-t{font-family:'Playfair Display',serif;font-size:20px;font-style:italic;color:var(--text-soft);line-height:1.7;}
</style>
</head>
<body>

<div class="room-wall" id="rwall"></div>
<div class="room-ceiling" id="rceil"></div>
<div class="track-rail"></div>
<div class="baseboard"></div>
<div class="room-floor" id="rfloor"><div class="fp"></div><div class="fs2"></div><div class="fao"></div></div>
<div class="spots">
  <div class="sp-h" style="left:18%"></div><div class="sp-h" style="left:50%"></div><div class="sp-h" style="left:82%"></div>
  <div class="sp-c" style="left:18%;--spd:5s"></div><div class="sp-c" style="left:50%;--spd:7s"></div><div class="sp-c" style="left:82%;--spd:5.5s"></div>
  <div class="sp-p" style="left:18%;--spd:5s"></div><div class="sp-p" style="left:50%;--spd:7s"></div><div class="sp-p" style="left:82%;--spd:5.5s"></div>
</div>
<canvas class="dust" id="dust"></canvas>
<div class="vignette"></div>
<header class="site-header">
  <div class="brand"><div class="brand-mono">ow</div><span class="brand-name">PostBox</span></div>
  <button class="hbtn" onclick="window.location.href='home.html'">&#8592; Home</button>
</header>
<div class="scroll-content"><div class="content-wrap">
<div style="animation:fu .8s ease .1s both">
<div class="page-pre">every word, kept forever</div>
<div class="page-title">Our <em>PostBox</em></div>
<p class="page-sub">Every letter from the very beginning — sealed in time, always readable.</p>
<div class="fbar">
  <button class="fb active" onclick="setF('all',this)">All Letters</button>
  <button class="fb" id="fbme" onclick="setF('me',this)">From Me</button>
  <button class="fb" id="fbthem" onclick="setF('them',this)">From Them</button>
  <span class="mc" id="mc">0 letters</span>
</div>
<div id="letters"></div>
</div>
</div></div>
<div class="toast" id="toast"></div>
<script>
const user=localStorage.getItem('user');if(!user)window.location.href='index.html';

(function(){const c=document.getElementById('dust'),ctx=c.getContext('2d');let W,H;function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}resize();window.addEventListener('resize',resize);const sXs=[.18,.50,.82];const ms=[];for(let i=0;i<75;i++)ms.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,r:Math.random()*1.3+.2,vx:(Math.random()-.5)*.18,vy:-(Math.random()*.2+.04),a:Math.random()*.07+.012,ph:Math.random()*Math.PI*2,fr:Math.random()*.006+.002});let t=0;function draw(){ctx.clearRect(0,0,W,H);t+=.008;for(const m of ms){m.x+=m.vx+Math.sin(t*m.fr+m.ph)*.26;m.y+=m.vy;if(m.y<-5){m.y=H+5;m.x=Math.random()*W;}if(m.x<0)m.x=W;if(m.x>W)m.x=0;let a=m.a;const wt=H*.2,wb=H*.76;if(m.y>wt&&m.y<wb){for(const sx of sXs){const cx=sx*W,cw=88,dx=Math.abs(m.x-cx);if(dx<cw){const fr=1-dx/cw,yf=Math.max(0,1-(m.y-wt)/(wb-wt)*.7);a=Math.min(.5,a+fr*yf*.25);}}}ctx.beginPath();ctx.arc(m.x,m.y,m.r,0,Math.PI*2);ctx.fillStyle='rgba(200,185,150,'+a+')';ctx.fill();}requestAnimationFrame(draw);}draw();})();

const rceil=document.getElementById('rceil'),rfloor=document.getElementById('rfloor'),rwall=document.getElementById('rwall');
let tk=false;window.addEventListener('scroll',()=>{if(!tk){requestAnimationFrame(()=>{const sy=window.scrollY;rceil.style.transform='translateY('+(sy*.05)+'px)';rfloor.style.transform='translateY('+(-sy*.1)+'px)';rwall.style.transform='translateY('+(sy*.018)+'px)';tk=false;});tk=true;}},{passive:true});
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');}

const other=user==='person1'?'person2':'person1';
document.getElementById('fbthem').textContent='From '+other;
document.getElementById('fbme').textContent='From Me';
let cf='all';
function setF(f,btn){cf=f;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}
function render(){
  const msgs=JSON.parse(localStorage.getItem('msgs'))||[];
  const lr=parseInt(localStorage.getItem('lastRead_'+user)||'0');
  let fil=msgs;if(cf==='me')fil=msgs.filter(m=>m.sender===user);if(cf==='them')fil=msgs.filter(m=>m.sender!==user);
  document.getElementById('mc').textContent=fil.length+' letter'+(fil.length===1?'':'s');
  const el=document.getElementById('letters');
  if(!fil.length){el.innerHTML='<div class="empty"><span class="empty-i">📭</span><div class="empty-t">No letters here yet.</div></div>';return;}
  const sorted=[...fil].reverse();
  el.innerHTML=sorted.map((m,i)=>{
    const isNew=m.sender!==user&&m.ts>lr,isMine=m.sender===user,delay=Math.min(i*.06,.5);
    return `<div class="letter" style="animation-delay:${delay}s">
      ${isNew?'<div class="new-b">New</div>':''}
      <div class="lp"><div class="fold"></div>
        <div class="lh"><span class="lf ${isMine?'mine':''}">${esc(m.sender)}</span><span class="ld">${m.time}</span></div>
        <div class="lb2">${esc(m.text)}</div><div class="seal">♥</div>
      </div></div>`;
  }).join('');
  if(msgs.length>0){const latest=Math.max(...msgs.map(m=>m.ts));localStorage.setItem('lastRead_'+user,String(latest));}
}
render();setInterval(render,5000);
</script>
</body>
</html>
