<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PostBox · Our World</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Lato:wght@300;400;700&family=Dancing+Script:wght@500;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{--bg:#160808;--surface:#1e0d0d;--blush:#e8b4b8;--rose:#c97b84;--cream:#f5ede4;--cream2:#ede0d4;--text:#f0e4dc;--muted:#8a6a68;--border:rgba(232,180,184,0.15);
  --parch:#f0e6c8;--parch2:#e6d8a8;--parch3:#d8c890;--ink:#1e1408;--ink2:#2e1e0c;--ink-fade:#6a5030;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
.bg-warm{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 70% 60% at 50% 110%,rgba(100,30,30,.5) 0%,transparent 65%),radial-gradient(ellipse 50% 40% at 0% 0%,rgba(60,18,18,.3) 0%,transparent 55%);}

.page{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:22px 52px;border-bottom:1px solid var(--border);flex-shrink:0;}
.brand{display:flex;align-items:center;gap:12px;}
.brand-heart{font-size:18px;animation:heartbeat 2.8s ease-in-out infinite;filter:drop-shadow(0 0 7px rgba(200,100,100,.4));}
@keyframes heartbeat{0%,100%{transform:scale(1);}14%{transform:scale(1.18);}28%{transform:scale(1);}42%{transform:scale(1.1);}56%{transform:scale(1);}}
.brand-name{font-family:'Dancing Script',cursive;font-size:20px;color:var(--blush);opacity:.8;}
.back-btn{font-size:11px;letter-spacing:.12em;color:var(--muted);background:transparent;border:1px solid rgba(138,106,104,.3);border-radius:2px;padding:7px 16px;cursor:pointer;transition:all .25s;text-transform:uppercase;font-family:'Lato',sans-serif;}
.back-btn:hover{color:var(--blush);border-color:var(--border);}

/* POSTBOX HERO */
.pb-hero{padding:48px 52px 28px;animation:fadeUp .8s ease .1s both;}
.pb-pre{font-family:'Dancing Script',cursive;font-size:17px;color:var(--rose);opacity:.6;margin-bottom:6px;}
.pb-title{font-family:'Playfair Display',serif;font-size:38px;font-weight:400;color:var(--cream);margin-bottom:8px;line-height:1.1;}
.pb-title em{font-style:italic;color:var(--blush);}
.pb-sub{font-size:13px;font-style:italic;color:var(--muted);letter-spacing:.04em;line-height:1.65;max-width:480px;}

/* FILTER BAR */
.filter-bar{padding:0 52px 28px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;animation:fadeUp .8s ease .18s both;}
.filter-btn{font-family:'Lato',sans-serif;font-size:11px;letter-spacing:.14em;text-transform:uppercase;padding:6px 16px;background:transparent;border:1px solid var(--border);border-radius:20px;color:var(--muted);cursor:pointer;transition:all .25s;}
.filter-btn.active,.filter-btn:hover{color:var(--blush);border-color:rgba(201,123,132,.35);background:rgba(201,123,132,.07);}
.msg-count{margin-left:auto;font-family:'Dancing Script',cursive;font-size:15px;color:var(--muted);}

/* LETTERS CONTAINER */
.letters-wrap{flex:1;overflow-y:auto;padding:0 52px 52px;scrollbar-width:thin;scrollbar-color:rgba(201,123,132,.15) transparent;}
.letters-wrap::-webkit-scrollbar{width:4px;}
.letters-wrap::-webkit-scrollbar-thumb{background:rgba(201,123,132,.15);border-radius:2px;}

/* Empty */
.empty{padding:80px 0;text-align:center;}
.empty-rose{font-size:48px;display:block;margin-bottom:18px;opacity:.3;}
.empty-text{font-family:'Dancing Script',cursive;font-size:20px;color:var(--muted);line-height:1.7;}

/* ── PARCHMENT LETTER ── */
.letter{position:relative;margin-bottom:32px;animation:letterIn .55s ease both;cursor:default;}
.letter:hover .letter-paper{transform:translateY(-4px) rotate(.25deg);box-shadow:0 12px 40px rgba(0,0,0,.55),0 0 20px rgba(201,123,132,.08);}

.letter-paper{
  background:linear-gradient(158deg,var(--parch) 0%,var(--parch2) 55%,var(--parch3) 100%);
  border-radius:1px;padding:32px 36px 28px;position:relative;overflow:hidden;
  box-shadow:0 6px 28px rgba(0,0,0,.5),2px 2px 0 rgba(160,120,60,.1),inset 0 0 60px rgba(160,120,50,.05);
  transition:transform .35s,box-shadow .35s;
}

/* Aged paper lines */
.letter-paper::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 29px,rgba(140,100,40,.055) 29px,rgba(140,100,40,.055) 30px);pointer-events:none;}
/* Left margin */
.letter-paper::after{content:'';position:absolute;top:0;bottom:0;left:62px;width:1px;background:rgba(180,120,80,.1);pointer-events:none;}

/* Folded corner */
.fold{position:absolute;bottom:0;right:0;width:24px;height:24px;background:linear-gradient(225deg,var(--parch3) 50%,rgba(0,0,0,.07) 50%);border-top:1px solid rgba(140,100,40,.14);border-left:1px solid rgba(140,100,40,.14);}

/* Water stain / age spot */
.age-spot{position:absolute;border-radius:50%;background:rgba(140,100,40,.04);pointer-events:none;}

/* NEW badge */
.new-badge{position:absolute;top:-9px;right:16px;background:#b04040;color:white;font-size:8px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;padding:3px 10px;border-radius:1px;box-shadow:0 0 12px rgba(176,64,64,.5);animation:badgePop .4s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes badgePop{from{transform:scale(.5);opacity:0;}to{transform:scale(1);opacity:1;}}
@keyframes letterIn{from{opacity:0;transform:translateY(18px) rotate(-.4deg);}to{opacity:1;transform:none;}}

.letter-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid rgba(120,90,40,.16);}
.letter-from{font-family:'Dancing Script',cursive;font-size:20px;color:var(--ink2);line-height:1;}
.letter-from.mine{color:#3a2860;}
.letter-date{font-size:10px;color:var(--ink-fade);letter-spacing:.06em;font-style:italic;opacity:.7;}

.letter-body{font-family:'IM Fell English',serif;font-size:17px;color:var(--ink);line-height:1.95;letter-spacing:.01em;word-break:break-word;}

/* Heart seal */
.letter-seal{position:absolute;bottom:16px;right:36px;font-size:20px;opacity:.14;transform:rotate(-12deg);}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:none;}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="bg-warm"></div>
<div class="page">
<header class="header">
  <div class="brand"><span class="brand-heart">🌹</span><span class="brand-name">PostBox</span></div>
  <button class="back-btn" onclick="window.location.href='home.html'">← Home</button>
</header>

<div class="pb-hero">
  <div class="pb-pre">every word, kept forever</div>
  <div class="pb-title">Our <em>PostBox</em></div>
  <p class="pb-sub">Every letter from the very beginning — sealed in time, always readable, never forgotten.</p>
</div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="filter('all',this)">All Letters</button>
  <button class="filter-btn" id="btn-me" onclick="filter('me',this)">From Me</button>
  <button class="filter-btn" id="btn-them" onclick="filter('them',this)">From Them</button>
  <span class="msg-count" id="msg-count">0 letters</span>
</div>

<div class="letters-wrap" id="letters">
  <div class="empty"><span class="empty-rose">💌</span><div class="empty-text">The PostBox is empty.<br>Write the first letter.</div></div>
</div>
</div>
<script>
(function(){const c=document.getElementById('c'),ctx=c.getContext('2d');let W,H;function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}resize();window.addEventListener('resize',resize);const S=['❤','♥','·','·','✿','·'],ps=[];for(let i=0;i<40;i++)ps.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight+window.innerHeight,sym:S[Math.floor(Math.random()*S.length)],size:Math.random()*8+4,speed:Math.random()*.4+.15,drift:(Math.random()-.5)*.3,alpha:Math.random()*.16+.04,rot:Math.random()*Math.PI*2,rotSpeed:(Math.random()-.5)*.01,phase:Math.random()*Math.PI*2,sway:Math.random()*.5+.2});let t=0;function draw(){ctx.clearRect(0,0,W,H);t+=.01;for(const p of ps){p.y-=p.speed;p.x+=Math.sin(t*p.sway+p.phase)*p.drift;p.rot+=p.rotSpeed;if(p.y<-30){p.y=H+20;p.x=Math.random()*W;}ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.globalAlpha=p.alpha;ctx.font=p.size+'px serif';ctx.fillStyle=(p.sym==='·'||p.sym==='✿')?'rgba(240,215,205,1)':'rgba(210,120,130,1)';ctx.textAlign='center';ctx.fillText(p.sym,0,0);ctx.restore();}requestAnimationFrame(draw);}draw();})();

const user=localStorage.getItem('user');
if(!user)window.location.href='index.html';

// Update btn labels with other user's name
const other=user==='person1'?'person2':'person1';
document.getElementById('btn-them').textContent='From '+other;
document.getElementById('btn-me').textContent='From Me ('+user+')';

let currentFilter='all';

function filter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render(){
  const msgs=JSON.parse(localStorage.getItem('msgs'))||[];
  const lastRead=parseInt(localStorage.getItem('lastRead_'+user)||'0');
  const el=document.getElementById('letters');

  let filtered=msgs;
  if(currentFilter==='me')filtered=msgs.filter(m=>m.sender===user);
  if(currentFilter==='them')filtered=msgs.filter(m=>m.sender!==user);

  document.getElementById('msg-count').textContent=filtered.length+' letter'+(filtered.length===1?'':'s');

  if(filtered.length===0){
    el.innerHTML='<div class="empty"><span class="empty-rose">💌</span><div class="empty-text">No letters here yet.</div></div>';
    return;
  }

  // newest first
  const sorted=[...filtered].reverse();
  el.innerHTML=sorted.map((m,i)=>{
    const isNew=m.sender!==user&&m.ts>lastRead;
    const isMine=m.sender===user;
    const delay=Math.min(i*.06,.5);
    // age spots
    const spots=Array.from({length:3},()=>`<div class="age-spot" style="width:${20+Math.random()*40}px;height:${15+Math.random()*30}px;top:${Math.random()*80}%;left:${Math.random()*80}%;transform:rotate(${Math.random()*360}deg)"></div>`).join('');
    return `<div class="letter" style="animation-delay:${delay}s">
      ${isNew?'<div class="new-badge">New ♥</div>':''}
      <div class="letter-paper">
        ${spots}
        <div class="fold"></div>
        <div class="letter-header">
          <span class="letter-from ${isMine?'mine':''}">${esc(m.sender)}</span>
          <span class="letter-date">${m.time}</span>
        </div>
        <div class="letter-body">${esc(m.text)}</div>
        <div class="letter-seal">♥</div>
      </div>
    </div>`;
  }).join('');

  // Mark all as read once opened
  if(msgs.length>0){
    const latest=Math.max(...msgs.map(m=>m.ts));
    localStorage.setItem('lastRead_'+user,String(latest));
  }
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
render();
setInterval(render,5000);
</script>
</body>
</html>
