<style>

/* ── SCENE ── */
.place-scene{position:fixed;inset:0;z-index:0;overflow:hidden;}
#scene-bg{position:absolute;inset:0;transition:background 1.4s ease;}
.scene-l1,.scene-l2,.scene-l3{position:absolute;inset:0;pointer-events:none;}
.scene-vignette{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 80% 80% at 50% 50%,transparent 30%,rgba(0,0,0,.28) 100%);}
canvas#particles{position:absolute;inset:0;z-index:4;pointer-events:none;}

/* Beach layers */
[data-place="beach"] .scene-l1{
  background:radial-gradient(ellipse 45% 28% at 68% 22%,rgba(255,220,80,.6) 0%,rgba(255,160,40,.25) 45%,transparent 70%);
}
[data-place="beach"] .scene-l2{
  background:
    linear-gradient(to top,rgba(15,60,120,.65) 0%,rgba(25,90,160,.3) 12%,transparent 28%),
    radial-gradient(ellipse 120% 14% at 50% 72%,rgba(30,100,180,.4) 0%,transparent 60%);
}
[data-place="beach"] .scene-l3{
  background:linear-gradient(to top,rgba(190,160,100,.55) 0%,rgba(210,180,120,.2) 7%,transparent 16%);
}
/* Wave animation */
[data-place="beach"] .wave-wrap{position:absolute;bottom:12%;left:0;right:0;height:60px;overflow:hidden;}
.wave{position:absolute;bottom:0;left:-100%;width:300%;height:100%;
  background:linear-gradient(to top,rgba(30,100,180,.22),transparent);
  border-radius:50% 50% 0 0 / 20px 20px 0 0;
  animation:waveMove 6s ease-in-out infinite;}
.wave2{animation:waveMove 8s ease-in-out infinite reverse;opacity:.6;}
@keyframes waveMove{0%{transform:translateX(0);}50%{transform:translateX(8%);}100%{transform:translateX(0);}}

/* Korean layers */
[data-place="korean"] .scene-l1{
  background:
    radial-gradient(ellipse 22% 35% at 22% 22%,rgba(220,110,30,.28) 0%,transparent 65%),
    radial-gradient(ellipse 22% 35% at 78% 18%,rgba(220,110,30,.22) 0%,transparent 65%),
    radial-gradient(ellipse 14% 22% at 50% 14%,rgba(255,150,40,.16) 0%,transparent 60%);
}
[data-place="korean"] .scene-l2{
  background:repeating-linear-gradient(180deg,transparent 0px,transparent 45px,rgba(140,170,210,.03) 45px,rgba(140,170,210,.03) 46px);
}
[data-place="korean"] .scene-l3{
  background:radial-gradient(ellipse 90% 22% at 50% 100%,rgba(160,80,15,.35) 0%,transparent 65%);
}

/* Garden layers */
[data-place="garden"] .scene-l1{
  background:
    conic-gradient(from 25deg at 85% 0%,rgba(255,240,180,.14) 0deg,transparent 18deg,transparent 342deg,rgba(255,240,180,.14) 360deg),
    radial-gradient(ellipse 55% 45% at 85% 3%,rgba(255,235,160,.28) 0%,transparent 65%);
}
[data-place="garden"] .scene-l2{
  background:linear-gradient(to top,rgba(30,90,40,.45) 0%,rgba(50,120,60,.2) 10%,transparent 22%);
}
[data-place="garden"] .scene-l3{
  background:
    radial-gradient(ellipse 28% 22% at 25% 60%,rgba(220,130,155,.14) 0%,transparent 60%),
    radial-gradient(ellipse 22% 18% at 72% 55%,rgba(220,150,175,.12) 0%,transparent 60%);
}

/* Temple layers */
[data-place="temple"] .scene-l1{
  background:
    radial-gradient(ellipse 32% 55% at 50% 58%,rgba(255,170,30,.38) 0%,rgba(200,110,15,.18) 50%,transparent 75%),
    radial-gradient(ellipse 65% 30% at 50% 72%,rgba(170,90,10,.28) 0%,transparent 65%);
}
[data-place="temple"] .scene-l2{
  background:
    radial-gradient(ellipse 35% 90% at 5% 50%,rgba(8,4,2,.55) 0%,transparent 60%),
    radial-gradient(ellipse 35% 90% at 95% 50%,rgba(8,4,2,.55) 0%,transparent 60%),
    linear-gradient(to top,rgba(8,4,2,.82) 0%,rgba(8,4,2,.35) 12%,transparent 30%);
}
[data-place="temple"] .scene-l3{
  background:linear-gradient(to bottom,rgba(5,2,1,.75) 0%,transparent 28%);
}

/* Karnataka layers */
[data-place="karnataka"] .scene-l1{
  background:
    radial-gradient(ellipse 65% 42% at 50% 0%,rgba(240,175,70,.32) 0%,transparent 65%),
    radial-gradient(ellipse 100% 22% at 50% 8%,rgba(255,200,80,.18) 0%,transparent 60%);
}
[data-place="karnataka"] .scene-l2{
  background:
    radial-gradient(ellipse 38% 90% at 8% 50%,rgba(25,12,4,.48) 0%,transparent 58%),
    radial-gradient(ellipse 38% 90% at 92% 50%,rgba(25,12,4,.48) 0%,transparent 58%);
}
[data-place="karnataka"] .scene-l3{
  background:linear-gradient(to top,rgba(18,8,2,.65) 0%,transparent 22%);
}
/* Stone texture */
[data-place="karnataka"]::after{
  content:'';position:fixed;inset:0;z-index:1;pointer-events:none;
  background:repeating-linear-gradient(45deg,rgba(0,0,0,.025) 0px,rgba(0,0,0,.025) 1px,transparent 1px,transparent 14px);
}

/* Wonderla layers */
[data-place="wonderla"] .scene-l1{
  background:
    radial-gradient(ellipse 85% 38% at 50% 8%,rgba(255,255,255,.2) 0%,transparent 65%),
    radial-gradient(ellipse 42% 28% at 78% 12%,rgba(255,255,180,.14) 0%,transparent 55%);
}
[data-place="wonderla"] .scene-l2{
  background:linear-gradient(to top,rgba(0,35,100,.55) 0%,rgba(0,55,140,.22) 14%,transparent 30%);
}
[data-place="wonderla"] .scene-l3{
  background:
    radial-gradient(ellipse 85% 20% at 50% 80%,rgba(120,220,255,.3) 0%,transparent 65%),
    radial-gradient(ellipse 85% 12% at 50% 90%,rgba(70,180,245,.35) 0%,transparent 60%);
}

/* Rameshwaram layers */
[data-place="rameshwaram"] .scene-l1{
  /* Glowing signboard */
  background:
    radial-gradient(ellipse 38% 20% at 50% 24%,rgba(220,155,35,.38) 0%,rgba(180,115,15,.18) 55%,transparent 75%),
    radial-gradient(ellipse 65% 12% at 50% 30%,rgba(160,100,15,.22) 0%,transparent 60%);
}
[data-place="rameshwaram"] .scene-l2{
  /* Street lamp pools */
  background:
    radial-gradient(ellipse 10% 28% at 18% 72%,rgba(200,145,35,.22) 0%,transparent 65%),
    radial-gradient(ellipse 10% 28% at 82% 67%,rgba(200,145,35,.22) 0%,transparent 65%),
    radial-gradient(ellipse 8% 20% at 50% 78%,rgba(220,165,50,.18) 0%,transparent 60%);
}
[data-place="rameshwaram"] .scene-l3{
  /* Bamboo & marigold edges */
  background:
    radial-gradient(ellipse 20% 85% at 0% 60%,rgba(18,45,18,.38) 0%,transparent 60%),
    radial-gradient(ellipse 20% 85% at 100% 60%,rgba(18,45,18,.38) 0%,transparent 60%),
    linear-gradient(to top,rgba(8,6,3,.75) 0%,transparent 18%);
}


@import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;600;700&display=swap');
:root{
  --pbg:linear-gradient(180deg,#f5f0ea,#ede8e0);
  --phdr:rgba(250,248,245,0.92);
  --ptxt:#2c2420;
  --pacc:#7a9e7e;
  --pcard:rgba(255,253,250,0.88);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{overflow-x:hidden;min-height:100%;}
body{font-family:'Jost',sans-serif;color:var(--ptxt);transition:color .6s;}

/* ── SITE HEADER ── */
.site-header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 48px;
  backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,.1);
  transition:background .6s;
}
.brand{display:flex;align-items:center;gap:11px;cursor:pointer;text-decoration:none;}
.brand-emoji{font-size:20px;line-height:1;}
.brand-name{font-family:'Cormorant Garamond',serif;font-size:19px;font-style:italic;color:var(--ptxt);letter-spacing:.03em;transition:color .6s;}
.hdr-right{display:flex;align-items:center;gap:10px;}
.hbtn{
  font-family:'Jost',sans-serif;font-size:9px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--ptxt);background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);
  border-radius:18px;padding:7px 18px;cursor:pointer;transition:all .3s;font-weight:500;
  backdrop-filter:blur(6px);
}
.hbtn:hover{background:rgba(255,255,255,.2);}
.hbtn.accent{background:var(--pacc);border-color:var(--pacc);color:#fff;}

/* ── SCROLL CONTENT ── */
.scroll-content{position:relative;z-index:10;padding-top:72px;min-height:100vh;}
.page-wrap{max-width:820px;margin:0 auto;padding:36px 44px 110px;}

/* ── GLASS CARD ── */
.glass-card{
  background:var(--pcard);
  border:1px solid rgba(255,255,255,.14);
  border-radius:18px;
  padding:26px;
  backdrop-filter:blur(12px);
  box-shadow:0 4px 24px rgba(0,0,0,.18),0 1px 0 rgba(255,255,255,.08) inset;
  transition:background .6s;
}

/* Page titles */
.page-eyebrow{font-family:'Jost',sans-serif;font-size:9px;letter-spacing:.35em;text-transform:uppercase;color:var(--pacc);margin-bottom:10px;font-weight:500;opacity:.85;}
.page-title{font-family:'Playfair Display',serif;font-size:clamp(30px,5vw,50px);font-weight:400;line-height:1.08;color:var(--ptxt);margin-bottom:10px;transition:color .6s;}
.page-title em{font-style:italic;}
.page-sub{font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:var(--ptxt);opacity:.72;margin-bottom:32px;line-height:1.6;letter-spacing:.02em;}

/* Rule */
.rule{display:flex;align-items:center;gap:14px;margin:24px 0;}
.rule-line{flex:1;height:1px;background:rgba(255,255,255,.14);}
.rule-mark{font-size:14px;opacity:.5;color:var(--pacc);}

/* Buttons */
.btn-primary{
  font-family:'Jost',sans-serif;font-size:10px;letter-spacing:.22em;text-transform:uppercase;font-weight:500;
  color:#fff;background:var(--pacc);border:none;border-radius:22px;
  padding:12px 30px;cursor:pointer;transition:all .3s;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
}
.btn-primary:hover{opacity:.88;transform:translateY(-1px);}
.btn-ghost{
  font-family:'Jost',sans-serif;font-size:9px;letter-spacing:.2em;text-transform:uppercase;font-weight:500;
  color:var(--ptxt);background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);
  border-radius:18px;padding:8px 20px;cursor:pointer;transition:all .25s;
}
.btn-ghost:hover{background:rgba(255,255,255,.18);}
.btn-del{
  font-family:'Jost',sans-serif;font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;font-weight:500;
  color:rgba(255,120,100,.8);background:rgba(255,100,80,.1);border:1px solid rgba(255,120,100,.22);
  border-radius:14px;padding:5px 14px;cursor:pointer;transition:all .25s;
}
.btn-del:hover{background:rgba(255,100,80,.2);}

/* Fields */
.field{margin-bottom:18px;}
.field label{display:block;font-family:'Jost',sans-serif;font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--ptxt);opacity:.55;margin-bottom:8px;font-weight:500;}
.field input,.field textarea,.field select{
  width:100%;background:rgba(255,255,255,.1);
  border:1.5px solid rgba(255,255,255,.16);border-radius:12px;
  padding:12px 16px;
  font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--ptxt);
  outline:none;transition:border-color .3s,background .3s;
}
.field input::placeholder,.field textarea::placeholder{color:rgba(255,255,255,.28);font-style:italic;}
.field input:focus,.field textarea:focus{border-color:var(--pacc);background:rgba(255,255,255,.14);}
.field select option{background:#1a1008;color:#f0d8a0;}

/* Toast */
.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(16px);
  background:var(--pcard);border:1px solid rgba(255,255,255,.15);border-radius:22px;
  padding:11px 26px;
  font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;color:var(--ptxt);
  opacity:0;transition:all .4s cubic-bezier(.22,1,.36,1);
  z-index:500;pointer-events:none;white-space:nowrap;
  box-shadow:0 4px 24px rgba(0,0,0,.25);backdrop-filter:blur(10px);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Animations */
@keyframes fu{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:none;}}
@keyframes fi{from{opacity:0;transform:translateY(-12px);}to{opacity:1;transform:none;}}
.afu{animation:fu .75s ease both;}
.afu2{animation:fu .75s ease .12s both;}
.afu3{animation:fu .75s ease .24s both;}
.afu4{animation:fu .75s ease .36s both;}

/* Presence badge */
.online-pill{display:flex;align-items:center;gap:7px;font-family:'Cormorant Garamond',serif;font-size:15px;font-style:italic;opacity:.78;}
.online-dot{width:7px;height:7px;border-radius:50%;background:#6aaa68;flex-shrink:0;animation:odp 2.5s ease infinite;}
.online-dot.away{background:#d4a040;}
.online-dot.off{background:#d06060;animation:none;}
@keyframes odp{0%,100%{box-shadow:0 0 0 0 rgba(106,170,104,.5);}50%{box-shadow:0 0 0 5px rgba(106,170,104,0);}}

/* Admin badge */
.admin-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-family:'Jost',sans-serif;font-size:8px;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(220,180,80,.85);background:rgba(200,160,40,.12);border:1px solid rgba(200,160,40,.22);
  border-radius:10px;padding:3px 10px;font-weight:500;
}

@media(max-width:680px){
  .site-header{padding:14px 18px;}
  .page-wrap{padding:24px 18px 90px;}
}

.cnb{width:34px;height:34px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:50%;color:var(--ptxt);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s;}
.cnb:hover{background:rgba(255,255,255,.2);}
.cmlbl{flex:1;text-align:center;font-family:'Playfair Display',serif;font-size:22px;font-style:italic;color:var(--ptxt);}
.cys{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:var(--ptxt);font-family:'Jost',sans-serif;font-size:14px;padding:5px 12px;border-radius:12px;cursor:pointer;outline:none;}
.cys option{background:#1a1008;color:#f0d8a0;}
.dnames{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:5px;}
.dn{text-align:center;font-family:'Jost',sans-serif;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--ptxt);opacity:.45;padding:5px 0;font-weight:500;}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cd{min-height:60px;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:7px;cursor:pointer;transition:all .22s;display:flex;flex-direction:column;background:rgba(255,255,255,.05);}

.csdt{font-family:'Playfair Display',serif;font-size:19px;font-style:italic;color:var(--ptxt);}

function getPlace(){
  let pid=sessionStorage.getItem('place_id');
  if(!pid){
    const p=PLACES[Math.floor(Math.random()*PLACES.length)];
    sessionStorage.setItem('place_id',p.id);
    pid=p.id;
  }
  return PLACES.find(p=>p.id===pid)||PLACES[0];
}

function applyPlace(place){
  const r=document.documentElement;
  r.style.setProperty('--pbg',place.bg);
  r.style.setProperty('--phdr',place.hdr);
  r.style.setProperty('--ptxt',place.txt);
  r.style.setProperty('--pacc',place.acc);
  r.style.setProperty('--pcard',place.card);
  document.body.setAttribute('data-place',place.id);
  // Apply backgrounds
  const sb=document.getElementById('scene-bg');
  if(sb)sb.style.background=place.bg;
  const hdr=document.querySelector('.site-header');
  if(hdr)hdr.style.background=place.hdr;
  // Backdrop on cards
  document.querySelectorAll('.glass-card').forEach(c=>{c.style.background=place.card;});
}


function initParticles(type){
  const c=document.getElementById('particles');
  if(!c)return;
  const ctx=c.getContext('2d');
  let W,H;
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);

  const configs={
    sand:{count:70,r:[.8,2.2],speed:[.3,.8],drift:.4,color:(a)=>`rgba(220,185,130,${a})`,alpha:[.15,.45]},
    steam:{count:35,r:[4,14],speed:[.4,.9],drift:.25,color:(a)=>`rgba(255,225,180,${a})`,alpha:[.04,.14]},
    petals:{count:55,r:[3,7],speed:[.5,1.2],drift:.7,color:(a)=>{const cs=['rgba(220,130,155,','rgba(240,160,175,','rgba(200,110,140,','rgba(255,180,200,'];return cs[Math.floor(Math.random()*cs.length)]+a+')';}  ,alpha:[.35,.7]},
    smoke:{count:30,r:[5,16],speed:[.25,.6],drift:.35,color:(a)=>`rgba(200,160,100,${a})`,alpha:[.04,.12]},
    dust:{count:60,r:[.7,2],speed:[.2,.5],drift:.3,color:(a)=>`rgba(215,170,110,${a})`,alpha:[.18,.5]},
    splash:{count:55,r:[1.2,3.5],speed:[.4,1.1],drift:.5,color:(a)=>`rgba(160,225,255,${a})`,alpha:[.2,.55]},
    firefly:{count:40,r:[1.5,3.5],speed:[.15,.4],drift:.6,color:(a)=>`rgba(255,205,70,${a})`,alpha:[.3,.8]}
  };

  const cfg=configs[type]||configs.dust;
  const motes=[];
  for(let i=0;i<cfg.count;i++){
    const r=cfg.r[0]+Math.random()*(cfg.r[1]-cfg.r[0]);
    motes.push({
      x:Math.random()*window.innerWidth,
      y:Math.random()*window.innerHeight,
      r,
      vx:(Math.random()-.5)*cfg.drift,
      vy:-(cfg.speed[0]+Math.random()*(cfg.speed[1]-cfg.speed[0])),
      a:cfg.alpha[0]+Math.random()*(cfg.alpha[1]-cfg.alpha[0]),
      maxA:cfg.alpha[0]+Math.random()*(cfg.alpha[1]-cfg.alpha[0]),
      phase:Math.random()*Math.PI*2,
      freq:Math.random()*.008+.003,
      pulse:type==='firefly'?Math.random()*.04+.02:0,
      color:cfg.color
    });
  }

  // Petals are rotated
  const isPetal=type==='petals';
  const isFirefly=type==='firefly';

  let t=0;
  function draw(){
    ctx.clearRect(0,0,W,H);t+=.008;
    for(const m of motes){
      // Movement
      m.x+=m.vx+Math.sin(t*m.freq+m.phase)*(type==='petals'?.8:.35);
      m.y+=m.vy;
      if(isFirefly){
        m.a=m.maxA*(0.4+0.6*Math.abs(Math.sin(t*m.pulse+m.phase)));
      }
      if(m.y<-20){m.y=H+20;m.x=Math.random()*W;}
      if(m.x<-20)m.x=W+20;if(m.x>W+20)m.x=-20;

      ctx.save();
      ctx.globalAlpha=m.a;
      if(isPetal){
        ctx.translate(m.x,m.y);
        ctx.rotate(t*m.freq*3+m.phase);
        ctx.beginPath();
        ctx.ellipse(0,0,m.r*1.6,m.r*.8,0,0,Math.PI*2);
        ctx.fillStyle=m.color(1);
        ctx.fill();
      } else if(type==='steam'||type==='smoke'){
        const grad=ctx.createRadialGradient(m.x,m.y,0,m.x,m.y,m.r);
        grad.addColorStop(0,m.color(.9));
        grad.addColorStop(1,m.color(0));
        ctx.beginPath();ctx.arc(m.x,m.y,m.r,0,Math.PI*2);
        ctx.fillStyle=grad;ctx.fill();
      } else {
        ctx.beginPath();ctx.arc(m.x,m.y,m.r,0,Math.PI*2);
        ctx.fillStyle=m.color(1);ctx.fill();
      }
      ctx.restore();
    }
    requestAnimationFrame(draw);
  }
  draw();
}

if(!user)window.location.href='index.html';
const isAdmin=user==='Abhi';

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');}

const _calp=getPlace();document.getElementById('pe4').textContent=_calp.emoji;document.getElementById('pn4').textContent=_calp.name;
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const today=new Date();let cY=today.getFullYear(),cM=today.getMonth(),selDate=null,selType='memory',allFilter='all',pendId=null;
let _evs=[];
const ys=document.getElementById('ys');
for(let y=1950;y<=2100;y++){const o=document.createElement('option');o.value=y;o.textContent=y;if(y===cY)o.selected=true;ys.appendChild(o);}
function setYear(y){cY=parseInt(y);renderCal();}
function prevM(){cM--;if(cM<0){cM=11;cY--;ys.value=cY;}renderCal();}
function nextM(){cM++;if(cM>11){cM=0;cY++;ys.value=cY;}renderCal();}
function dk(y,m,d){return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');}
async function loadEvs(){const{data}=await db.from('calendar_events').select('*');_evs=data||[];renderCal();}
function renderCal(){
  document.getElementById('ml').textContent=MONTHS[cM];ys.value=cY;
  const map={};_evs.forEach(e=>{if(!map[e.date])map[e.date]=[];map[e.date].push(e);});
  const fd=new Date(cY,cM,1).getDay(),dim=new Date(cY,cM+1,0).getDate(),pd=new Date(cY,cM,0).getDate();
  const tk=dk(today.getFullYear(),today.getMonth(),today.getDate());
  let h='';
  for(let i=0;i<fd;i++)h+=`<div class="cd om"><div class="cdn">${pd-fd+1+i}</div></div>`;
  for(let d=1;d<=dim;d++){
    const key=dk(cY,cM,d),isT=key===tk,isS=key===selDate,de=map[key]||[],hasE=de.length>0;
    const dots=de.slice(0,2).map(e=>`<div class="cdd">${e.title}</div>`).join('')+(de.length>2?`<div class="cdd">+${de.length-2}</div>`:'');
    h+=`<div class="cd${isT?' today':''}${isS?' sel':''}${hasE?' he':''}" onclick="selDay('${key}')"><div class="cdn">${d}</div><div class="cddots">${dots}</div></div>`;
  }
  const tot=fd+dim,rem=tot%7===0?0:7-(tot%7);
  for(let i=1;i<=rem;i++)h+=`<div class="cd om"><div class="cdn">${i}</div></div>`;
  document.getElementById('cg').innerHTML=h;
  if(selDate)renderSel(selDate);renderAll();
}
function selDay(key){selDate=key;const[y,m,d]=key.split('-');document.getElementById('sdt').textContent=MONTHS[parseInt(m)-1]+' '+parseInt(d)+', '+y;document.getElementById('sds').textContent='mark this day';document.getElementById('add-form').style.display='flex';document.getElementById('add-form').style.flexDirection='column';document.getElementById('et').focus();renderCal();}
function renderSel(key){const evs=_evs.filter(e=>e.date===key),w=document.getElementById('sew'),l=document.getElementById('sel');if(!evs.length){w.style.display='none';return;}w.style.display='block';l.innerHTML=evs.map(e=>`<div class="sev"><div class="sevdot"></div><div class="sev-t">${esc(e.title)}</div>${isAdmin?`<button class="sev-del" onclick="askD('${e.id}','${esc(e.title)}')">&times;</button>`:''}</div>`).join('');}
function renderAll(){let fil=_evs;if(allFilter!=='all')fil=_evs.filter(e=>e.type===allFilter);fil.sort((a,b)=>a.date.localeCompare(b.date));document.getElementById('ac').textContent=fil.length+' date'+(fil.length===1?'':'s');const g=document.getElementById('ag');if(!fil.length){g.innerHTML='<div class="all-empty">No days marked yet.</div>';return;}g.innerHTML=fil.map((e,i)=>{const[y,m,d]=e.date.split('-'),fr=MONTHS[parseInt(m)-1]+' '+parseInt(d)+', '+y;return `<div class="dc" style="animation-delay:${Math.min(i*.04,.4)}s"><div class="dc-str"></div><div class="dc-body"><div class="dc-title">${esc(e.title)}</div><div class="dc-meta"><span class="dc-date">✿ ${fr}</span><span class="tc">${e.type}</span></div></div>${isAdmin?`<button class="btn-del" style="font-size:8px;padding:4px 10px;margin-top:2px" onclick="askD('${e.id}','${esc(e.title)}')" >Remove</button>`:''}</div>`;}). join('');}
function setAF(f,btn){allFilter=f;document.querySelectorAll('.af').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderAll();}
function setType(t,btn){selType=t;document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
async function saveEv(){const title=document.getElementById('et').value.trim();if(!title||!selDate)return;await db.from('calendar_events').insert({id:uid(),date:selDate,title,type:selType,by_user:user});document.getElementById('et').value='';await loadEvs();showToast('Day marked ✿');}
function askD(id,title){if(!isAdmin)return;pendId=id;document.getElementById('cn').textContent='"'+title+'"';document.getElementById('ov').classList.add('open');}
function closeC(){pendId=null;document.getElementById('ov').classList.remove('open');}
async function confirmD(){if(!pendId)return;await db.from('calendar_events').delete().eq('id',pendId);closeC();await loadEvs();showToast('Removed');}

  async function check(){
    if(notifShown)return;
    const lr=parseInt(localStorage.getItem('lastRead_'+user)||'0');
    try{
      const{data}=await db.from('messages').select('id,ts').eq('sender',other).gt('ts',lr).limit(1);
      if(data&&data.length>0){
        const msgs=user==='Ganu'?MSGS_GANU:MSGS_ABHI;
        document.getElementById('msg-notif-text').textContent=msgs[Math.floor(Math.random()*msgs.length)];
        notifEl.style.opacity='1';notifEl.style.transform='translateX(0)';notifEl.style.pointerEvents='auto';
        notifShown=true;
        setTimeout(()=>{notifEl.style.opacity='0';notifEl.style.transform='translateX(20px)';notifEl.style.pointerEvents='none';},10000);
      }
    }catch(e){}
  }
  setTimeout(check,4000);setInterval(check,18000);
})();


// ── PLACE QUESTION NOTIFICATION ──
(function(){
  const user=localStorage.getItem('user');
  if(!user||user!=='Ganu')return; // Only for Ganu

  const place=getPlace();
  const sk='place_replied_'+place.id;
  if(sessionStorage.getItem(sk))return; // Already replied this session

  // Show after 90 seconds
  setTimeout(()=>{
    showPlaceQuestion(place);
  },90000);

  function showPlaceQuestion(p){
    // Build notification
    const notif=document.createElement('div');
    notif.id='place-notif';
    notif.style.cssText=`
      position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(30px);
      max-width:340px;width:92%;
      background:var(--pcard,rgba(20,12,6,.9));
      border:1px solid rgba(255,255,255,.12);
      border-radius:18px;
      padding:20px 20px 16px;
      z-index:300;
      box-shadow:0 8px 40px rgba(0,0,0,.4);
      opacity:0;
      transition:all .6s cubic-bezier(.22,1,.36,1);
      backdrop-filter:blur(12px);
    `;

    notif.innerHTML=`
      <div style="font-family:'Dancing Script',cursive;font-size:13px;color:var(--pacc,#e8a040);margin-bottom:10px;letter-spacing:.04em">Abhi is asking ✿</div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;color:var(--ptxt,#f0d8a0);line-height:1.55;margin-bottom:14px">${p.question}</div>
      <textarea id="place-reply" placeholder="Tell him..." style="
        width:100%;min-height:68px;
        background:rgba(255,255,255,.08);
        border:1px solid rgba(255,255,255,.14);
        border-radius:10px;
        padding:10px 12px;
        font-family:'Cormorant Garamond',serif;font-size:16px;
        color:var(--ptxt,#f0d8a0);
        resize:none;outline:none;
        line-height:1.6;
      " placeholder="Tell him..."></textarea>
      <div style="display:flex;gap:8px;margin-top:10px;justify-content:flex-end">
        <button onclick="dismissPlaceNotif()" style="
          font-family:'Jost',sans-serif;font-size:9px;letter-spacing:.18em;text-transform:uppercase;
          background:transparent;border:1px solid rgba(255,255,255,.15);border-radius:16px;
          padding:7px 16px;color:rgba(255,255,255,.4);cursor:pointer;
        ">Later</button>
        <button onclick="sendPlaceReply('${p.id}','${p.name}')" style="
          font-family:'Jost',sans-serif;font-size:9px;letter-spacing:.18em;text-transform:uppercase;
          background:var(--pacc,#e8a040);border:none;border-radius:16px;
          padding:7px 18px;color:#fff;cursor:pointer;font-weight:500;
        ">Send to Abhi ✿</button>
      </div>
    `;

    document.body.appendChild(notif);
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        notif.style.opacity='1';
        notif.style.transform='translateX(-50%) translateY(0)';
      });
    });
  }
})();

function dismissPlaceNotif(){
  const n=document.getElementById('place-notif');
  if(!n)return;
  n.style.opacity='0';n.style.transform='translateX(-50%) translateY(30px)';
  setTimeout(()=>n.remove(),600);
}

async function sendPlaceReply(placeId,placeName){
  const text=document.getElementById('place-reply')?.value?.trim();
  if(!text)return;
  try{
    await db.from('place_replies').insert({
      place_id:placeId,
      place_name:placeName,
      reply:text,
      replied_by:'Ganu',
      replied_at:Date.now()
    });
    sessionStorage.setItem('place_replied_'+placeId,'1');
    dismissPlaceNotif();
    // Show thank you
    setTimeout(()=>showToast('Abhi will see that ✿'),400);
  }catch(e){
    console.error(e);
    dismissPlaceNotif();
  }
}


(function(){
  if(typeof db==='undefined')return;
  let items=[];
  let active=null;

  async function load(){
    try{const{data}=await db.from('gallery').select('id,url,data,type').limit(20);items=(data||[]).filter(i=>i.url||i.data);}catch(e){}
  }

  function show(){
    if(!items.length)return;
    if(active){active.style.opacity='0';setTimeout(()=>{if(active){active.remove();active=null;}},1000);}
    const item=items[Math.floor(Math.random()*items.length)];
    const src=item.url||item.data||'';if(!src)return;
    const el=document.createElement('div');
    const positions=[
      {bottom:'18%',left:'14px',width:'148px',height:'200px',borderRadius:'12px'},
      {bottom:'18%',right:'14px',left:'auto',width:'148px',height:'200px',borderRadius:'12px'},
      {top:'88px',left:'14px',width:'178px',height:'130px',borderRadius:'12px'},
      {top:'88px',right:'14px',left:'auto',width:'178px',height:'130px',borderRadius:'12px'},
    ];
    const pos=positions[Math.floor(Math.random()*positions.length)];
    Object.assign(el.style,{
      position:'fixed',zIndex:'180',overflow:'hidden',
      boxShadow:'0 8px 32px rgba(0,0,0,.35)',
      border:'2px solid rgba(255,255,255,.15)',
      opacity:'0',transition:'opacity 1s ease',
      ...pos
    });
    if(item.type==='video'){
      const v=document.createElement('video');
      v.src=src;v.muted=true;v.autoplay=true;v.loop=true;v.playsInline=true;
      v.style.cssText='width:100%;height:100%;object-fit:cover;display:block;';
      el.appendChild(v);
    } else {
      const img=document.createElement('img');
      img.src=src;img.style.cssText='width:100%;height:100%;object-fit:cover;display:block;';
      el.appendChild(img);
    }
    const cap=document.createElement('div');
    cap.style.cssText='position:absolute;bottom:0;left:0;right:0;padding:8px 10px;background:linear-gradient(transparent,rgba(0,0,0,.45));font-family:"Dancing Script",cursive;font-size:12px;color:rgba(255,255,255,.88);letter-spacing:.03em;';
    const captions=['a moment kept','remember this?','still here','always','us'];
    cap.textContent=captions[Math.floor(Math.random()*captions.length)];
    el.appendChild(cap);
    document.body.appendChild(el);active=el;
    requestAnimationFrame(()=>requestAnimationFrame(()=>{el.style.opacity='1';}));
    setTimeout(()=>{el.style.opacity='0';setTimeout(()=>{if(el.parentNode)el.remove();if(active===el)active=null;},1000);},7000);
  }

  load();
  setTimeout(()=>{show();setInterval(()=>show(),Math.random()*120000+180000);},45000);
  setInterval(load,600000);
})();

</script>
