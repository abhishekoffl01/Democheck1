<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Calendar · Our World</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Lato:wght@300;400;700&family=Dancing+Script:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#160808;--surface:#1e0d0d;--surface2:#261010;--blush:#e8b4b8;--rose:#c97b84;--deep-rose:#8b3a42;--cream:#f5ede4;--cream2:#ede0d4;--text:#f0e4dc;--muted:#8a6a68;--border:rgba(232,180,184,0.15);--glow:rgba(201,123,132,0.13);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
.bg-warm{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 70% 60% at 50% 110%,rgba(100,30,30,.5) 0%,transparent 65%),radial-gradient(ellipse 50% 40% at 0% 0%,rgba(60,18,18,.3) 0%,transparent 55%);}
.page{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:22px 52px;border-bottom:1px solid var(--border);flex-shrink:0;}
.brand{display:flex;align-items:center;gap:12px;}
.brand-heart{font-size:18px;animation:heartbeat 2.8s ease-in-out infinite;filter:drop-shadow(0 0 7px rgba(200,100,100,.4));}
@keyframes heartbeat{0%,100%{transform:scale(1);}14%{transform:scale(1.18);}28%{transform:scale(1);}42%{transform:scale(1.1);}56%{transform:scale(1);}}
.brand-name{font-family:'Dancing Script',cursive;font-size:20px;color:var(--blush);opacity:.8;}
.back-btn{font-size:11px;letter-spacing:.12em;color:var(--muted);background:transparent;border:1px solid rgba(138,106,104,.3);border-radius:2px;padding:7px 16px;cursor:pointer;transition:all .25s;text-transform:uppercase;font-family:'Lato',sans-serif;}
.back-btn:hover{color:var(--blush);border-color:var(--border);}

/* BODY LAYOUT */
.cal-layout{flex:1;display:grid;grid-template-columns:1fr 320px;gap:0;overflow:hidden;}

/* LEFT: CALENDAR */
.cal-main{padding:40px 44px 40px 52px;overflow-y:auto;display:flex;flex-direction:column;gap:28px;}

/* Nav bar */
.cal-nav{display:flex;align-items:center;gap:0;animation:fadeUp .7s ease .1s both;}
.nav-btn{background:transparent;border:1px solid var(--border);color:var(--muted);width:36px;height:36px;border-radius:2px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s;flex-shrink:0;}
.nav-btn:hover{color:var(--blush);border-color:rgba(201,123,132,.35);}
.cal-month-label{flex:1;text-align:center;font-family:'Playfair Display',serif;font-size:26px;font-weight:400;color:var(--cream);font-style:italic;letter-spacing:.02em;}
.year-select{background:transparent;border:1px solid var(--border);color:var(--blush);font-family:'Dancing Script',cursive;font-size:17px;padding:4px 10px;border-radius:2px;cursor:pointer;outline:none;transition:border-color .25s;}
.year-select:hover{border-color:rgba(201,123,132,.35);}
.year-select option{background:#1e0d0d;color:var(--text);}

/* Days header */
.days-header{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;animation:fadeUp .7s ease .15s both;}
.day-name{text-align:center;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding:6px 0;}

/* Calendar grid */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;animation:fadeUp .7s ease .2s both;}
.cal-day{min-height:68px;border:1px solid transparent;border-radius:3px;padding:8px 10px 6px;position:relative;cursor:pointer;transition:all .3s;display:flex;flex-direction:column;}
.cal-day:hover{background:rgba(201,123,132,.08);border-color:rgba(201,123,132,.2);}
.cal-day.other-month{opacity:.28;pointer-events:none;}
.cal-day.today .day-num{color:var(--rose);font-weight:700;}
.cal-day.today{background:rgba(201,123,132,.06);border-color:rgba(201,123,132,.18);}
.cal-day.has-event{background:rgba(201,123,132,.1);border-color:rgba(201,123,132,.25);}
.cal-day.selected{background:rgba(201,123,132,.16);border-color:var(--rose);}
.day-num{font-size:14px;color:var(--text);font-weight:400;line-height:1;margin-bottom:4px;transition:color .2s;}
.day-events{display:flex;flex-direction:column;gap:3px;flex:1;overflow:hidden;}
.day-dot{font-size:9px;color:var(--blush);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;letter-spacing:.02em;}
.day-dot.anniversary{color:#e8a870;}
.day-dot.birthday{color:#b0c8e8;}
.day-dot.special{color:#d4a0c8;}

/* RIGHT: SIDEBAR */
.cal-sidebar{border-left:1px solid var(--border);padding:36px 32px;overflow-y:auto;display:flex;flex-direction:column;gap:24px;}

.sidebar-date{font-family:'Playfair Display',serif;font-size:22px;font-style:italic;color:var(--cream);margin-bottom:4px;}
.sidebar-sub{font-size:12px;color:var(--muted);font-style:italic;letter-spacing:.04em;margin-bottom:20px;}

/* Add event form */
.add-form{display:flex;flex-direction:column;gap:12px;}
.form-label{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);}
.form-input{background:rgba(255,240,235,.04);border:none;border-bottom:1px solid rgba(232,180,184,.2);padding:10px 4px;font-family:'Lato',sans-serif;font-size:14px;color:var(--cream);outline:none;letter-spacing:.02em;transition:border-color .3s;width:100%;}
.form-input::placeholder{color:var(--muted);font-style:italic;}
.form-input:focus{border-bottom-color:var(--rose);}
.type-row{display:flex;gap:8px;flex-wrap:wrap;}
.type-btn{font-size:10px;letter-spacing:.1em;padding:5px 12px;background:transparent;border:1px solid var(--border);border-radius:12px;color:var(--muted);cursor:pointer;transition:all .25s;font-family:'Lato',sans-serif;}
.type-btn.active{color:var(--blush);border-color:rgba(201,123,132,.35);background:rgba(201,123,132,.08);}
.save-btn{font-family:'Playfair Display',serif;font-size:14px;font-style:italic;color:var(--blush);background:transparent;border:1px solid var(--rose);border-radius:2px;padding:10px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden;}
.save-btn::before{content:'';position:absolute;inset:0;background:rgba(201,123,132,.12);transform:translateX(-101%);transition:transform .35s cubic-bezier(.22,1,.36,1);}
.save-btn:hover{color:var(--cream);}
.save-btn:hover::before{transform:translateX(0);}
.save-btn span{position:relative;z-index:1;}

/* Event list in sidebar */
.events-section{flex:1;}
.events-label{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.events-label::after{content:'';flex:1;height:1px;background:var(--border);}
.event-item{padding:10px 12px;background:rgba(201,123,132,.07);border:1px solid rgba(201,123,132,.15);border-radius:2px;margin-bottom:8px;display:flex;align-items:flex-start;gap:8px;animation:fadeIn .3s ease both;}
.event-dot-lg{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.event-dot-lg.anniversary{background:#e8a870;}
.event-dot-lg.birthday{background:#b0c8e8;}
.event-dot-lg.special{background:#d4a0c8;}
.event-dot-lg.memory{background:var(--rose);}
.event-info{flex:1;}
.event-title-sm{font-family:'Dancing Script',cursive;font-size:16px;color:var(--cream);line-height:1.2;}
.event-type-sm{font-size:10px;color:var(--muted);letter-spacing:.06em;text-transform:capitalize;}
.event-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;line-height:1;transition:color .2s;flex-shrink:0;padding:0 2px;}
.event-del:hover{color:#c07070;}

/* All marked dates list (scrollable) */
.all-dates{display:flex;flex-direction:column;gap:6px;max-height:240px;overflow-y:auto;padding-right:4px;scrollbar-width:thin;scrollbar-color:rgba(201,123,132,.15) transparent;}

.no-events{font-family:'Dancing Script',cursive;font-size:15px;color:var(--muted);font-style:italic;text-align:center;padding:16px 0;}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:none;}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(22,8,8,.95);border:1px solid rgba(201,123,132,.22);border-radius:2px;padding:10px 28px;font-family:'Dancing Script',cursive;font-size:15px;color:var(--blush);opacity:0;transition:all .3s ease;z-index:100;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:800px){
  .cal-layout{grid-template-columns:1fr;}
  .cal-sidebar{border-left:none;border-top:1px solid var(--border);}
  .cal-main{padding:24px 20px;}
  .cal-sidebar{padding:24px 20px;}
  .header{padding:18px 20px;}
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="bg-warm"></div>
<div class="page">

<header class="header">
  <div class="brand"><span class="brand-heart">🌹</span><span class="brand-name">Our Calendar</span></div>
  <button class="back-btn" onclick="window.location.href='home.html'">← Home</button>
</header>

<div class="cal-layout">
  <!-- LEFT -->
  <div class="cal-main">
    <div class="cal-nav">
      <button class="nav-btn" onclick="prevMonth()">‹</button>
      <div class="cal-month-label" id="month-label">—</div>
      <select class="year-select" id="year-select" onchange="setYear(this.value)"></select>
      <button class="nav-btn" onclick="nextMonth()">›</button>
    </div>
    <div class="days-header">
      <div class="day-name">Sun</div><div class="day-name">Mon</div><div class="day-name">Tue</div>
      <div class="day-name">Wed</div><div class="day-name">Thu</div><div class="day-name">Fri</div><div class="day-name">Sat</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <!-- RIGHT SIDEBAR -->
  <div class="cal-sidebar">
    <div>
      <div class="sidebar-date" id="sel-date">Select a date</div>
      <div class="sidebar-sub" id="sel-sub">click any day to mark it ♥</div>
    </div>

    <!-- Add event -->
    <div class="add-form" id="add-form" style="display:none">
      <div class="form-label">Event name</div>
      <input class="form-input" id="ev-title" type="text" placeholder="e.g. Our first date ♥" maxlength="60">
      <div class="form-label">Type</div>
      <div class="type-row">
        <button class="type-btn active" onclick="setType('memory',this)">♥ Memory</button>
        <button class="type-btn" onclick="setType('anniversary',this)">🌹 Anniversary</button>
        <button class="type-btn" onclick="setType('birthday',this)">🎂 Birthday</button>
        <button class="type-btn" onclick="setType('special',this)">✨ Special</button>
      </div>
      <button class="save-btn" onclick="saveEvent()"><span>Mark this day ♥</span></button>
    </div>

    <!-- Events on selected date -->
    <div class="events-section">
      <div class="events-label">Marked Dates</div>
      <div id="events-list"><div class="no-events">No dates marked yet</div></div>
    </div>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
// Petals
(function(){const c=document.getElementById('c'),ctx=c.getContext('2d');let W,H;function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}resize();window.addEventListener('resize',resize);const S=['❤','♥','·','·','✿','·'],ps=[];for(let i=0;i<40;i++)ps.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight+window.innerHeight,sym:S[Math.floor(Math.random()*S.length)],size:Math.random()*8+4,speed:Math.random()*.4+.15,drift:(Math.random()-.5)*.3,alpha:Math.random()*.15+.04,rot:Math.random()*Math.PI*2,rotSpeed:(Math.random()-.5)*.01,phase:Math.random()*Math.PI*2,sway:Math.random()*.5+.2});let t=0;function draw(){ctx.clearRect(0,0,W,H);t+=.01;for(const p of ps){p.y-=p.speed;p.x+=Math.sin(t*p.sway+p.phase)*p.drift;p.rot+=p.rotSpeed;if(p.y<-30){p.y=H+20;p.x=Math.random()*W;}ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.globalAlpha=p.alpha;ctx.font=p.size+'px serif';ctx.fillStyle=(p.sym==='·'||p.sym==='✿')?'rgba(240,215,205,1)':'rgba(210,120,130,1)';ctx.textAlign='center';ctx.fillText(p.sym,0,0);ctx.restore();}requestAnimationFrame(draw);}draw();})();

const user=localStorage.getItem('user');
if(!user)window.location.href='index.html';

const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const today=new Date();
let curYear=today.getFullYear();
let curMonth=today.getMonth(); // 0-indexed
let selDate=null; // 'YYYY-MM-DD'
let selType='memory';

// Build year selector: 1950 to 2100
const ys=document.getElementById('year-select');
for(let y=1950;y<=2100;y++){
  const opt=document.createElement('option');
  opt.value=y;opt.textContent=y;
  if(y===curYear)opt.selected=true;
  ys.appendChild(opt);
}

function setYear(y){curYear=parseInt(y);renderCal();}
function prevMonth(){curMonth--;if(curMonth<0){curMonth=11;curYear--;ys.value=curYear;}renderCal();}
function nextMonth(){curMonth++;if(curMonth>11){curMonth=0;curYear++;ys.value=curYear;}renderCal();}

function getEvents(){return JSON.parse(localStorage.getItem('cal_events'))||[];}
function saveEvents(e){localStorage.setItem('cal_events',JSON.stringify(e));}

function dateKey(y,m,d){return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');}

function renderCal(){
  document.getElementById('month-label').textContent=MONTHS[curMonth];
  ys.value=curYear;
  const events=getEvents();
  const eventMap={};
  events.forEach(e=>{if(!eventMap[e.date])eventMap[e.date]=[];eventMap[e.date].push(e);});

  const first=new Date(curYear,curMonth,1).getDay();
  const daysInMonth=new Date(curYear,curMonth+1,0).getDate();
  const prevDays=new Date(curYear,curMonth,0).getDate();

  const grid=document.getElementById('cal-grid');
  let html='';
  const todayKey=dateKey(today.getFullYear(),today.getMonth(),today.getDate());

  // Previous month tail
  for(let i=0;i<first;i++){
    const d=prevDays-first+1+i;
    html+=`<div class="cal-day other-month"><div class="day-num">${d}</div></div>`;
  }
  // Current month
  for(let d=1;d<=daysInMonth;d++){
    const key=dateKey(curYear,curMonth,d);
    const isToday=key===todayKey;
    const isSel=key===selDate;
    const dayEvts=eventMap[key]||[];
    const hasEv=dayEvts.length>0;
    const evHtml=dayEvts.slice(0,2).map(e=>`<div class="day-dot ${e.type}">${e.title}</div>`).join('');
    html+=`<div class="cal-day${isToday?' today':''}${isSel?' selected':''}${hasEv?' has-event':''}" onclick="selectDay('${key}',${d})">
      <div class="day-num">${d}</div>
      <div class="day-events">${evHtml}${dayEvts.length>2?`<div class="day-dot">+${dayEvts.length-2} more</div>`:''}</div>
    </div>`;
  }
  // Next month fill
  const total=first+daysInMonth;
  const rem=total%7===0?0:7-(total%7);
  for(let i=1;i<=rem;i++) html+=`<div class="cal-day other-month"><div class="day-num">${i}</div></div>`;
  grid.innerHTML=html;

  // Update sidebar if selection exists
  if(selDate)updateSidebar(selDate);
  updateAllEvents();
}

function selectDay(key,d){
  selDate=key;
  renderCal();
  const [y,m,day]=key.split('-');
  document.getElementById('sel-date').textContent=MONTHS[parseInt(m)-1]+' '+parseInt(day)+', '+y;
  document.getElementById('sel-sub').textContent='add a memory for this day ♥';
  document.getElementById('add-form').style.display='flex';
  document.getElementById('ev-title').focus();
  updateSidebar(key);
}

function updateSidebar(key){
  const events=getEvents().filter(e=>e.date===key);
  const list=document.getElementById('events-list');
  if(events.length===0){list.innerHTML='<div class="no-events">Nothing marked yet</div>';return;}
  list.innerHTML=events.map(e=>`
    <div class="event-item">
      <div class="event-dot-lg ${e.type}"></div>
      <div class="event-info">
        <div class="event-title-sm">${esc(e.title)}</div>
        <div class="event-type-sm">${e.type}</div>
      </div>
      <button class="event-del" onclick="delEvent('${e.id}')">×</button>
    </div>`).join('');
}

function updateAllEvents(){
  // Show all upcoming events across all time in sidebar bottom (already done via sidebar — this is the global list when no day selected)
  if(!selDate){
    const all=getEvents().sort((a,b)=>a.date.localeCompare(b.date));
    const list=document.getElementById('events-list');
    if(all.length===0){list.innerHTML='<div class="no-events">No dates marked yet</div>';return;}
    list.innerHTML='<div class="all-dates">'+all.map(e=>`
      <div class="event-item">
        <div class="event-dot-lg ${e.type}"></div>
        <div class="event-info">
          <div class="event-title-sm">${esc(e.title)}</div>
          <div class="event-type-sm">${e.date} · ${e.type}</div>
        </div>
        <button class="event-del" onclick="delEvent('${e.id}')">×</button>
      </div>`).join('')+'</div>';
  }
}

function setType(t,btn){
  selType=t;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function saveEvent(){
  const title=document.getElementById('ev-title').value.trim();
  if(!title||!selDate)return;
  const events=getEvents();
  events.push({id:Date.now()+'_'+Math.random().toString(36).slice(2),date:selDate,title,type:selType,by:user});
  saveEvents(events);
  document.getElementById('ev-title').value='';
  renderCal();
  showToast('Date marked ♥');
}

function delEvent(id){
  const events=getEvents().filter(e=>e.id!==id);
  saveEvents(events);
  renderCal();
  showToast('Removed ♥');
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

// Enter to save
document.getElementById('ev-title').addEventListener('keydown',e=>{if(e.key==='Enter')saveEvent();});

renderCal();
</script>
</body>
</html>
