<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Calendar · Our World</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Lato:wght@300;400;700&family=Dancing+Script:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#160808;--surface:#1e0d0d;--surface2:#261010;
  --blush:#e8b4b8;--rose:#c97b84;--deep-rose:#8b3a42;
  --cream:#f5ede4;--text:#f0e4dc;--muted:#8a6a68;
  --border:rgba(232,180,184,0.15);--glow:rgba(201,123,132,0.13);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}
canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
.bg-warm{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 60% at 50% 110%,rgba(100,30,30,.5) 0%,transparent 65%),
    radial-gradient(ellipse 50% 40% at 0% 0%,rgba(60,18,18,.3) 0%,transparent 55%);}
.page{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh;}

/* ── HEADER ── */
.header{display:flex;align-items:center;justify-content:space-between;padding:22px 52px;border-bottom:1px solid var(--border);flex-shrink:0;position:sticky;top:0;z-index:50;background:rgba(22,8,8,.92);backdrop-filter:blur(14px);}
.brand{display:flex;align-items:center;gap:12px;}
.brand-heart{font-size:18px;animation:heartbeat 2.8s ease-in-out infinite;filter:drop-shadow(0 0 7px rgba(200,100,100,.4));}
@keyframes heartbeat{0%,100%{transform:scale(1);}14%{transform:scale(1.18);}28%{transform:scale(1);}42%{transform:scale(1.1);}56%{transform:scale(1);}}
.brand-name{font-family:'Dancing Script',cursive;font-size:20px;color:var(--blush);opacity:.8;}
.back-btn{font-size:11px;letter-spacing:.12em;color:var(--muted);background:transparent;border:1px solid rgba(138,106,104,.3);border-radius:2px;padding:7px 16px;cursor:pointer;transition:all .25s;text-transform:uppercase;font-family:'Lato',sans-serif;}
.back-btn:hover{color:var(--blush);border-color:var(--border);}

/* ── TOP LAYOUT: calendar + add-sidebar side by side ── */
.top-layout{display:grid;grid-template-columns:1fr 300px;border-bottom:1px solid var(--border);}

/* ── CALENDAR PANEL ── */
.cal-panel{padding:36px 40px 36px 52px;display:flex;flex-direction:column;gap:24px;}

.cal-nav{display:flex;align-items:center;gap:6px;}
.nav-btn{background:transparent;border:1px solid var(--border);color:var(--muted);width:36px;height:36px;border-radius:2px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s;flex-shrink:0;}
.nav-btn:hover{color:var(--blush);border-color:rgba(201,123,132,.35);}
.cal-month-label{flex:1;text-align:center;font-family:'Playfair Display',serif;font-size:24px;font-weight:400;color:var(--cream);font-style:italic;letter-spacing:.02em;}
.year-select{background:rgba(30,13,13,.9);border:1px solid var(--border);color:var(--blush);font-family:'Dancing Script',cursive;font-size:16px;padding:4px 10px;border-radius:2px;cursor:pointer;outline:none;transition:border-color .25s;}
.year-select:hover{border-color:rgba(201,123,132,.35);}
.year-select option{background:#1e0d0d;color:var(--text);}

.days-header{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.day-name{text-align:center;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding:5px 0;}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.cal-day{min-height:62px;border:1px solid transparent;border-radius:3px;padding:7px 8px 5px;position:relative;cursor:pointer;transition:all .25s;display:flex;flex-direction:column;}
.cal-day:hover{background:rgba(201,123,132,.08);border-color:rgba(201,123,132,.2);}
.cal-day.other-month{opacity:.22;pointer-events:none;}
.cal-day.today{background:rgba(201,123,132,.07);border-color:rgba(201,123,132,.2);}
.cal-day.today .day-num{color:var(--rose);font-weight:700;}
.cal-day.has-event{background:rgba(201,123,132,.1);border-color:rgba(201,123,132,.22);}
.cal-day.selected{background:rgba(201,123,132,.18);border-color:var(--rose);box-shadow:0 0 12px rgba(201,123,132,.15);}
.day-num{font-size:13px;color:var(--text);font-weight:400;line-height:1;margin-bottom:4px;}
.day-dots{display:flex;flex-direction:column;gap:2px;flex:1;overflow:hidden;}
.day-dot{font-size:8.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
.day-dot.memory{color:var(--blush);}
.day-dot.anniversary{color:#e8a870;}
.day-dot.birthday{color:#b0c8e8;}
.day-dot.special{color:#d4a0c8;}

/* ── ADD EVENT SIDEBAR ── */
.add-sidebar{border-left:1px solid var(--border);padding:36px 28px 36px 28px;display:flex;flex-direction:column;gap:18px;}

.sel-date-title{font-family:'Playfair Display',serif;font-size:20px;font-style:italic;color:var(--cream);line-height:1.2;min-height:28px;}
.sel-date-sub{font-size:12px;color:var(--muted);font-style:italic;letter-spacing:.04em;}

.add-form{display:flex;flex-direction:column;gap:12px;}
.form-label{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);}
.form-input{background:rgba(255,240,235,.04);border:none;border-bottom:1px solid rgba(232,180,184,.2);padding:10px 4px;font-family:'Lato',sans-serif;font-size:14px;color:var(--cream);outline:none;width:100%;transition:border-color .3s;}
.form-input::placeholder{color:var(--muted);font-style:italic;}
.form-input:focus{border-bottom-color:var(--rose);}
.type-row{display:flex;gap:6px;flex-wrap:wrap;}
.type-btn{font-size:10px;letter-spacing:.08em;padding:5px 11px;background:transparent;border:1px solid var(--border);border-radius:12px;color:var(--muted);cursor:pointer;transition:all .25s;font-family:'Lato',sans-serif;}
.type-btn.active{color:var(--blush);border-color:rgba(201,123,132,.4);background:rgba(201,123,132,.1);}
.save-btn{font-family:'Playfair Display',serif;font-size:14px;font-style:italic;color:var(--blush);background:transparent;border:1px solid var(--rose);border-radius:2px;padding:11px;cursor:pointer;position:relative;overflow:hidden;transition:color .3s;}
.save-btn::before{content:'';position:absolute;inset:0;background:rgba(201,123,132,.13);transform:translateX(-101%);transition:transform .35s cubic-bezier(.22,1,.36,1);}
.save-btn:hover{color:var(--cream);}
.save-btn:hover::before{transform:translateX(0);}
.save-btn span{position:relative;z-index:1;}

/* Events on selected date (inside sidebar) */
.sel-events-label{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:8px;}
.sel-events-label::after{content:'';flex:1;height:1px;background:var(--border);}
.sel-event-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(201,123,132,.07);border:1px solid rgba(201,123,132,.14);border-radius:2px;margin-top:6px;}
.sev-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sev-dot.memory{background:var(--rose);}
.sev-dot.anniversary{background:#e8a870;}
.sev-dot.birthday{background:#b0c8e8;}
.sev-dot.special{background:#d4a0c8;}
.sev-title{font-family:'Dancing Script',cursive;font-size:15px;color:var(--cream);flex:1;line-height:1.2;}
.sev-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;padding:0 2px;transition:color .2s;flex-shrink:0;}
.sev-del:hover{color:#d47a7a;}
.sel-no-events{font-family:'Dancing Script',cursive;font-size:14px;color:var(--muted);font-style:italic;padding:8px 0;}

/* ── ALL MARKED DATES SECTION ── */
.all-section{padding:44px 52px 60px;}

.all-section-head{display:flex;align-items:center;gap:16px;margin-bottom:32px;}
.all-section-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:400;color:var(--cream);font-style:italic;white-space:nowrap;}
.all-section-title em{color:var(--blush);}
.all-section-line{flex:1;height:1px;background:var(--border);}
.all-section-count{font-family:'Dancing Script',cursive;font-size:15px;color:var(--muted);white-space:nowrap;}

/* Filter tabs */
.all-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px;}
.afilter{font-size:10px;letter-spacing:.14em;text-transform:uppercase;padding:6px 16px;background:transparent;border:1px solid var(--border);border-radius:20px;color:var(--muted);cursor:pointer;transition:all .25s;font-family:'Lato',sans-serif;}
.afilter.active,.afilter:hover{color:var(--blush);border-color:rgba(201,123,132,.35);background:rgba(201,123,132,.08);}

/* Cards grid */
.all-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}

.date-card{position:relative;background:linear-gradient(150deg,rgba(28,12,12,.9),rgba(18,7,8,.96));border:1px solid var(--border);border-radius:3px;padding:22px 24px;display:flex;gap:16px;align-items:flex-start;transition:transform .3s,border-color .3s,box-shadow .3s;animation:cardIn .45s ease both;}
.date-card:hover{transform:translateY(-4px);border-color:rgba(201,123,132,.28);box-shadow:0 12px 36px rgba(0,0,0,.5),0 0 20px rgba(180,80,80,.07);}
.date-card-shimmer{position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--rose),transparent);opacity:0;transition:opacity .35s;}
.date-card:hover .date-card-shimmer{opacity:.4;}

/* Colour stripe */
.date-stripe{width:3px;border-radius:2px;flex-shrink:0;min-height:100%;align-self:stretch;}
.date-stripe.memory{background:var(--rose);}
.date-stripe.anniversary{background:#e8a870;}
.date-stripe.birthday{background:#b0c8e8;}
.date-stripe.special{background:#d4a0c8;}

.date-card-body{flex:1;min-width:0;}
.date-card-title{font-family:'Dancing Script',cursive;font-size:20px;color:var(--cream);line-height:1.2;margin-bottom:5px;word-break:break-word;}
.date-card-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.date-chip{font-size:10px;letter-spacing:.06em;color:var(--muted);font-style:italic;}
.type-chip{font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:2px 9px;border-radius:10px;border:1px solid;font-family:'Lato',sans-serif;}
.type-chip.memory{color:var(--rose);border-color:rgba(201,123,132,.3);}
.type-chip.anniversary{color:#e8a870;border-color:rgba(232,168,112,.3);}
.type-chip.birthday{color:#b0c8e8;border-color:rgba(176,200,232,.3);}
.type-chip.special{color:#d4a0c8;border-color:rgba(212,160,200,.3);}

.date-card-del{background:none;border:1px solid rgba(138,106,104,.2);border-radius:2px;color:var(--muted);cursor:pointer;font-size:14px;padding:4px 8px;transition:all .2s;flex-shrink:0;margin-top:2px;}
.date-card-del:hover{color:#d47a7a;border-color:rgba(212,120,120,.35);background:rgba(180,60,60,.07);}

.all-empty{grid-column:1/-1;padding:60px 0;text-align:center;}
.all-empty-icon{font-size:44px;display:block;margin-bottom:16px;opacity:.3;}
.all-empty-text{font-family:'Dancing Script',cursive;font-size:18px;color:var(--muted);line-height:1.7;}

@keyframes cardIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:none;}}

/* ── CONFIRM DIALOG ── */
.confirm-overlay{position:fixed;inset:0;z-index:200;background:rgba(10,3,3,.85);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;}
.confirm-overlay.open{display:flex;}
.confirm-box{background:linear-gradient(160deg,rgba(32,12,12,.98),rgba(20,8,8,.99));border:1px solid rgba(201,123,132,.22);border-radius:3px;padding:40px 40px 32px;max-width:340px;width:90%;text-align:center;box-shadow:0 30px 70px rgba(0,0,0,.7);animation:boxIn .35s cubic-bezier(.22,1,.36,1) both;}
@keyframes boxIn{from{opacity:0;transform:scale(.9) translateY(20px);}to{opacity:1;transform:none;}}
.confirm-icon{font-size:30px;margin-bottom:14px;display:block;}
.confirm-title{font-family:'Playfair Display',serif;font-size:20px;font-style:italic;color:var(--cream);margin-bottom:8px;}
.confirm-sub{font-size:13px;color:var(--muted);font-style:italic;letter-spacing:.04em;line-height:1.6;margin-bottom:26px;}
.confirm-name{color:var(--blush);font-family:'Dancing Script',cursive;font-size:18px;display:block;margin-bottom:20px;}
.confirm-btns{display:flex;gap:12px;justify-content:center;}
.cbtn{font-family:'Lato',sans-serif;font-size:11px;letter-spacing:.14em;text-transform:uppercase;padding:10px 22px;border-radius:2px;cursor:pointer;transition:all .25s;}
.cbtn-cancel{background:transparent;border:1px solid var(--border);color:var(--muted);}
.cbtn-cancel:hover{color:var(--text);border-color:rgba(201,123,132,.3);}
.cbtn-del{background:transparent;border:1px solid rgba(180,70,70,.4);color:#d48080;}
.cbtn-del:hover{background:rgba(180,60,60,.1);border-color:rgba(200,90,90,.55);color:#e09090;}

/* ── TOAST ── */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(22,8,8,.95);border:1px solid rgba(201,123,132,.22);border-radius:2px;padding:10px 28px;font-family:'Dancing Script',cursive;font-size:15px;color:var(--blush);opacity:0;transition:all .3s ease;z-index:300;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:860px){
  .top-layout{grid-template-columns:1fr;}
  .add-sidebar{border-left:none;border-top:1px solid var(--border);}
  .cal-panel{padding:24px 20px;}
  .add-sidebar{padding:24px 20px;}
  .all-section{padding:32px 20px 48px;}
  .header{padding:18px 20px;}
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="bg-warm"></div>
<div class="page">

<!-- HEADER -->
<header class="header">
  <div class="brand">
    <span class="brand-heart">🌹</span>
    <span class="brand-name">Our Calendar</span>
  </div>
  <button class="back-btn" onclick="window.location.href='home.html'">← Home</button>
</header>

<!-- TOP: Calendar + Add sidebar -->
<div class="top-layout">

  <!-- CALENDAR -->
  <div class="cal-panel">
    <div class="cal-nav">
      <button class="nav-btn" onclick="prevMonth()">‹</button>
      <div class="cal-month-label" id="month-label">—</div>
      <select class="year-select" id="year-select" onchange="setYear(this.value)"></select>
      <button class="nav-btn" onclick="nextMonth()">›</button>
    </div>
    <div class="days-header">
      <div class="day-name">Sun</div><div class="day-name">Mon</div><div class="day-name">Tue</div>
      <div class="day-name">Wed</div><div class="day-name">Thu</div><div class="day-name">Fri</div><div class="day-name">Sat</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <!-- ADD EVENT SIDEBAR -->
  <div class="add-sidebar">
    <div>
      <div class="sel-date-title" id="sel-date-title">Select a day</div>
      <div class="sel-date-sub" id="sel-date-sub">click any date on the calendar ♥</div>
    </div>

    <div class="add-form" id="add-form" style="display:none">
      <div class="form-label">Name this moment</div>
      <input class="form-input" id="ev-title" type="text" placeholder="e.g. Our first date ♥" maxlength="60">
      <div class="form-label">Type</div>
      <div class="type-row">
        <button class="type-btn active" onclick="setType('memory',this)">♥ Memory</button>
        <button class="type-btn" onclick="setType('anniversary',this)">🌹 Anniversary</button>
        <button class="type-btn" onclick="setType('birthday',this)">🎂 Birthday</button>
        <button class="type-btn" onclick="setType('special',this)">✨ Special</button>
      </div>
      <button class="save-btn" onclick="saveEvent()"><span>Mark this day ♥</span></button>
    </div>

    <!-- Events on selected date -->
    <div id="sel-events-wrap" style="display:none">
      <div class="sel-events-label">On this day</div>
      <div id="sel-events-list"></div>
    </div>
  </div>
</div>

<!-- ALL MARKED DATES SECTION -->
<div class="all-section">
  <div class="all-section-head">
    <div class="all-section-title">All <em>Marked Dates</em></div>
    <div class="all-section-line"></div>
    <div class="all-section-count" id="all-count">0 dates</div>
  </div>

  <div class="all-filters">
    <button class="afilter active" onclick="setAllFilter('all',this)">All</button>
    <button class="afilter" onclick="setAllFilter('memory',this)">♥ Memories</button>
    <button class="afilter" onclick="setAllFilter('anniversary',this)">🌹 Anniversaries</button>
    <button class="afilter" onclick="setAllFilter('birthday',this)">🎂 Birthdays</button>
    <button class="afilter" onclick="setAllFilter('special',this)">✨ Special</button>
  </div>

  <div class="all-grid" id="all-grid"></div>
</div>

</div><!-- end .page -->

<!-- CONFIRM DIALOG -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <span class="confirm-icon">🌹</span>
    <div class="confirm-title">Remove this memory?</div>
    <div class="confirm-sub">Are you sure you want to remove<br><span class="confirm-name" id="confirm-name">—</span>This cannot be undone.</div>
    <div class="confirm-btns">
      <button class="cbtn cbtn-cancel" onclick="closeConfirm()">Keep it</button>
      <button class="cbtn cbtn-del" onclick="confirmDel()">Remove</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── PETALS ── */
(function(){
  const c=document.getElementById('c'),ctx=c.getContext('2d');
  let W,H;
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  const S=['❤','♥','·','·','✿','·'],ps=[];
  for(let i=0;i<40;i++)ps.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight+window.innerHeight,sym:S[Math.floor(Math.random()*S.length)],size:Math.random()*8+4,speed:Math.random()*.4+.15,drift:(Math.random()-.5)*.3,alpha:Math.random()*.15+.04,rot:Math.random()*Math.PI*2,rotSpeed:(Math.random()-.5)*.01,phase:Math.random()*Math.PI*2,sway:Math.random()*.5+.2});
  let t=0;
  function draw(){ctx.clearRect(0,0,W,H);t+=.01;for(const p of ps){p.y-=p.speed;p.x+=Math.sin(t*p.sway+p.phase)*p.drift;p.rot+=p.rotSpeed;if(p.y<-30){p.y=H+20;p.x=Math.random()*W;}ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.globalAlpha=p.alpha;ctx.font=p.size+'px serif';ctx.fillStyle=(p.sym==='·'||p.sym==='✿')?'rgba(240,215,205,1)':'rgba(210,120,130,1)';ctx.textAlign='center';ctx.fillText(p.sym,0,0);ctx.restore();}requestAnimationFrame(draw);}
  draw();
})();

/* ── AUTH ── */
const user=localStorage.getItem('user');
if(!user)window.location.href='index.html';

/* ── STATE ── */
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const today=new Date();
let curYear=today.getFullYear();
let curMonth=today.getMonth();
let selDate=null;
let selType='memory';
let allFilter='all';
let pendingDelId=null;

/* ── YEAR SELECT ── */
const ys=document.getElementById('year-select');
for(let y=1950;y<=2100;y++){
  const o=document.createElement('option');
  o.value=y;o.textContent=y;
  if(y===curYear)o.selected=true;
  ys.appendChild(o);
}

/* ── STORAGE ── */
function getEvents(){return JSON.parse(localStorage.getItem('cal_events'))||[];}
function saveEvents(e){localStorage.setItem('cal_events',JSON.stringify(e));}

/* ── NAV ── */
function setYear(y){curYear=parseInt(y);renderCal();}
function prevMonth(){curMonth--;if(curMonth<0){curMonth=11;curYear--;ys.value=curYear;}renderCal();}
function nextMonth(){curMonth++;if(curMonth>11){curMonth=0;curYear++;ys.value=curYear;}renderCal();}

function dateKey(y,m,d){return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');}

/* ── RENDER CALENDAR ── */
function renderCal(){
  document.getElementById('month-label').textContent=MONTHS[curMonth];
  ys.value=curYear;

  const events=getEvents();
  const map={};
  events.forEach(e=>{if(!map[e.date])map[e.date]=[];map[e.date].push(e);});

  const firstDay=new Date(curYear,curMonth,1).getDay();
  const daysInMonth=new Date(curYear,curMonth+1,0).getDate();
  const prevDays=new Date(curYear,curMonth,0).getDate();
  const todayKey=dateKey(today.getFullYear(),today.getMonth(),today.getDate());

  let html='';

  // Prev month tail
  for(let i=0;i<firstDay;i++){
    html+=`<div class="cal-day other-month"><div class="day-num">${prevDays-firstDay+1+i}</div></div>`;
  }

  // This month
  for(let d=1;d<=daysInMonth;d++){
    const key=dateKey(curYear,curMonth,d);
    const isToday=key===todayKey;
    const isSel=key===selDate;
    const evts=map[key]||[];
    const hasEv=evts.length>0;
    const dotsHtml=evts.slice(0,2).map(e=>`<div class="day-dot ${e.type}">${e.title}</div>`).join('')+(evts.length>2?`<div class="day-dot">+${evts.length-2} more</div>`:'');
    const cls=['cal-day',isToday?'today':'',isSel?'selected':'',hasEv?'has-event':''].filter(Boolean).join(' ');
    html+=`<div class="${cls}" onclick="selectDay('${key}')"><div class="day-num">${d}</div><div class="day-dots">${dotsHtml}</div></div>`;
  }

  // Next month fill
  const total=firstDay+daysInMonth;
  const rem=total%7===0?0:7-(total%7);
  for(let i=1;i<=rem;i++) html+=`<div class="cal-day other-month"><div class="day-num">${i}</div></div>`;

  document.getElementById('cal-grid').innerHTML=html;

  // Refresh sidebar for selected date
  if(selDate)renderSelEvents(selDate);

  // Refresh all marked dates
  renderAllDates();
}

/* ── SELECT DAY ── */
function selectDay(key){
  selDate=key;
  const [y,m,d]=key.split('-');
  document.getElementById('sel-date-title').textContent=MONTHS[parseInt(m)-1]+' '+parseInt(d)+', '+y;
  document.getElementById('sel-date-sub').textContent='mark this day as special ♥';
  document.getElementById('add-form').style.display='flex';
  document.getElementById('ev-title').focus();
  renderCal();
}

/* ── RENDER EVENTS ON SELECTED DAY ── */
function renderSelEvents(key){
  const evts=getEvents().filter(e=>e.date===key);
  const wrap=document.getElementById('sel-events-wrap');
  const list=document.getElementById('sel-events-list');
  if(evts.length===0){wrap.style.display='none';return;}
  wrap.style.display='block';
  list.innerHTML=evts.map(e=>`
    <div class="sel-event-item">
      <div class="sev-dot ${e.type}"></div>
      <div class="sev-title">${esc(e.title)}</div>
      <button class="sev-del" onclick="askDel('${e.id}','${esc(e.title)}')" title="Remove">×</button>
    </div>`).join('');
}

/* ── RENDER ALL MARKED DATES SECTION ── */
function renderAllDates(){
  const all=getEvents();
  let filtered=all;
  if(allFilter!=='all')filtered=all.filter(e=>e.type===allFilter);

  // Sort: upcoming first (by date string asc)
  filtered.sort((a,b)=>a.date.localeCompare(b.date));

  document.getElementById('all-count').textContent=filtered.length+' date'+(filtered.length===1?'':'s');

  const grid=document.getElementById('all-grid');
  if(filtered.length===0){
    grid.innerHTML=`<div class="all-empty"><span class="all-empty-icon">🗓️</span><div class="all-empty-text">No dates marked yet.<br>Click any day on the calendar to start.</div></div>`;
    return;
  }

  grid.innerHTML=filtered.map((e,i)=>{
    const [y,m,d]=e.date.split('-');
    const friendly=MONTHS[parseInt(m)-1]+' '+parseInt(d)+', '+y;
    return `
      <div class="date-card" style="animation-delay:${Math.min(i*.04,.4)}s">
        <div class="date-card-shimmer"></div>
        <div class="date-stripe ${e.type}"></div>
        <div class="date-card-body">
          <div class="date-card-title">${esc(e.title)}</div>
          <div class="date-card-meta">
            <span class="date-chip">📅 ${friendly}</span>
            <span class="type-chip ${e.type}">${e.type}</span>
          </div>
        </div>
        <button class="date-card-del" onclick="askDel('${e.id}','${esc(e.title)}')" title="Remove">✕</button>
      </div>`;
  }).join('');
}

function setAllFilter(f,btn){
  allFilter=f;
  document.querySelectorAll('.afilter').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderAllDates();
}

/* ── ADD EVENT ── */
function setType(t,btn){
  selType=t;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function saveEvent(){
  const title=document.getElementById('ev-title').value.trim();
  if(!title||!selDate)return;
  const events=getEvents();
  events.push({
    id:Date.now()+'_'+Math.random().toString(36).slice(2),
    date:selDate,title,type:selType,by:user
  });
  saveEvents(events);
  document.getElementById('ev-title').value='';
  renderCal();
  showToast('Date marked ♥');
}

/* ── DELETE WITH CONFIRM ── */
function askDel(id,title){
  pendingDelId=id;
  document.getElementById('confirm-name').textContent='"'+title+'"';
  document.getElementById('confirm-overlay').classList.add('open');
}

function closeConfirm(){
  pendingDelId=null;
  document.getElementById('confirm-overlay').classList.remove('open');
}

function confirmDel(){
  if(!pendingDelId)return;
  const events=getEvents().filter(e=>e.id!==pendingDelId);
  saveEvents(events);
  closeConfirm();
  renderCal();
  showToast('Removed ♥');
}

// Close on overlay click
document.getElementById('confirm-overlay').addEventListener('click',function(e){
  if(e.target===this)closeConfirm();
});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeConfirm();});

/* ── HELPERS ── */
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

document.getElementById('ev-title').addEventListener('keydown',e=>{if(e.key==='Enter')saveEvent();});

renderCal();
</script>
</body>
</html>
