<style>

:root{--wall:#f2ede6;--navy:#1e2d4a;--navy2:#2d3f5e;--navy-light:#4a6080;--slate:#6a7d94;--cream:#f8f4ee;--text:#1e2d4a;--text-soft:#6a7d94;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}html,body{overflow-x:hidden;}
body{font-family:'Jost',sans-serif;background:var(--wall);color:var(--text);min-height:100vh;}
.room-wall{position:fixed;inset:0;z-index:0;will-change:transform;background:radial-gradient(ellipse 110% 70% at 50% 32%,#f8f4ee 0%,#f2ede6 20%,#ebe3d8 45%,#e2d8cc 70%,#d8cec0 100%);}
.room-wall::before{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 28% 100% at 0% 50%,rgba(20,15,10,.1) 0%,transparent 62%),radial-gradient(ellipse 28% 100% at 100% 50%,rgba(20,15,10,.1) 0%,transparent 62%),radial-gradient(ellipse 100% 18% at 50% 0%,rgba(20,15,10,.09) 0%,transparent 52%);}
.room-wall::after{content:'';position:absolute;left:0;right:0;bottom:0;height:26%;background:linear-gradient(to top,#cfc5b5 0%,#d8d0c2 14%,#e0d8ca 30%,rgba(224,216,202,.35) 65%,transparent 100%);border-top:1px solid rgba(180,165,145,.3);}
.room-ceiling{position:fixed;top:0;left:0;right:0;z-index:8;height:20vh;will-change:transform;background:linear-gradient(to bottom,#ddd5c8 0%,#e5ddd2 25%,#ede7de 55%,rgba(237,231,222,.45) 80%,transparent 100%);}
.room-ceiling::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(30,45,74,.12),transparent);}
.track-rail{position:fixed;top:20vh;left:5%;right:5%;z-index:9;height:8px;background:linear-gradient(to bottom,#b0a898,#c4bcb0,#b0a898);border-radius:4px;box-shadow:0 2px 8px rgba(20,15,10,.1),inset 0 1px 0 rgba(255,255,255,.5);will-change:transform;}
.room-floor{position:fixed;bottom:0;left:0;right:0;z-index:8;height:24vh;will-change:transform;overflow:hidden;}
.fp{position:absolute;inset:0;background:repeating-linear-gradient(90deg,#c8b898 0px,#d8c8a8 59px,#b8a888 59px,#c8b898 60px,#ddd0b0 60px,#e8dcc0 119px,#c8b898 119px,#c8b898 120px),linear-gradient(to top,#a09070 0%,#b4a080 18%,#c8b090 40%,#d8c4a4 62%,#e8d8bc 85%,#f0e4cc 100%);background-blend-mode:multiply;}
.fs2{position:absolute;inset:0;background:linear-gradient(to top,rgba(255,250,235,.12) 0%,transparent 65%);animation:fsn 8s ease-in-out infinite alternate;}
@keyframes fsn{0%{opacity:.4;}100%{opacity:1;}}
.fao{position:absolute;top:0;left:0;right:0;height:38%;background:linear-gradient(to bottom,rgba(20,15,10,.07),transparent);}
.baseboard{position:fixed;bottom:24vh;left:0;right:0;z-index:9;height:11px;background:linear-gradient(to top,#c0b8ac,#d0c8bc,#c0b8ac);will-change:transform;}
.baseboard::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(30,45,74,.15),transparent);}
.spots{position:fixed;top:0;left:0;right:0;bottom:0;z-index:2;pointer-events:none;}
.sp-h{position:absolute;top:calc(20vh + 8px);width:14px;height:14px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#fff,#d8d0c4 55%,#a0988c);transform:translateX(-50%);box-shadow:0 0 5px rgba(255,255,255,.7),0 2px 4px rgba(20,15,10,.15);}
.sp-c{position:absolute;top:calc(20vh + 16px);transform:translateX(-50%);width:200px;height:56vh;background:linear-gradient(to bottom,rgba(255,245,215,.16) 0%,rgba(255,240,200,.08) 22%,rgba(255,235,190,.03) 48%,transparent 78%);clip-path:polygon(34% 0%,66% 0%,100% 100%,0% 100%);animation:spB var(--spd,5s) ease-in-out infinite alternate;}
@keyframes spB{0%{opacity:.5;transform:translateX(-50%);}40%{opacity:.88;transform:translateX(-50%) skewX(.5deg);}70%{opacity:.6;transform:translateX(-50%) skewX(-.3deg);}100%{opacity:.55;transform:translateX(-50%);}}
.sp-p{position:absolute;bottom:calc(24vh + 2px);transform:translateX(-50%);width:140px;height:18px;background:radial-gradient(ellipse,rgba(255,245,215,.2) 0%,transparent 70%);border-radius:50%;animation:spB var(--spd,5s) ease-in-out infinite alternate;}
.wsc{position:fixed;z-index:3;pointer-events:none;}
.wsc-fl{width:8px;height:13px;margin:0 auto -1px;background:radial-gradient(ellipse 55% 100% at 50% 80%,#fffbe8 0%,#ffd060 30%,#ffa030 60%,rgba(255,80,0,.25) 80%,transparent);border-radius:50% 50% 30% 30%;animation:scF var(--fd,2s) ease-in-out infinite alternate;transform-origin:bottom;}
@keyframes scF{0%{transform:scaleX(1) scaleY(1) rotate(-.5deg);}30%{transform:scaleX(.88) scaleY(1.12) rotate(1.5deg);}65%{transform:scaleX(1.08) scaleY(.9) rotate(-1.5deg);}100%{transform:scaleX(.95) scaleY(1.06) rotate(.5deg);}}
.wsc-b{width:9px;height:18px;background:linear-gradient(to bottom,#c8c0b4,#b0a898);border-radius:2px 2px 0 0;margin:0 auto;}
.wsc-hl{position:fixed;border-radius:50%;transform:translate(-50%,-55%);animation:hG var(--fd,2s) ease-in-out infinite alternate;}
@keyframes hG{0%{opacity:.3;transform:translate(-50%,-55%) scale(1);}50%{opacity:.62;transform:translate(-50%,-55%) scale(1.14);}100%{opacity:.35;transform:translate(-50%,-55%) scale(.96);}}
canvas.dust{position:fixed;inset:0;z-index:4;pointer-events:none;}
.vignette{position:fixed;inset:0;z-index:5;pointer-events:none;background:radial-gradient(ellipse 88% 88% at 50% 50%,transparent 42%,rgba(20,15,10,.09) 100%);}
.site-header{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:18px 60px;background:linear-gradient(to bottom,rgba(242,237,230,.96) 65%,transparent);backdrop-filter:blur(8px);}
.brand{display:flex;align-items:center;gap:12px;}
.brand-mono{width:32px;height:32px;border:1.5px solid rgba(30,45,74,.18);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;color:var(--navy);}
.brand-name{font-family:'Playfair Display',serif;font-size:17px;font-weight:400;font-style:italic;color:var(--navy);}
.hbtn{font-family:'Jost',sans-serif;font-size:9px;letter-spacing:.2em;color:var(--text-soft);background:transparent;border:1px solid rgba(30,45,74,.14);border-radius:2px;padding:7px 16px;cursor:pointer;transition:all .25s;text-transform:uppercase;font-weight:500;}
.hbtn:hover{color:var(--navy);border-color:rgba(30,45,74,.3);background:rgba(30,45,74,.04);}
.scroll-content{position:relative;z-index:15;padding:calc(20vh + 56px) 0 calc(24vh + 56px);min-height:100vh;}
.content-wrap{max-width:800px;width:100%;margin:0 auto;padding:40px 56px 0;}
.page-pre{font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;color:var(--text-soft);margin-bottom:8px;}
.page-title{font-family:'Playfair Display',serif;font-size:38px;font-weight:400;color:var(--navy);margin-bottom:8px;line-height:1.1;}
.page-title em{font-style:italic;color:var(--navy-light);}
.page-sub{font-size:13px;color:var(--text-soft);margin-bottom:28px;line-height:1.65;font-family:'Jost',sans-serif;font-weight:300;}
.toast{position:fixed;bottom:calc(24vh + 16px);left:50%;transform:translateX(-50%) translateY(12px);background:var(--cream);border:1px solid rgba(30,45,74,.12);border-radius:2px;padding:10px 28px;font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;color:var(--navy);opacity:0;transition:all .3s;z-index:100;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(20,15,10,.1);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@keyframes fu{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
@media(max-width:720px){.site-header,.content-wrap{padding-left:20px;padding-right:20px;}.content-wrap{padding-right:20px;}}

.cnav{display:flex;align-items:center;gap:8px;margin-bottom:22px;}
.nb2{width:32px;height:32px;background:transparent;border:1px solid rgba(30,45,74,.14);border-radius:2px;color:var(--text-soft);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s;}
.nb2:hover{color:var(--navy);border-color:rgba(30,45,74,.3);background:rgba(30,45,74,.04);}
.mlbl{flex:1;text-align:center;font-family:'Playfair Display',serif;font-size:22px;font-style:italic;color:var(--navy);}
.ys{background:rgba(248,244,238,.9);border:1px solid rgba(30,45,74,.14);color:var(--navy);font-family:'Jost',sans-serif;font-size:14px;padding:4px 10px;border-radius:2px;cursor:pointer;outline:none;}
.ys option{background:#f8f4ee;color:var(--navy);}
.dnames{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:5px;}
.dn{text-align:center;font-family:'Jost',sans-serif;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-soft);padding:4px 0;font-weight:500;}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cd{min-height:58px;border:1px solid transparent;border-radius:2px;padding:6px 8px 5px;cursor:pointer;transition:all .22s;display:flex;flex-direction:column;background:transparent;}
.cd:hover{background:rgba(30,45,74,.04);border-color:rgba(30,45,74,.12);}
.cd.om{opacity:.2;pointer-events:none;}
.cd.today{background:rgba(30,45,74,.05);border-color:rgba(30,45,74,.15);}
.cd.today .dn3{color:var(--navy);font-weight:700;}
.cd.he{background:rgba(30,45,74,.07);border-color:rgba(30,45,74,.18);}
.cd.sel{background:rgba(30,45,74,.1);border-color:rgba(30,45,74,.35);}
.dn3{font-size:13px;color:var(--navy);font-weight:400;line-height:1;margin-bottom:3px;}
.ddots{display:flex;flex-direction:column;gap:2px;flex:1;overflow:hidden;}
.ddot{font-size:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
.ddot.memory{color:#a05060;}.ddot.anniversary{color:#8a6020;}.ddot.birthday{color:#4a6090;}.ddot.special{color:#7050a0;}
.cal-layout{display:grid;grid-template-columns:1fr 270px;gap:24px;margin-top:24px;}
.side{background:rgba(248,244,238,.8);border:1px solid rgba(30,45,74,.1);border-radius:2px;padding:22px 20px;display:flex;flex-direction:column;gap:14px;}
.sdt{font-family:'Playfair Display',serif;font-size:19px;font-style:italic;color:var(--navy);line-height:1.2;}
.sds{font-size:12px;color:var(--text-soft);font-family:'Jost',sans-serif;font-weight:300;}
.add-form{display:flex;flex-direction:column;gap:10px;}
.fl{font-family:'Jost',sans-serif;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-soft);font-weight:500;}
.fi{background:transparent;border:none;border-bottom:1.5px solid rgba(30,45,74,.14);padding:8px 3px;font-family:'Playfair Display',serif;font-size:15px;color:var(--navy);outline:none;width:100%;transition:border-color .3s;}
.fi::placeholder{color:rgba(106,125,148,.4);font-style:italic;}
.fi:focus{border-bottom-color:rgba(30,45,74,.4);}
.trow{display:flex;gap:5px;flex-wrap:wrap;}
.tbtn{font-size:9px;letter-spacing:.08em;padding:5px 10px;background:transparent;border:1px solid rgba(30,45,74,.14);border-radius:14px;color:var(--text-soft);cursor:pointer;transition:all .22s;font-family:'Jost',sans-serif;}
.tbtn.active{color:var(--navy);border-color:rgba(30,45,74,.35);background:rgba(30,45,74,.06);}
.svbtn{font-family:'Jost',sans-serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;font-weight:500;color:white;background:var(--navy);border:none;border-radius:2px;padding:10px;cursor:pointer;transition:background .3s;}
.svbtn:hover{background:var(--navy2);}
.sev{display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(30,45,74,.05);border:1px solid rgba(30,45,74,.1);border-radius:2px;margin-bottom:6px;}
.sevdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.sevdot.memory{background:#a05060;}.sevdot.anniversary{background:#8a6020;}.sevdot.birthday{background:#4a6090;}.sevdot.special{background:#7050a0;}
.sev-t{font-family:'Playfair Display',serif;font-size:15px;font-style:italic;color:var(--navy);flex:1;}
.sev-del{background:none;border:none;color:var(--text-soft);cursor:pointer;font-size:16px;padding:0 2px;transition:color .2s;}
.sev-del:hover{color:#a05050;}
.all-sec{margin-top:40px;padding-top:30px;border-top:1px solid rgba(30,45,74,.1);}
.all-head{display:flex;align-items:center;gap:16px;margin-bottom:22px;}
.all-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:400;font-style:italic;color:var(--navy);white-space:nowrap;}
.all-title em{color:var(--navy-light);}
.all-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(30,45,74,.12),transparent);}
.all-cnt{font-family:'Cormorant Garamond',serif;font-size:15px;font-style:italic;color:var(--text-soft);white-space:nowrap;}
.afs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:20px;}
.af{font-family:'Jost',sans-serif;font-size:9px;letter-spacing:.14em;text-transform:uppercase;padding:5px 14px;background:transparent;border:1px solid rgba(30,45,74,.12);border-radius:18px;color:var(--text-soft);cursor:pointer;transition:all .22s;font-weight:500;}
.af.active,.af:hover{color:var(--navy);border-color:rgba(30,45,74,.3);background:rgba(30,45,74,.06);}
.all-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:60px;}
.dc{position:relative;background:rgba(248,244,238,.8);border:1px solid rgba(30,45,74,.1);border-radius:2px;padding:16px 18px;display:flex;gap:12px;align-items:flex-start;transition:transform .3s,border-color .3s;animation:fu .45s ease both;box-shadow:0 1px 4px rgba(20,15,10,.05);}
.dc:hover{transform:translateY(-3px);border-color:rgba(30,45,74,.22);}
.dc-str{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;}
.dc-str.memory{background:#a05060;}.dc-str.anniversary{background:#8a6020;}.dc-str.birthday{background:#4a6090;}.dc-str.special{background:#7050a0;}
.dc-body{flex:1;min-width:0;}
.dc-title{font-family:'Playfair Display',serif;font-size:17px;font-style:italic;color:var(--navy);line-height:1.2;margin-bottom:4px;word-break:break-word;}
.dc-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.dc-date{font-size:11px;color:var(--text-soft);font-family:'Jost',sans-serif;font-weight:300;}
.tc{font-size:8px;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border-radius:9px;border:1px solid;font-family:'Jost',sans-serif;font-weight:500;}
.tc.memory{color:#a05060;border-color:rgba(160,80,96,.2);}.tc.anniversary{color:#8a6020;border-color:rgba(138,96,32,.2);}.tc.birthday{color:#4a6090;border-color:rgba(74,96,144,.2);}.tc.special{color:#7050a0;border-color:rgba(112,80,160,.2);}
.dc-del{background:none;border:1px solid rgba(30,45,74,.12);border-radius:2px;color:var(--text-soft);cursor:pointer;font-size:11px;padding:3px 7px;transition:all .2s;flex-shrink:0;font-family:'Jost',sans-serif;font-weight:500;}
.dc-del:hover{color:#a05050;border-color:rgba(160,80,80,.25);}
.all-empty{grid-column:1/-1;padding:50px 0;text-align:center;font-family:'Playfair Display',serif;font-size:18px;font-style:italic;color:var(--text-soft);}
.ov{position:fixed;inset:0;z-index:200;background:rgba(242,237,230,.88);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;}
.ov.open{display:flex;}
.cbox{background:var(--cream);border:1px solid rgba(30,45,74,.12);border-radius:3px;padding:40px 36px 32px;max-width:320px;width:90%;text-align:center;box-shadow:0 8px 40px rgba(20,15,10,.12);animation:bi .35s cubic-bezier(.22,1,.36,1) both;}
@keyframes bi{from{opacity:0;transform:scale(.95) translateY(12px);}to{opacity:1;transform:none;}}
.cbi{font-size:28px;margin-bottom:14px;display:block;}
.cbt{font-family:'Playfair Display',serif;font-size:20px;font-style:italic;color:var(--navy);margin-bottom:6px;}
.cbs{font-size:13px;color:var(--text-soft);font-family:'Jost',sans-serif;font-weight:300;line-height:1.6;margin-bottom:22px;}
.cbn{color:var(--navy-light);font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;display:block;margin-bottom:16px;}
.cbtns{display:flex;gap:10px;justify-content:center;}
.cbtn{font-family:'Jost',sans-serif;font-size:9px;letter-spacing:.18em;text-transform:uppercase;padding:10px 20px;border-radius:2px;cursor:pointer;transition:all .22s;font-weight:500;}
.cbtnk{background:transparent;border:1px solid rgba(30,45,74,.14);color:var(--text-soft);}
.cbtnk:hover{color:var(--navy);border-color:rgba(30,45,74,.3);}
.cbtnd{background:transparent;border:1px solid rgba(140,60,60,.25);color:#904040;}
.cbtnd:hover{background:rgba(140,60,60,.05);border-color:rgba(160,80,80,.4);}

<div class="room-wall" id="rwall"></div>
<div class="room-ceiling" id="rceil"></div>

<div class="baseboard" id="rbase"></div>
<div class="room-floor" id="rfloor"><div class="fp"></div><div class="fs2"></div><div class="fao"></div></div>
<div class="spots">
  <div class="sp-h" style="left:18%"></div><div class="sp-h" style="left:50%"></div><div class="sp-h" style="left:82%"></div>
  <div class="sp-c" style="left:18%;--spd:5s"></div><div class="sp-c" style="left:50%;--spd:7s"></div><div class="sp-c" style="left:82%;--spd:5.5s"></div>
  <div class="sp-p" style="left:18%;--spd:5s"></div><div class="sp-p" style="left:50%;--spd:7s"></div><div class="sp-p" style="left:82%;--spd:5.5s"></div>
</div>
<div class="wsc" style="left:7%;top:44%"><div class="wsc-fl" style="--fd:1.8s"></div><div class="wsc-b"></div></div>
<div class="wsc" style="right:7%;top:44%"><div class="wsc-fl" style="--fd:2.3s"></div><div class="wsc-b"></div></div>
<div class="wsc-hl" style="left:calc(7% + 4px);top:44%;width:68px;height:68px;background:radial-gradient(circle,rgba(255,210,120,.1) 0%,transparent 68%);--fd:1.8s;"></div>
<div class="wsc-hl" style="right:calc(7% + 4px);left:auto;top:44%;width:68px;height:68px;background:radial-gradient(circle,rgba(255,210,120,.1) 0%,transparent 68%);--fd:2.3s;transform:translate(50%,-55%);"></div>
<canvas class="dust" id="dust"></canvas>
<div class="vignette"></div>
<header class="site-header">
  <div class="brand"><div class="brand-mono">ow</div><span class="brand-name">Our Calendar</span></div>
  <button class="hbtn" onclick="window.location.href='home.html'">&#8592; Home</button>
</header>
<div class="scroll-content"><div class="content-wrap">
<div style="animation:fu .8s ease .1s both">
<div class="page-pre">mark what matters</div>
<div class="page-title">Our <em>Calendar</em></div>
<p class="page-sub">Mark every date that matters. Anniversaries, memories, milestones.</p>
<div class="cnav"><button class="nb2" onclick="prevM()">&#8249;</button><div class="mlbl" id="ml">—</div><select class="ys" id="ys" onchange="setYear(this.value)"></select><button class="nb2" onclick="nextM()">&#8250;</button></div>

<div class="cgrid" id="cg"></div>
<div class="cal-layout">
  <div></div>
  <div class="side">
    <div><div class="sdt" id="sdt">Select a day</div><div class="sds" id="sds">click any date to mark it</div></div>
    <div class="add-form" id="af" style="display:none">
      <div class="fl">Name this moment</div>
      <input class="fi" id="et" type="text" placeholder="e.g. Our first date" maxlength="60">
      <div class="fl">Type</div>
      <div class="trow">
        <button class="tbtn active" onclick="setType('memory',this)">&#9829; Memory</button>
        <button class="tbtn" onclick="setType('anniversary',this)">Anniversary</button>
        <button class="tbtn" onclick="setType('birthday',this)">Birthday</button>
        <button class="tbtn" onclick="setType('special',this)">Special</button>
      </div>
      <button class="svbtn" onclick="saveEv()">Mark this day</button>
    </div>
    <div id="sew" style="display:none"><div class="fl" style="margin-bottom:7px">On this day</div><div id="sel"></div></div>
  </div>
</div>
<div class="all-sec">
  <div class="all-head"><div class="all-title">All <em>Marked Dates</em></div><div class="all-line"></div><div class="all-cnt" id="ac">0 dates</div></div>
  <div class="afs">
    <button class="af active" onclick="setAF('all',this)">All</button>
    <button class="af" onclick="setAF('memory',this)">Memories</button>
    <button class="af" onclick="setAF('anniversary',this)">Anniversaries</button>
    <button class="af" onclick="setAF('birthday',this)">Birthdays</button>
    <button class="af" onclick="setAF('special',this)">Special</button>
  </div>
  <div class="all-grid" id="ag"></div>
</div>
</div>
<div class="ov" id="ov">
  <div class="cbox"><span class="cbi">&#128197;</span><div class="cbt">Remove this date?</div>
  <div class="cbs">Are you sure?<br><span class="cbn" id="cn">—</span></div>
  <div class="cbtns"><button class="cbtn cbtnk" onclick="closeC()">Keep it</button><button class="cbtn cbtnd" onclick="confirmD()">Remove</button></div></div>
</div>
</div></div>
<div class="toast" id="toast"></div>
<script>
const user=localStorage.getItem('user');if(!user)window.location.href='index.html';

const rceil=document.getElementById('rceil'),rtrack=document.getElementById('rtrack'),rfloor=document.getElementById('rfloor'),rbase=document.getElementById('rbase'),rwall=document.getElementById('rwall');
let _tk=false;
window.addEventListener('scroll',()=>{if(!_tk){requestAnimationFrame(()=>{const sy=window.scrollY;rceil.style.transform='translateY('+(sy*.05)+'px)';rtrack.style.transform='translateY('+(sy*.05)+'px)';rfloor.style.transform='translateY('+(-sy*.1)+'px)';rbase.style.transform='translateY('+(-sy*.1)+'px)';rwall.style.transform='translateY('+(sy*.018)+'px)';document.querySelectorAll('.sp-c').forEach(s=>{s.style.transform='translateX(-50%) translateY('+(sy*.04)+'px)';});_tk=false;});_tk=true;}},{passive:true});
let _mx=.5,_my=.5;document.addEventListener('mousemove',e=>{_mx=e.clientX/window.innerWidth;_my=e.clientY/window.innerHeight;const dx=(_mx-.5)*6,dy=(_my-.5)*3;rwall.style.transform='translate('+(dx*.4)+'px,'+(dy*.3)+'px) translateY('+(window.scrollY*.018)+'px)';});
(function(){const c=document.getElementById('dust'),ctx=c.getContext('2d');let W,H;function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}resize();window.addEventListener('resize',resize);const sXs=[.18,.50,.82];const ms=[];for(let i=0;i<80;i++)ms.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,r:Math.random()*1.4+.2,vx:(Math.random()-.5)*.2,vy:-(Math.random()*.2+.04),a:Math.random()*.08+.014,ph:Math.random()*Math.PI*2,fr:Math.random()*.006+.002});let t=0;function draw(){ctx.clearRect(0,0,W,H);t+=.008;for(const m of ms){m.x+=m.vx+Math.sin(t*m.fr+m.ph)*.28;m.y+=m.vy;if(m.y<-5){m.y=H+5;m.x=Math.random()*W;}if(m.x<0)m.x=W;if(m.x>W)m.x=0;let a=m.a;const wt=H*.2,wb=H*.76;if(m.y>wt&&m.y<wb){for(const sx of sXs){const cx=sx*W,cw=88,dx2=Math.abs(m.x-cx);if(dx2<cw){const fr=1-dx2/cw,yf=Math.max(0,1-(m.y-wt)/(wb-wt)*.7);a=Math.min(.55,a+fr*yf*.28);}}}ctx.beginPath();ctx.arc(m.x,m.y,m.r,0,Math.PI*2);ctx.fillStyle='rgba(200,185,150,'+a+')';ctx.fill();}requestAnimationFrame(draw);}draw();})();
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');}

const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const today=new Date();let cY=today.getFullYear(),cM=today.getMonth(),selDate=null,selType='memory',allFilter='all',pendId=null;
let _events=[];

const ys=document.getElementById('ys');
for(let y=1950;y<=2100;y++){const o=document.createElement('option');o.value=y;o.textContent=y;if(y===cY)o.selected=true;ys.appendChild(o);}

async function loadEvents(){
  try{
    const{data,error}=await db.from('calendar_events').select('*');
    if(error)throw error;
    _events=data||[];
  }catch(e){
    console.log('Cal load failed, using localStorage:',e);
    _events=JSON.parse(localStorage.getItem('cal_events'))||[];
  }
  renderCal();
}

function setYear(y){cY=parseInt(y);renderCal();}
function prevM(){cM--;if(cM<0){cM=11;cY--;ys.value=cY;}renderCal();}
function nextM(){cM++;if(cM>11){cM=0;cY++;ys.value=cY;}renderCal();}
function dk(y,m,d){return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');}

function renderCal(){
  document.getElementById('ml').textContent=MONTHS[cM];ys.value=cY;
  const map={};_events.forEach(e=>{if(!map[e.date])map[e.date]=[];map[e.date].push(e);});
  const fd=new Date(cY,cM,1).getDay(),dim=new Date(cY,cM+1,0).getDate(),pd=new Date(cY,cM,0).getDate();
  const tk2=dk(today.getFullYear(),today.getMonth(),today.getDate());
  let h='';
  for(let i=0;i<fd;i++)h+=`<div class="cd om"><div class="dn3">${pd-fd+1+i}</div></div>`;
  for(let d=1;d<=dim;d++){
    const key=dk(cY,cM,d),isT=key===tk2,isS=key===selDate,de=map[key]||[],hasE=de.length>0;
    const dots=de.slice(0,2).map(e=>`<div class="ddot ${e.type}">${e.title}</div>`).join('')+(de.length>2?`<div class="ddot">+${de.length-2}</div>`:'');
    h+=`<div class="cd${isT?' today':''}${isS?' sel':''}${hasE?' he':''}" onclick="selDay('${key}')"><div class="dn3">${d}</div><div class="ddots">${dots}</div></div>`;
  }
  const tot=fd+dim,rem=tot%7===0?0:7-(tot%7);
  for(let i=1;i<=rem;i++)h+=`<div class="cd om"><div class="dn3">${i}</div></div>`;
  document.getElementById('cg').innerHTML=h;
  if(selDate)renderSel(selDate);
  renderAll();
}

function selDay(key){selDate=key;const[y,m,d]=key.split('-');document.getElementById('sdt').textContent=MONTHS[parseInt(m)-1]+' '+parseInt(d)+', '+y;document.getElementById('sds').textContent='mark this day';document.getElementById('af').style.display='flex';document.getElementById('et').focus();renderCal();}

function renderSel(key){
  const evs=_events.filter(e=>e.date===key);
  const w=document.getElementById('sew'),l=document.getElementById('sel');
  if(!evs.length){w.style.display='none';return;}
  w.style.display='block';
  l.innerHTML=evs.map(e=>`<div class="sev"><div class="sevdot ${e.type}"></div><div class="sev-t">${esc(e.title)}</div><button class="sev-del" onclick="askD('${e.id}','${esc(e.title)}')">&#215;</button></div>`).join('');
}

function renderAll(){
  let fil=_events;
  if(allFilter!=='all')fil=_events.filter(e=>e.type===allFilter);
  fil.sort((a,b)=>a.date.localeCompare(b.date));
  document.getElementById('ac').textContent=fil.length+' date'+(fil.length===1?'':'s');
  const g=document.getElementById('ag');
  if(!fil.length){g.innerHTML='<div class="all-empty">No dates marked yet.<br>Click any day to begin.</div>';return;}
  g.innerHTML=fil.map((e,i)=>{
    const[y,m,d]=e.date.split('-'),fr=MONTHS[parseInt(m)-1]+' '+parseInt(d)+', '+y;
    return `<div class="dc" style="animation-delay:${Math.min(i*.04,.4)}s"><div class="dc-str ${e.type}"></div><div class="dc-body"><div class="dc-title">${esc(e.title)}</div><div class="dc-meta"><span class="dc-date">&#128197; ${fr}</span><span class="tc ${e.type}">${e.type}</span></div></div><button class="dc-del" onclick="askD('${e.id}','${esc(e.title)}')">Remove</button></div>`;
  }).join('');
}

function setAF(f,btn){allFilter=f;document.querySelectorAll('.af').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderAll();}
function setType(t,btn){selType=t;document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}

async function saveEv(){
  const title=document.getElementById('et').value.trim();
  if(!title||!selDate)return;
  const id=Date.now()+'_'+Math.random().toString(36).slice(2);
  const ev={id,date:selDate,title,type:selType,by_user:user};
  try{
    const{error}=await db.from('calendar_events').insert(ev);
    if(error)throw error;
  }catch(e){
    console.log('Cal save fallback:',e);
    const evs=JSON.parse(localStorage.getItem('cal_events'))||[];
    evs.push({...ev,by:user});
    localStorage.setItem('cal_events',JSON.stringify(evs));
  }
  document.getElementById('et').value='';
  await loadEvents();
  showToast('Date marked ♥');
}

function askD(id,title){pendId=id;document.getElementById('cn').textContent='"'+title+'"';document.getElementById('ov').classList.add('open');}
function closeC(){pendId=null;document.getElementById('ov').classList.remove('open');}

async function confirmD(){
  if(!pendId)return;
  try{
    const{error}=await db.from('calendar_events').delete().eq('id',pendId);
    if(error)throw error;
  }catch(e){
    const evs=JSON.parse(localStorage.getItem('cal_events'))||[];
    localStorage.setItem('cal_events',JSON.stringify(evs.filter(e=>e.id!==pendId)));
  }
  closeC();
  await loadEvents();
  showToast('Removed');
}

document.getElementById('ov').addEventListener('click',function(e){if(e.target===this)closeC();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeC();});
document.getElementById('et').addEventListener('keydown',e=>{if(e.key==='Enter')saveEv();});

// Real-time sync for calendar
db.channel('cal-changes')
  .on('postgres_changes',{event:'*',schema:'public',table:'calendar_events'},()=>loadEvents())
  .subscribe();

loadEvents();
</script>
</body>
</html>
