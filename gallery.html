<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Gallery · Our World</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Lato:wght@300;400;700&family=Dancing+Script:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   TOKENS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
:root {
  --bg:        #0a0403;
  --wall:      #1c0d08;
  --wall2:     #231009;
  --wall3:     #2b1308;
  --moulding:  #3e2010;
  --floor:     #0c0503;
  --gold:      #c8a050;
  --gold2:     #ead080;
  --gold-dim:  #7a5828;
  --rose:      #c97b84;
  --blush:     #e8b4b8;
  --cream:     #f5ede4;
  --text:      #f0e4dc;
  --muted:     #8a6a68;
  --border:    rgba(200,160,80,0.18);
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow-x: hidden; }

body {
  font-family: 'Lato', sans-serif;
  background: var(--bg);
  color: var(--text);
  cursor: default;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ENTRANCE SEQUENCE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

/* Full-screen black veil */
.veil {
  position: fixed; inset: 0; z-index: 1000;
  background: #000;
  pointer-events: none;
  animation: veilFade 0.8s ease 3.6s forwards;
}
@keyframes veilFade { to { opacity: 0; pointer-events: none; } }

/* Door frame container */
.door-scene {
  position: fixed; inset: 0; z-index: 900;
  display: flex; align-items: center; justify-content: center;
  background: #000;
  animation: doorSceneFade 0.6s ease 3.4s forwards;
  pointer-events: none;
}
@keyframes doorSceneFade { to { opacity: 0; } }

/* Door arch outer */
.door-arch {
  position: relative;
  width: min(300px, 60vw);
  height: min(460px, 75vh);
  animation: doorArchScale 1s cubic-bezier(.22,1,.36,1) 0.2s both;
}
@keyframes doorArchScale { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }

/* Stone arch frame */
.door-arch::before {
  content: '';
  position: absolute; inset: -16px;
  border-radius: 50% 50% 0 0 / 30% 30% 0 0;
  border: 3px solid rgba(200,160,80,.35);
  background: linear-gradient(to bottom, rgba(60,25,10,.8), rgba(30,12,5,.9));
  box-shadow: 0 0 60px rgba(200,160,80,.08), inset 0 0 30px rgba(0,0,0,.5);
}

/* Gold arch trim */
.door-arch::after {
  content: '';
  position: absolute; inset: -8px;
  border-radius: 50% 50% 0 0 / 28% 28% 0 0;
  border: 1px solid rgba(200,160,80,.25);
}

/* Door panels - two halves that swing open */
.door-left, .door-right {
  position: absolute; top: 0; bottom: 0; width: 50%;
  background: linear-gradient(160deg, #2a1208, #1a0a04, #2e1508);
  border: 1px solid rgba(200,160,80,.2);
  overflow: hidden;
  transform-origin: left center;
  animation: doorOpenLeft 1.4s cubic-bezier(.4,0,.2,1) 1.4s forwards;
}
.door-right {
  left: 50%;
  transform-origin: right center;
  animation: doorOpenRight 1.4s cubic-bezier(.4,0,.2,1) 1.4s forwards;
  background: linear-gradient(200deg, #2a1208, #1a0a04, #261006);
}

@keyframes doorOpenLeft  {
  0%   { transform: perspective(600px) rotateY(0deg); }
  100% { transform: perspective(600px) rotateY(-85deg); }
}
@keyframes doorOpenRight {
  0%   { transform: perspective(600px) rotateY(0deg); }
  100% { transform: perspective(600px) rotateY(85deg); }
}

/* Door wood grain lines */
.door-left::before, .door-right::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    180deg,
    transparent 0px, transparent 18px,
    rgba(0,0,0,.08) 18px, rgba(0,0,0,.08) 19px
  );
}

/* Door panel inset detail */
.door-left::after, .door-right::after {
  content: '';
  position: absolute;
  inset: 18px 12px;
  border: 1px solid rgba(200,160,80,.12);
  border-radius: 1px;
}

/* Door knob */
.door-knob {
  position: absolute;
  top: 50%; right: 6px;
  transform: translateY(-50%);
  width: 10px; height: 10px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, var(--gold2), var(--gold-dim));
  box-shadow: 0 0 6px rgba(200,160,80,.4);
}
.door-right .door-knob { right: auto; left: 6px; }

/* Warm glow from inside - visible as door opens */
.door-glow {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 80% 100% at 50% 80%, rgba(255,140,50,.18) 0%, transparent 70%);
  opacity: 0;
  animation: doorGlowIn 1s ease 1.8s forwards;
}
@keyframes doorGlowIn { to { opacity: 1; } }

/* Room reveal text */
.enter-text {
  position: absolute;
  bottom: -50px; left: 50%;
  transform: translateX(-50%);
  white-space: nowrap;
  font-family: 'Dancing Script', cursive;
  font-size: 16px; color: rgba(200,160,80,.5);
  letter-spacing: .15em;
  opacity: 0;
  animation: enterTextFade 1s ease 0.8s forwards;
}
@keyframes enterTextFade { to { opacity: 1; } }

/* Welcome words that appear before door opens */
.welcome-words {
  position: absolute;
  top: -70px; left: 50%;
  transform: translateX(-50%);
  text-align: center;
  white-space: nowrap;
}
.welcome-words .w1 {
  display: block;
  font-family: 'Playfair Display', serif;
  font-size: clamp(18px,3vw,26px); font-style: italic; font-weight: 400;
  color: rgba(232,180,184,.7); letter-spacing: .08em;
  opacity: 0;
  animation: wWordIn .8s ease 0.3s forwards;
}
.welcome-words .w2 {
  display: block;
  font-family: 'Dancing Script', cursive;
  font-size: clamp(14px,2.5vw,18px);
  color: rgba(200,160,80,.45); letter-spacing: .1em;
  opacity: 0;
  animation: wWordIn .8s ease 0.7s forwards;
}
@keyframes wWordIn { to { opacity: 1; } }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   CANVAS (petals)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ROOM STRUCTURE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.room-wrap {
  min-height: 100vh;
  position: relative;
  opacity: 0;
  animation: roomReveal 1.2s ease 3.4s forwards;
  background:
    linear-gradient(to bottom,
      #08030200 0px,
      var(--wall2) 90px,
      var(--wall2) calc(100% - 80px),
      var(--moulding) calc(100% - 80px),
      var(--moulding) calc(100% - 64px),
      #060201 calc(100% - 64px),
      #030100 100%
    );
}
@keyframes roomReveal { to { opacity: 1; } }

/* Perspective zoom-in on room reveal — gives "walking in" feel */
.room-wrap { animation: roomReveal 1.2s ease 3.4s forwards, roomZoomIn 1.8s cubic-bezier(.22,1,.36,1) 3.2s both; }
@keyframes roomZoomIn {
  from { transform: scale(1.15); filter: blur(8px); }
  to   { transform: scale(1);    filter: blur(0); }
}

/* Wall texture */
.room-wrap::before {
  content: '';
  position: fixed; inset: 0;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,.025) 3px, rgba(0,0,0,.025) 4px),
    repeating-linear-gradient(90deg, transparent, transparent 4px, rgba(0,0,0,.02) 4px, rgba(0,0,0,.02) 5px);
  pointer-events: none; z-index: 0;
}

/* Ceiling light bloom */
.ceiling-light {
  position: fixed; top: -120px; left: 50%; transform: translateX(-50%);
  width: 120vw; height: 600px;
  background: radial-gradient(ellipse, rgba(255,180,80,.07) 0%, rgba(200,120,40,.025) 35%, transparent 65%);
  pointer-events: none; z-index: 2;
  animation: ceilBreath 7s ease-in-out infinite alternate;
}
@keyframes ceilBreath { 0%{opacity:.7;} 100%{opacity:1;} }

/* Picture rail */
.picture-rail {
  position: fixed; top: 72px; left: 0; right: 0; height: 8px; z-index: 10; pointer-events: none;
  background: linear-gradient(to bottom, rgba(200,160,80,.35), rgba(100,60,20,.2));
  box-shadow: 0 2px 10px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,220,120,.15);
}

/* Baseboard */
.baseboard {
  position: fixed; bottom: 0; left: 0; right: 0; height: 64px; z-index: 10; pointer-events: none;
  background: linear-gradient(to top, #030100, #080402, var(--moulding));
  box-shadow: 0 -6px 30px rgba(0,0,0,.7);
}
.baseboard::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent 5%, var(--gold-dim) 30%, var(--gold) 50%, var(--gold-dim) 70%, transparent 95%);
  opacity: .5;
}

/* Header */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 52px;
  background: linear-gradient(to bottom, rgba(8,3,2,.98) 60%, transparent);
  opacity: 0;
  animation: headerIn .8s ease 4.2s forwards;
}
@keyframes headerIn { to { opacity: 1; } }

.brand { display: flex; align-items: center; gap: 12px; }
.brand-heart { font-size: 18px; animation: heartbeat 2.8s ease-in-out infinite; filter: drop-shadow(0 0 7px rgba(200,100,100,.4)); }
@keyframes heartbeat { 0%,100%{transform:scale(1);} 14%{transform:scale(1.18);} 28%{transform:scale(1);} 42%{transform:scale(1.1);} 56%{transform:scale(1);} }
.brand-name { font-family: 'Dancing Script', cursive; font-size: 20px; color: var(--blush); opacity: .85; }
.header-right { display: flex; align-items: center; gap: 12px; }

.upload-pill {
  display: flex; align-items: center; gap: 8px;
  font-family: 'Playfair Display', serif; font-size: 13px; font-style: italic;
  color: var(--gold2); background: rgba(200,160,80,.08);
  border: 1px solid rgba(200,160,80,.25); border-radius: 2px;
  padding: 8px 18px; cursor: pointer; position: relative; overflow: hidden;
  transition: all .3s;
}
.upload-pill::before { content: ''; position: absolute; inset: 0; background: rgba(200,160,80,.1); transform: translateX(-101%); transition: transform .35s cubic-bezier(.22,1,.36,1); }
.upload-pill:hover::before { transform: translateX(0); }
.upload-pill:hover { color: var(--cream); }
.upload-pill span { position: relative; z-index: 1; }
.upload-pill input { position: absolute; inset: 0; opacity: 0; cursor: pointer; font-size: 0; }

.back-btn { font-size: 11px; letter-spacing: .12em; color: var(--muted); background: transparent; border: 1px solid rgba(138,106,104,.3); border-radius: 2px; padding: 7px 16px; cursor: pointer; transition: all .25s; text-transform: uppercase; }
.back-btn:hover { color: var(--blush); border-color: var(--border); }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   GALLERY CONTENT
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.gallery-content {
  position: relative; z-index: 5;
  padding: 110px 60px 140px;
  min-height: 100vh;
}

/* Spotlights */
.spot {
  position: fixed; top: 0;
  width: 160px; height: 55vh;
  background: linear-gradient(to bottom, rgba(255,190,90,.055) 0%, rgba(255,160,60,.02) 50%, transparent 100%);
  clip-path: polygon(25% 0%, 75% 0%, 100% 100%, 0% 100%);
  pointer-events: none; z-index: 3;
  opacity: 0;
  animation: spotIn .8s ease var(--sd) forwards, spotBreath 5s ease-in-out calc(var(--sd) + 0.8s) infinite alternate;
}
@keyframes spotIn    { to { opacity: 1; } }
@keyframes spotBreath { 0%{opacity:.55;} 100%{opacity:.9;} }

/* Room placard */
.room-placard {
  text-align: center; margin-bottom: 64px;
  opacity: 0; animation: placardIn 1s ease 4.5s forwards;
}
@keyframes placardIn { to { opacity: 1; transform: translateY(0); } }
.room-placard { transform: translateY(20px); }
@keyframes placardIn { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:none;} }

.plac-line { display: flex; align-items: center; gap: 20px; justify-content: center; margin-bottom: 14px; }
.plac-orn  { font-size: 15px; color: var(--gold); opacity: .4; }
.plac-rule { width: 90px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold-dim), transparent); }
.room-name {
  font-family: 'Playfair Display', serif; font-size: clamp(26px,5vw,50px);
  font-style: italic; font-weight: 400; color: var(--cream);
  letter-spacing: .02em; line-height: 1.1;
  text-shadow: 0 0 50px rgba(255,160,60,.1);
}
.room-name em { color: var(--gold2); }
.room-sub { font-family: 'Dancing Script', cursive; font-size: 17px; color: var(--muted); margin-top: 8px; letter-spacing: .06em; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   GALLERY WALL
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.gallery-wall { display: flex; flex-direction: column; gap: 84px; }

.frame-row {
  display: flex; align-items: flex-end; justify-content: center;
  gap: clamp(28px,5vw,68px); flex-wrap: wrap; padding: 0 10px;
}

/* ── FRAME WRAP ── */
.frame-wrap {
  position: relative; cursor: pointer;
  transform: rotate(var(--tilt)) translateY(30px);
  opacity: 0;
  animation: frameFloat 0.9s cubic-bezier(.22,1,.36,1) var(--fd) forwards;
  transform-origin: top center;
  transition: filter .3s;
}
@keyframes frameFloat {
  to { opacity: 1; transform: rotate(var(--tilt)) translateY(0); }
}
.frame-wrap:hover { z-index: 20; filter: brightness(1.08); }
.frame-wrap:hover .frame-outer {
  transform: translateY(-14px) scale(1.04) rotate(0deg);
  box-shadow:
    0 28px 70px rgba(0,0,0,.75),
    0 0 40px rgba(200,160,80,.14),
    0 0 80px rgba(200,160,80,.06);
}
.frame-outer {
  transition: transform .45s cubic-bezier(.22,1,.36,1), box-shadow .45s;
  transform: translateY(0) scale(1) rotate(0deg);
}

/* Nail */
.nail {
  position: absolute; top: -42px; left: 50%; transform: translateX(-50%);
  width: 7px; height: 7px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, var(--gold2), var(--gold-dim));
  box-shadow: 0 0 6px rgba(200,160,80,.5), 0 1px 3px rgba(0,0,0,.7);
  z-index: 2;
}

/* Wire */
.wire {
  position: absolute; top: -38px; left: 50%; transform: translateX(-50%);
  width: 60px; height: 38px; pointer-events: none; z-index: 1;
}

/* Gold frame border */
.frame-border {
  background: linear-gradient(145deg,
    #d4a840 0%, #8a5e20 20%, #c8a050 40%,
    #6e4e18 55%, #b89040 70%, #7a5520 85%, #c0a048 100%
  );
  border-radius: 2px;
  position: relative;
  box-shadow:
    0 8px 30px rgba(0,0,0,.6),
    inset 0 1px 0 rgba(255,220,120,.2),
    inset 0 -1px 0 rgba(0,0,0,.4);
}
/* Bevel highlight */
.frame-border::before {
  content: ''; position: absolute; inset: 0; border-radius: 2px; z-index: 2; pointer-events: none;
  background: linear-gradient(135deg, rgba(255,220,130,.22) 0%, transparent 45%, rgba(0,0,0,.25) 100%);
}

/* Mat */
.frame-mat {
  margin: 10px; background: #ede6d4; position: relative; overflow: hidden;
}
.frame-mat::after {
  content: ''; position: absolute; inset: 0; z-index: 3; pointer-events: none;
  background: linear-gradient(135deg, rgba(255,255,255,.06) 0%, transparent 50%, rgba(0,0,0,.05) 100%);
}

/* Media */
.frame-media { display: block; width: 100%; height: 100%; object-fit: cover; }
video.frame-media { background: #000; }

/* Video badge */
.play-badge {
  position: absolute; inset: 0; z-index: 4;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,.18); font-size: 30px; color: rgba(255,255,255,.7);
  transition: background .3s;
}
.frame-wrap:hover .play-badge { background: rgba(0,0,0,.28); }

/* Nameplate */
.nameplate {
  display: table; margin: 8px auto 0;
  background: linear-gradient(135deg, #a07830, #7a5820, #906e28);
  padding: 4px 14px 5px; border-radius: 1px;
  box-shadow: 0 2px 8px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,220,100,.12);
  max-width: calc(100% - 20px);
}
.nameplate-title {
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: 11px; color: var(--gold2); letter-spacing: .06em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 180px; line-height: 1.5; display: block;
}
.nameplate-date { font-size: 9px; color: rgba(232,200,112,.45); letter-spacing: .08em; display: block; }

/* Spotlight glow on frame hover */
.frame-glow {
  position: absolute; top: -60px; left: 50%; transform: translateX(-50%);
  width: 200%; height: 200px;
  background: radial-gradient(ellipse, rgba(255,200,80,.1) 0%, transparent 65%);
  opacity: 0; pointer-events: none; z-index: -1;
  transition: opacity .4s;
}
.frame-wrap:hover .frame-glow { opacity: 1; }

/* Frame sizes */
.fsm  .frame-mat { width: 140px; height: 120px; }
.fmd  .frame-mat { width: 190px; height: 155px; }
.flg  .frame-mat { width: 245px; height: 195px; }
.fxl  .frame-mat { width: 300px; height: 238px; }
.ftall .frame-mat { width: 145px; height: 205px; }
.fwide .frame-mat { width: 265px; height: 150px; }

/* Section wall divider */
.wall-div {
  display: flex; align-items: center; gap: 20px;
  margin: 0 auto; max-width: 480px;
}
.wall-div-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(200,160,80,.18), transparent); }
.wall-div-orn  { font-size: 13px; color: var(--gold); opacity: .28; }

/* Empty state */
.empty-room { text-align: center; padding: 80px 0; animation: fadeUp .7s ease .5s both; }
.empty-frame-box {
  width: 200px; height: 160px; margin: 0 auto 24px;
  border: 2px solid rgba(200,160,80,.18); border-radius: 2px;
  background: rgba(200,160,80,.03);
  box-shadow: 4px 4px 0 rgba(0,0,0,.3), 8px 8px 0 rgba(0,0,0,.14);
  display: flex; align-items: center; justify-content: center;
  font-size: 48px; opacity: .25; position: relative;
}
.empty-frame-box::before { content: ''; position: absolute; inset: 10px; border: 1px solid rgba(200,160,80,.12); border-radius: 1px; }
.empty-text { font-family: 'Dancing Script', cursive; font-size: 20px; color: var(--muted); line-height: 1.8; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   LIGHTBOX
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.lightbox {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(3,1,1,.97);
  display: none; align-items: center; justify-content: center; flex-direction: column; gap: 20px; padding: 20px;
}
.lightbox.open { display: flex; }
.lb-frame {
  background: linear-gradient(145deg, #d4a840, #8a5e20, #c8a050, #6e4e18, #b89040);
  padding: 12px; border-radius: 2px;
  box-shadow: 0 30px 90px rgba(0,0,0,.85), 0 0 60px rgba(200,160,80,.08);
  max-width: 90vw; max-height: 82vh;
  animation: lbIn .4s cubic-bezier(.22,1,.36,1) both; position: relative;
}
.lb-frame::before {
  content: ''; position: absolute; inset: 0; z-index: 2; pointer-events: none; border-radius: 2px;
  background: linear-gradient(135deg, rgba(255,220,120,.2) 0%, transparent 40%, rgba(0,0,0,.2) 100%);
}
@keyframes lbIn { from{opacity:0;transform:scale(.88);}to{opacity:1;transform:scale(1);} }
.lb-mat { background: #ede6d4; padding: 8px; }
.lb-img { display: block; max-width: min(82vw,820px); max-height: 68vh; object-fit: contain; }
.lb-vid { display: block; max-width: min(82vw,820px); max-height: 68vh; }
.lb-plate { background: linear-gradient(135deg, #a07830, #7a5820); padding: 6px 20px 7px; text-align: center; }
.lb-title { font-family: 'Playfair Display', serif; font-style: italic; font-size: 14px; color: var(--gold2); letter-spacing: .06em; display: block; }
.lb-date  { font-size: 10px; color: rgba(232,200,112,.45); letter-spacing: .08em; display: block; }
.lb-close {
  position: fixed; top: 22px; right: 26px;
  background: rgba(14,6,4,.85); border: 1px solid rgba(200,160,80,.18); border-radius: 50%;
  width: 40px; height: 40px; font-size: 22px; color: var(--muted);
  cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s;
}
.lb-close:hover { color: var(--blush); border-color: var(--border); }
.lb-del {
  font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
  color: var(--muted); background: transparent; border: 1px solid rgba(138,106,104,.25);
  border-radius: 2px; padding: 7px 18px; cursor: pointer; transition: all .25s;
}
.lb-del:hover { color: #d47a7a; border-color: rgba(212,120,120,.35); }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   DRAG HINT
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.drag-hint {
  position: fixed; inset: 0; z-index: 400;
  background: rgba(8,3,2,.93); border: 2px dashed rgba(200,160,80,.25);
  display: none; align-items: center; justify-content: center; flex-direction: column; gap: 16px;
}
.drag-hint.show { display: flex; }
.dh-icon { font-size: 56px; opacity: .5; }
.dh-text { font-family: 'Playfair Display', serif; font-size: 26px; font-style: italic; color: var(--gold2); }
.dh-sub  { font-family: 'Dancing Script', cursive; font-size: 18px; color: var(--muted); }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   TOAST
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.toast {
  position: fixed; bottom: 80px; left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: rgba(10,4,2,.96); border: 1px solid rgba(200,160,80,.2); border-radius: 2px;
  padding: 10px 28px; font-family: 'Dancing Script', cursive; font-size: 15px; color: var(--gold2);
  opacity: 0; transition: all .3s ease; z-index: 600; pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@keyframes fadeUp { from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:none;} }

@media (max-width: 640px) {
  .header { padding: 16px 20px; }
  .gallery-content { padding: 100px 16px 130px; }
  .frame-row { gap: 20px; }
  .flg .frame-mat, .fxl .frame-mat { width: 180px; height: 145px; }
  .fwide .frame-mat { width: 190px; height: 130px; }
  .ftall .frame-mat { width: 120px; height: 170px; }
  .door-arch { width: min(240px,55vw); height: min(380px,70vh); }
}
</style>
</head>
<body>

<!-- ── ENTRANCE SEQUENCE ── -->
<div class="veil"></div>
<div class="door-scene" id="door-scene">
  <div class="door-arch">
    <div class="welcome-words">
      <span class="w1">welcome to our world</span>
      <span class="w2">a room that belongs to us, forever</span>
    </div>
    <div class="door-glow"></div>
    <div class="door-left"><div class="door-knob"></div></div>
    <div class="door-right"><div class="door-knob"></div></div>
    <div class="enter-text">✦ &nbsp; entering &nbsp; ✦</div>
  </div>
</div>

<!-- ── CANVAS ── -->
<canvas id="c"></canvas>

<!-- ── ROOM ── -->
<div class="room-wrap">
  <div class="ceiling-light"></div>
  <div class="picture-rail"></div>
  <div class="baseboard"></div>

  <!-- Spotlights (staggered) -->
  <div class="spot" style="left:10%;--sd:4.8s;animation-delay:4.8s,5.6s;"></div>
  <div class="spot" style="left:28%;--sd:5.0s;animation-delay:5.0s,5.8s;"></div>
  <div class="spot" style="left:50%;--sd:5.2s;animation-delay:5.2s,6.0s;"></div>
  <div class="spot" style="left:70%;--sd:5.0s;animation-delay:5.0s,5.8s;"></div>
  <div class="spot" style="left:88%;--sd:4.8s;animation-delay:4.8s,5.6s;"></div>

  <!-- Header -->
  <header class="header">
    <div class="brand">
      <span class="brand-heart">🌹</span>
      <span class="brand-name">Our Gallery</span>
    </div>
    <div class="header-right">
      <label class="upload-pill">
        <input type="file" id="file-input" multiple accept="image/*,video/*" onchange="handleFiles(this.files)">
        <span>+ Hang a memory</span>
      </label>
      <button class="back-btn" onclick="window.location.href='home.html'">← Home</button>
    </div>
  </header>

  <!-- Gallery content -->
  <div class="gallery-content">
    <div class="room-placard">
      <div class="plac-line"><div class="plac-rule"></div><span class="plac-orn">✦</span><div class="plac-rule"></div></div>
      <div class="room-name">The Gallery of <em>Our Story</em></div>
      <div class="room-sub">every frame holds a memory that lasts forever</div>
      <div class="plac-line" style="margin-top:14px;"><div class="plac-rule"></div><span class="plac-orn">✦</span><div class="plac-rule"></div></div>
    </div>
    <div class="gallery-wall" id="gallery-wall"></div>
  </div>

</div><!-- .room-wrap -->

<!-- Drag hint -->
<div class="drag-hint" id="drag-hint">
  <div class="dh-icon">🖼️</div>
  <div class="dh-text">Drop your memory here</div>
  <div class="dh-sub">it will be framed with love ♥</div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="closeLB()">×</button>
  <div class="lb-frame">
    <div class="lb-mat">
      <img  class="lb-img" id="lb-img" src="" alt="" style="display:none">
      <video class="lb-vid" id="lb-vid" controls src="" style="display:none"></video>
    </div>
    <div class="lb-plate">
      <span class="lb-title" id="lb-title">—</span>
      <span class="lb-date"  id="lb-date">—</span>
    </div>
  </div>
  <button class="lb-del" onclick="delFromLB()">Remove from gallery</button>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── AUTH ── */
const user = localStorage.getItem('user');
if (!user) window.location.href = 'index.html';

/* ── PETAL CANVAS ── */
(function(){
  const c = document.getElementById('c'), ctx = c.getContext('2d');
  let W, H;
  function resize(){ W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  const S = ['❤','♥','·','·','·','✿'], ps = [];
  for(let i = 0; i < 45; i++) ps.push({
    x: Math.random()*window.innerWidth,
    y: Math.random()*window.innerHeight + window.innerHeight,
    sym: S[Math.floor(Math.random()*S.length)],
    size: Math.random()*9+4, speed: Math.random()*.38+.14,
    drift: (Math.random()-.5)*.3, alpha: Math.random()*.16+.04,
    rot: Math.random()*Math.PI*2, rotSpeed: (Math.random()-.5)*.01,
    phase: Math.random()*Math.PI*2, sway: Math.random()*.5+.2
  });
  let t = 0;
  function draw(){
    ctx.clearRect(0,0,W,H); t += .01;
    for(const p of ps){
      p.y -= p.speed; p.x += Math.sin(t*p.sway+p.phase)*p.drift; p.rot += p.rotSpeed;
      if(p.y < -30){ p.y = H+20; p.x = Math.random()*W; }
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.globalAlpha = p.alpha; ctx.font = p.size+'px serif';
      ctx.fillStyle = (p.sym==='·'||p.sym==='✿') ? 'rgba(240,215,205,1)' : 'rgba(210,120,130,1)';
      ctx.textAlign = 'center'; ctx.fillText(p.sym,0,0); ctx.restore();
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ── WIRE SVG ── */
function wireHTML(){
  return `<svg class="wire" viewBox="0 0 60 38" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M30 2 Q12 18 4 36" stroke="rgba(200,160,80,.3)" stroke-width="0.8" fill="none"/>
    <path d="M30 2 Q48 18 56 36" stroke="rgba(200,160,80,.3)" stroke-width="0.8" fill="none"/>
  </svg>`;
}

/* ── STORAGE ── */
function getItems(){ return JSON.parse(localStorage.getItem('gallery_items')) || []; }
function saveItems(items){ localStorage.setItem('gallery_items', JSON.stringify(items)); }

/* ── DRAG & DROP ── */
let dc = 0;
document.addEventListener('dragenter', e => { e.preventDefault(); dc++; document.getElementById('drag-hint').classList.add('show'); });
document.addEventListener('dragleave', () => { dc--; if(dc<=0){ dc=0; document.getElementById('drag-hint').classList.remove('show'); } });
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault(); dc=0; document.getElementById('drag-hint').classList.remove('show');
  handleFiles(e.dataTransfer.files);
});

/* ── UPLOAD ── */
function handleFiles(files){
  const arr = Array.from(files); if(!arr.length) return;
  let loaded = 0;
  arr.forEach(file => {
    const r = new FileReader();
    r.onload = e => {
      const items = getItems();
      items.push({
        id: Date.now()+'_'+Math.random().toString(36).slice(2),
        name: file.name.replace(/\.[^.]+$/,''),
        type: file.type.startsWith('video') ? 'video' : 'image',
        data: e.target.result,
        date: new Date().toLocaleDateString([],{month:'long',day:'numeric',year:'numeric'}),
        uploader: user
      });
      saveItems(items);
      loaded++;
      if(loaded === arr.length){ render(); showToast(loaded===1 ? 'Memory framed ♥' : `${loaded} memories framed ♥`); }
    };
    r.readAsDataURL(file);
  });
}

/* ── FRAME CONFIG ── */
const SIZES  = ['fmd','flg','fxl','fsm','ftall','fwide','flg','fmd','fsm','fxl','fwide','ftall'];
const TILTS  = [-2.4, 1.7, -1.1, 2.9, -3.2, 0.9, 2.1, -1.7, 0.7, -2.2, 1.4, -0.7, 3.1, -1.5];

/* ── RENDER ── */
function render(){
  const items = getItems();
  const wall  = document.getElementById('gallery-wall');

  if(items.length === 0){
    wall.innerHTML = `<div class="frame-row"><div class="empty-room">
      <div class="empty-frame-box">🖼️</div>
      <div class="empty-text">This room waits for your memories.<br><span style="font-size:14px;opacity:.6">Click "Hang a memory" or drag photos in ♥</span></div>
    </div></div>`;
    return;
  }

  // Group into rows
  const rows = [];
  let i = 0, rowPatterns = [3,2,4,3,2,3];
  let pi = 0;
  while(i < items.length){
    const sz = Math.min(rowPatterns[pi % rowPatterns.length], items.length - i);
    rows.push(items.slice(i, i+sz));
    i += sz; pi++;
  }

  let gi = 0;
  // Frames animate after room reveal (starts ~4.4s)
  const BASE_DELAY = 4.6;

  wall.innerHTML = rows.map((row, ri) => {
    const framesHtml = row.map(item => {
      const idx  = gi++;
      const size = SIZES[idx % SIZES.length];
      const tilt = TILTS[idx % TILTS.length];
      const fd   = (BASE_DELAY + idx * 0.18).toFixed(2) + 's';
      const isV  = item.type === 'video';
      const media = isV
        ? `<video class="frame-media" src="${item.data}" muted preload="metadata"></video><div class="play-badge">▶</div>`
        : `<img class="frame-media" src="${item.data}" alt="${esc(item.name)}" loading="lazy">`;
      return `
        <div class="frame-wrap ${size}" style="--tilt:${tilt}deg;--fd:${fd}" onclick="openLB('${item.id}')">
          <div class="nail"></div>
          ${wireHTML()}
          <div class="frame-glow"></div>
          <div class="frame-outer">
            <div class="frame-border">
              <div class="frame-mat">${media}</div>
            </div>
            <div class="nameplate">
              <span class="nameplate-title">${esc(item.name)}</span>
              <span class="nameplate-date">${item.date}</span>
            </div>
          </div>
        </div>`;
    }).join('');

    const div = ri < rows.length-1
      ? `<div class="wall-div" style="animation:fadeUp .6s ease ${(BASE_DELAY + gi*0.18 + .2).toFixed(2)}s both">
           <div class="wall-div-line"></div><span class="wall-div-orn">❧</span><div class="wall-div-line"></div>
         </div>` : '';

    return `<div class="frame-row">${framesHtml}</div>${div}`;
  }).join('');
}

/* ── LIGHTBOX ── */
let lbId = null;
function openLB(id){
  const item = getItems().find(i => i.id === id);
  if(!item) return; lbId = id;
  const img = document.getElementById('lb-img'), vid = document.getElementById('lb-vid');
  if(item.type==='video'){ img.style.display='none'; vid.style.display='block'; vid.src=item.data; }
  else { vid.style.display='none'; img.style.display='block'; img.src=item.data; }
  document.getElementById('lb-title').textContent = item.name;
  document.getElementById('lb-date').textContent  = item.date + ' · ' + item.uploader;
  document.getElementById('lightbox').classList.add('open');
}
function closeLB(){
  document.getElementById('lightbox').classList.remove('open');
  const v = document.getElementById('lb-vid'); v.pause(); v.src=''; lbId=null;
}
function delFromLB(){
  if(!lbId) return;
  if(!confirm('Remove this memory from the gallery?')) return;
  saveItems(getItems().filter(i=>i.id!==lbId));
  closeLB(); render(); showToast('Removed from the gallery ♥');
}
document.getElementById('lightbox').addEventListener('click', e => { if(e.target===document.getElementById('lightbox')) closeLB(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeLB(); });

/* ── HELPERS ── */
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg){
  const t = document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

render();
</script>
</body>
</html>
