<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Gallery · Our World</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{overflow-x:hidden;}
body{font-family:'Cormorant Garamond',serif;background:#0a0502;color:#2a1e0e;min-height:100vh;}

/* ROOM STRUCTURE */
.room-wall{position:fixed;inset:0;z-index:0;will-change:transform;background:radial-gradient(ellipse 95% 65% at 50% 28%,#c4b490 0%,#b0a278 25%,#948a64 55%,#786e50 80%,#605840 100%);}
.room-wall::before{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 35% 100% at 0% 50%,rgba(25,12,4,.58) 0%,transparent 65%),radial-gradient(ellipse 35% 100% at 100% 50%,rgba(25,12,4,.58) 0%,transparent 65%),radial-gradient(ellipse 100% 25% at 50% 0%,rgba(15,8,2,.68) 0%,transparent 55%),radial-gradient(ellipse 100% 18% at 50% 100%,rgba(8,4,1,.78) 0%,transparent 60%);}
.room-wall::after{content:'';position:absolute;left:0;right:0;bottom:0;height:28%;background:linear-gradient(to top,#3c2610 0px,#4e3218 12px,#624020 24px,#7a5230 40px,#8a6040 55%,rgba(130,90,55,.25) 100%);border-top:2px solid rgba(160,120,70,.38);}
.room-ceiling{position:fixed;top:0;left:0;right:0;z-index:10;height:22vh;will-change:transform;background:linear-gradient(to bottom,#0e0704 0%,#1c0e06 20%,#2c1a0a 45%,#3c2412 65%,rgba(60,34,14,.4) 85%,transparent 100%);}
.room-ceiling::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,rgba(0,0,0,.28) 0px,rgba(0,0,0,.28) 3px,transparent 3px,transparent calc(100%/8 - 3px),rgba(0,0,0,.18) calc(100%/8 - 3px),rgba(0,0,0,.18) calc(100%/8)),repeating-linear-gradient(0deg,transparent 0px,transparent 28px,rgba(0,0,0,.1) 28px,rgba(0,0,0,.1) 29px);}
.room-ceiling::after{content:'';position:absolute;bottom:0;left:0;right:0;height:50%;background:radial-gradient(ellipse 100% 100% at 50% 100%,rgba(255,180,80,.055) 0%,transparent 70%);}
.track-rail{position:fixed;top:22vh;left:4%;right:4%;z-index:11;height:10px;background:linear-gradient(to bottom,#120a04,#201408,#120a04);border-radius:5px;box-shadow:0 3px 10px rgba(0,0,0,.7),0 6px 20px rgba(0,0,0,.4);}
.room-floor{position:fixed;bottom:0;left:0;right:0;z-index:10;height:26vh;will-change:transform;overflow:hidden;}
.fp{position:absolute;inset:0;background:repeating-linear-gradient(90deg,#5a3c18 0px,#6a4820 58px,#4e3212 58px,#5a3c18 60px,#7a5830 60px,#8a6840 118px,#5a3c18 118px,#5a3c18 120px),linear-gradient(to top,#1e0e06 0%,#3a2010 18%,#6a4828 42%,#9a7858 68%,#b89070 88%,#c8a880 100%);background-blend-mode:multiply;}
.fs2{position:absolute;inset:0;background:linear-gradient(to top,rgba(255,210,130,.1) 0%,rgba(255,220,150,.04) 35%,transparent 60%);animation:fsn 7s ease-in-out infinite alternate;}
@keyframes fsn{0%{opacity:.4;}100%{opacity:1;}}
.fao{position:absolute;top:0;left:0;right:0;height:45%;background:linear-gradient(to bottom,rgba(15,8,2,.42),transparent);}
.baseboard{position:fixed;bottom:26vh;left:0;right:0;z-index:11;height:12px;background:linear-gradient(to top,#1c0e06,#2c1a0a,#1c0e06);box-shadow:0 -3px 10px rgba(0,0,0,.4);}
.baseboard::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(180,140,60,.38),transparent);}
.spots-fixed{position:fixed;top:0;left:0;right:0;bottom:0;z-index:3;pointer-events:none;}
.sp-h{position:absolute;top:calc(22vh + 10px);width:16px;height:16px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#f0e8c0,#c0a050 55%,#504020);transform:translateX(-50%);box-shadow:0 0 5px rgba(240,220,140,.28),0 2px 5px rgba(0,0,0,.8);}
.sp-c{position:absolute;top:calc(22vh + 20px);transform:translateX(-50%);width:190px;height:52vh;background:linear-gradient(to bottom,rgba(255,235,150,.1) 0%,rgba(255,215,110,.055) 22%,rgba(255,195,80,.022) 48%,transparent 78%);clip-path:polygon(34% 0%,66% 0%,100% 100%,0% 100%);animation:spf var(--spd,5s) ease-in-out infinite alternate;}
@keyframes spf{0%{opacity:.52;transform:translateX(-50%) skewX(0deg);}30%{opacity:.86;transform:translateX(-50%) skewX(.8deg);}60%{opacity:.62;transform:translateX(-50%) skewX(-.5deg);}100%{opacity:.58;transform:translateX(-50%) skewX(.3deg);}}
.sp-p{position:absolute;bottom:calc(26vh + 2px);transform:translateX(-50%);width:130px;height:22px;background:radial-gradient(ellipse,rgba(255,225,140,.17) 0%,transparent 70%);border-radius:50%;animation:spf var(--spd,5s) ease-in-out infinite alternate;}
canvas.dust{position:fixed;inset:0;z-index:5;pointer-events:none;}
.vignette{position:fixed;inset:0;z-index:6;pointer-events:none;background:radial-gradient(ellipse 82% 82% at 50% 48%,transparent 35%,rgba(6,3,1,.62) 100%);}

/* HEADER */
.site-header{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:16px 56px;background:linear-gradient(to bottom,rgba(10,5,2,.94) 60%,transparent);}
.brand{display:flex;align-items:center;gap:12px;}
.brand-n{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:300;font-style:italic;color:rgba(230,215,190,.82);letter-spacing:.06em;}
.hbtn{font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:.2em;color:rgba(220,200,160,.38);background:transparent;border:1px solid rgba(220,200,160,.12);border-radius:1px;padding:7px 14px;cursor:pointer;transition:all .25s;text-transform:uppercase;}
.hbtn:hover{color:rgba(220,200,160,.75);border-color:rgba(220,200,160,.28);}
.upload-lbl{font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;color:rgba(210,180,120,.75);background:rgba(180,140,60,.08);border:1px solid rgba(180,140,60,.22);border-radius:1px;padding:7px 18px;cursor:pointer;position:relative;overflow:hidden;transition:all .3s;}
.upload-lbl::before{content:'';position:absolute;inset:0;background:rgba(180,140,60,.1);transform:translateX(-101%);transition:transform .35s cubic-bezier(.22,1,.36,1);}
.upload-lbl:hover::before{transform:translateX(0);}
.upload-lbl:hover{color:rgba(235,215,180,.9);}
.upload-lbl span{position:relative;z-index:1;}
.upload-lbl input{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0;}

/* SCROLLABLE MUSEUM */
.museum{position:relative;z-index:15;padding:calc(22vh + 55px) 0 calc(26vh + 55px);min-height:100vh;}

/* Room placard */
.placard{text-align:center;padding:30px 60px 60px;animation:fu .9s ease .1s both;}
.pl-rule{display:flex;align-items:center;gap:18px;justify-content:center;margin-bottom:14px;}
.pl-line{width:70px;height:1px;background:linear-gradient(90deg,transparent,rgba(160,130,70,.25),transparent);}
.pl-orn{font-size:13px;color:rgba(180,140,60,.4);}
.pl-title{font-family:'Cormorant Garamond',serif;font-size:clamp(26px,5vw,48px);font-weight:300;font-style:italic;color:rgba(225,205,170,.85);line-height:1.1;text-shadow:0 2px 16px rgba(0,0,0,.3);}
.pl-title em{color:rgba(200,165,90,.85);}
.pl-sub{font-family:'Dancing Script',cursive;font-size:17px;color:rgba(170,145,100,.45);margin-top:8px;}

/* Museum room sections */
.mroom{padding:0 0 80px;}
.rlabel{display:flex;align-items:center;gap:16px;padding:0 60px 36px;animation:fu .8s ease both;}
.rl-num{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:rgba(160,130,70,.35);padding:3px 12px;border:1px solid rgba(160,130,70,.15);border-radius:1px;white-space:nowrap;}
.rl-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(140,110,55,.15),transparent);}

/* Frame wall row */
.fwall{display:flex;align-items:flex-end;justify-content:center;gap:clamp(24px,5vw,62px);flex-wrap:wrap;padding:50px 60px 0;}

/* Individual painting frame */
.pf{position:relative;cursor:pointer;--tilt:0deg;animation:fh .9s cubic-bezier(.22,1,.36,1) var(--fd,.3s) both;transform-origin:top center;}
@keyframes fh{from{opacity:0;transform:rotate(var(--tilt)) translateY(-18px);}to{opacity:1;transform:rotate(var(--tilt)) translateY(0);}}
.pf:hover{z-index:30;}
.pf:hover .pf-outer{transform:rotate(0deg) translateY(-16px) scale(1.04);box-shadow:0 26px 55px rgba(0,0,0,.35),0 0 40px rgba(200,160,70,.1);}
.pf-outer{transform:rotate(var(--tilt));transition:transform .45s cubic-bezier(.22,1,.36,1),box-shadow .45s;}
.pf-nail{position:absolute;top:-44px;left:50%;transform:translateX(-50%);width:8px;height:8px;border-radius:50%;background:radial-gradient(circle at 35% 32%,#f0d870,#b08030 55%,#604015);box-shadow:0 0 5px rgba(200,160,60,.35),0 1px 4px rgba(0,0,0,.8);z-index:2;}
.pf-wire{position:absolute;top:-40px;left:50%;transform:translateX(-50%);width:70px;height:40px;z-index:1;pointer-events:none;}
.pf-frame{background:linear-gradient(148deg,#d0a838 0%,#886018 16%,#c8a040 32%,#6c4c14 48%,#b89038 62%,#785018 76%,#c0a040 100%);border-radius:2px;padding:10px;position:relative;box-shadow:3px 3px 0 rgba(0,0,0,.22),6px 6px 0 rgba(0,0,0,.1),0 8px 28px rgba(0,0,0,.35),0 16px 40px rgba(0,0,0,.18),inset 0 1px 0 rgba(255,220,100,.18);}
.pf-frame::before{content:'';position:absolute;inset:0;border-radius:2px;z-index:2;pointer-events:none;background:linear-gradient(135deg,rgba(255,215,100,.18) 0%,transparent 42%,rgba(0,0,0,.16) 100%);}
.pf-mat{margin:0;background:#ede4cc;position:relative;overflow:hidden;}
.pf-img{display:block;width:100%;height:100%;object-fit:cover;}
.pf-demo{width:100%;height:100%;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.pf-glow{position:absolute;top:-70px;left:50%;transform:translateX(-50%);width:250%;height:220px;background:radial-gradient(ellipse,rgba(255,210,100,.09) 0%,transparent 62%);opacity:0;pointer-events:none;z-index:-1;transition:opacity .4s;}
.pf:hover .pf-glow{opacity:1;}
.pf-plate{display:table;margin:9px auto 0;background:linear-gradient(135deg,#9a7020,#7a5618);padding:4px 14px 5px;border-radius:1px;box-shadow:2px 2px 8px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,215,90,.1);max-width:calc(100% - 18px);}
.pf-pt{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;color:rgba(230,195,105,.9);letter-spacing:.06em;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:210px;}
.pf-ps{font-size:9px;color:rgba(200,165,90,.42);letter-spacing:.07em;display:block;}

/* Sizes */
.fsm  .pf-mat{width:148px;height:128px;}
.fmd  .pf-mat{width:198px;height:162px;}
.flg  .pf-mat{width:255px;height:206px;}
.fxl  .pf-mat{width:315px;height:250px;}
.ftall .pf-mat{width:152px;height:216px;}
.fwide .pf-mat{width:285px;height:160px;}

/* Room arch divider */
.rarch{display:flex;align-items:center;gap:22px;padding:65px 60px 0;animation:fu .7s ease both;}
.ra-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(140,110,55,.2),transparent);}
.ra-orn{font-size:15px;color:rgba(160,130,70,.25);}
.ra-lbl{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.28em;text-transform:uppercase;color:rgba(140,110,55,.28);white-space:nowrap;}

/* Empty */
.empty-wall{text-align:center;padding:80px 60px;animation:fu .7s ease .3s both;}
.ef-outline{width:210px;height:170px;margin:0 auto 26px;border:2px solid rgba(140,110,55,.15);border-radius:2px;background:rgba(140,110,55,.03);box-shadow:4px 4px 0 rgba(0,0,0,.07),8px 8px 0 rgba(0,0,0,.04);display:flex;align-items:center;justify-content:center;font-size:52px;opacity:.25;position:relative;}
.ef-outline::before{content:'';position:absolute;inset:12px;border:1px solid rgba(140,110,55,.1);border-radius:1px;}
.e-txt{font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;color:rgba(170,145,100,.42);line-height:1.75;}

/* Lightbox */
.lb{position:fixed;inset:0;z-index:100;background:rgba(8,4,2,.97);display:none;align-items:center;justify-content:center;flex-direction:column;gap:20px;padding:20px;}
.lb.open{display:flex;}
.lb-f{background:linear-gradient(145deg,#d4a840,#8a5e1e,#c8a050,#6e4e18);padding:14px;border-radius:2px;box-shadow:0 30px 90px rgba(0,0,0,.85);max-width:90vw;max-height:82vh;animation:lbIn .4s cubic-bezier(.22,1,.36,1) both;position:relative;}
.lb-f::before{content:'';position:absolute;inset:0;border-radius:2px;z-index:2;pointer-events:none;background:linear-gradient(135deg,rgba(255,215,100,.16) 0%,transparent 40%,rgba(0,0,0,.16) 100%);}
@keyframes lbIn{from{opacity:0;transform:scale(.88);}to{opacity:1;transform:scale(1);}}
.lb-mat{background:#ede4cc;padding:8px;}
.lb-img{display:block;max-width:min(82vw,860px);max-height:70vh;object-fit:contain;}
.lb-vid{display:block;max-width:min(82vw,860px);max-height:70vh;}
.lb-plate{background:linear-gradient(135deg,#9a7020,#7a5618);padding:7px 22px 8px;text-align:center;}
.lb-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:rgba(230,195,105,.9);letter-spacing:.06em;display:block;}
.lb-date{font-size:10px;color:rgba(200,165,90,.4);letter-spacing:.07em;display:block;}
.lb-close{position:fixed;top:22px;right:26px;background:rgba(14,7,3,.85);border:1px solid rgba(180,140,60,.15);border-radius:50%;width:42px;height:42px;font-size:22px;color:rgba(180,155,110,.5);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.lb-close:hover{color:rgba(220,185,140,.8);border-color:rgba(180,140,60,.3);}
.lb-del{font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:.2em;text-transform:uppercase;color:rgba(180,150,110,.35);background:transparent;border:1px solid rgba(160,130,70,.15);border-radius:1px;padding:8px 20px;cursor:pointer;transition:all .25s;}
.lb-del:hover{color:rgba(180,100,100,.65);border-color:rgba(160,80,80,.3);}

/* Drag hint */
.dh{position:fixed;inset:0;z-index:90;background:rgba(8,4,2,.92);border:2px dashed rgba(180,140,60,.2);display:none;align-items:center;justify-content:center;flex-direction:column;gap:18px;}
.dh.show{display:flex;}
.dh-i{font-size:54px;opacity:.4;}
.dh-t{font-family:'Cormorant Garamond',serif;font-size:26px;font-style:italic;color:rgba(210,180,130,.7);}
.dh-s{font-family:'Dancing Script',cursive;font-size:18px;color:rgba(170,145,100,.4);}

.toast{position:fixed;bottom:calc(26vh + 18px);left:50%;transform:translateX(-50%) translateY(12px);background:rgba(238,228,205,.97);border:1px solid rgba(120,90,40,.2);border-radius:1px;padding:10px 28px;font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;color:#3a2810;opacity:0;transition:all .3s;z-index:200;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.2);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@keyframes fu{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
@media(max-width:640px){.site-header{padding:14px 20px;}.fwall{padding:40px 20px 0;gap:18px;}.rlabel,.rarch,.empty-wall,.placard{padding-left:20px;padding-right:20px;}.flg .pf-mat,.fxl .pf-mat{width:185px;height:148px;}.fwide .pf-mat{width:195px;height:138px;}}
</style>
</head>
<body>

<!-- ROOM -->
<div class="room-wall" id="rwall"></div>
<div class="room-ceiling" id="rceil"></div>
<div class="track-rail"></div>
<div class="baseboard"></div>
<div class="room-floor" id="rfloor"><div class="fp"></div><div class="fs2"></div><div class="fao"></div></div>
<div class="spots-fixed">
  <div class="sp-h" style="left:12%"></div><div class="sp-h" style="left:26%"></div><div class="sp-h" style="left:42%"></div>
  <div class="sp-h" style="left:58%"></div><div class="sp-h" style="left:74%"></div><div class="sp-h" style="left:88%"></div>
  <div class="sp-c" style="left:12%;--spd:5.2s"></div><div class="sp-c" style="left:26%;--spd:6.8s"></div>
  <div class="sp-c" style="left:42%;--spd:4.5s"></div><div class="sp-c" style="left:58%;--spd:7.1s"></div>
  <div class="sp-c" style="left:74%;--spd:5.6s"></div><div class="sp-c" style="left:88%;--spd:4.9s"></div>
  <div class="sp-p" style="left:12%;--spd:5.2s"></div><div class="sp-p" style="left:26%;--spd:6.8s"></div>
  <div class="sp-p" style="left:42%;--spd:4.5s"></div><div class="sp-p" style="left:58%;--spd:7.1s"></div>
  <div class="sp-p" style="left:74%;--spd:5.6s"></div><div class="sp-p" style="left:88%;--spd:4.9s"></div>
</div>
<canvas class="dust" id="dust"></canvas>
<div class="vignette"></div>

<!-- HEADER -->
<header class="site-header">
  <div class="brand"><span style="font-size:16px">🌹</span><span class="brand-n">Our Gallery</span></div>
  <div style="display:flex;gap:10px;align-items:center">
    <label class="upload-lbl"><input type="file" id="fi" multiple accept="image/*,video/*" onchange="handleFiles(this.files)"><span>+ Hang a memory</span></label>
    <button class="hbtn" onclick="window.location.href='home.html'">← Home</button>
  </div>
</header>

<!-- MUSEUM -->
<div class="museum" id="museum">
  <div class="placard">
    <div class="pl-rule"><div class="pl-line"></div><span class="pl-orn">✦</span><div class="pl-line"></div></div>
    <div class="pl-title">The Gallery of <em>Our Story</em></div>
    <div class="pl-sub">every frame holds a memory that lasts forever</div>
    <div class="pl-rule" style="margin-top:12px"><div class="pl-line"></div><span class="pl-orn">✦</span><div class="pl-line"></div></div>
  </div>
  <div id="groot"></div>
</div>

<!-- Drag hint -->
<div class="dh" id="dh"><div class="dh-i">🖼️</div><div class="dh-t">Drop your memory here</div><div class="dh-s">it will be framed with love ♥</div></div>

<!-- Lightbox -->
<div class="lb" id="lb">
  <button class="lb-close" onclick="closeLB()">×</button>
  <div class="lb-f"><div class="lb-mat"><img class="lb-img" id="lbi" src="" alt="" style="display:none"><video class="lb-vid" id="lbv" controls src="" style="display:none"></video></div><div class="lb-plate"><span class="lb-title" id="lbt">—</span><span class="lb-date" id="lbd">—</span></div></div>
  <button class="lb-del" onclick="delFromLB()">Remove from gallery</button>
</div>
<div class="toast" id="toast"></div>

<script>
const user=localStorage.getItem('user');
if(!user)window.location.href='index.html';

/* DEMO SVG PAINTINGS */
const DEMOS=[

  {id:'d1',name:'Golden Days',sub:'demo · add your photo',svg:`<svg viewBox="0 0 300 240" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%"><defs><linearGradient id="lg1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8bb5d0"/><stop offset="100%" stop-color="#d4a870"/></linearGradient></defs><rect width="300" height="155" fill="url(#lg1)"/><rect y="155" width="300" height="85" fill="#7a5828"/><ellipse cx="80" cy="80" rx="60" ry="50" fill="rgba(255,255,255,.11)"/><rect y="130" width="300" height="110" fill="#9a7840" opacity=".65"/><path d="M0 150 Q75 130 150 155 Q225 175 300 145" fill="#7a5820"/><circle cx="240" cy="48" r="22" fill="rgba(255,230,150,.32)"/><text x="150" y="228" text-anchor="middle" font-family="Georgia,serif" font-style="italic" font-size="11" fill="rgba(255,240,200,.45)">golden days</text></svg>`},

/* STORAGE */
function getItems(){return JSON.parse(localStorage.getItem('gallery_items'))||[];}
function saveItems(i){localStorage.setItem('gallery_items',JSON.stringify(i));}

/* PARALLAX */
const rceil=document.getElementById('rceil'),rfloor=document.getElementById('rfloor'),rwall=document.getElementById('rwall');
let tk=false;
window.addEventListener('scroll',()=>{if(!tk){requestAnimationFrame(()=>{const sy=window.scrollY;rceil.style.transform='translateY('+(sy*.05)+'px)';rfloor.style.transform='translateY('+(-sy*.12)+'px)';rwall.style.transform='translateY('+(sy*.02)+'px)';tk=false;});tk=true;}},{passive:true});

/* DRAG & DROP */
let dc=0;
document.addEventListener('dragenter',e=>{e.preventDefault();dc++;document.getElementById('dh').classList.add('show');});
document.addEventListener('dragleave',()=>{dc--;if(dc<=0){dc=0;document.getElementById('dh').classList.remove('show');}});
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{e.preventDefault();dc=0;document.getElementById('dh').classList.remove('show');handleFiles(e.dataTransfer.files);});

function handleFiles(files){
  const arr=Array.from(files);if(!arr.length)return;let loaded=0;
  arr.forEach(file=>{
    const r=new FileReader();
    r.onload=e=>{
      const items=getItems();
      items.push({id:Date.now()+'_'+Math.random().toString(36).slice(2),name:file.name.replace(/\.[^.]+$/,''),type:file.type.startsWith('video')?'video':'image',data:e.target.result,date:new Date().toLocaleDateString([],{month:'long',day:'numeric',year:'numeric'}),uploader:user,demo:false});
      saveItems(items);loaded++;
      if(loaded===arr.length){render();showToast(loaded===1?'Memory framed ♥':loaded+' memories framed ♥');}
    };r.readAsDataURL(file);
  });
}

const SIZES=['fmd','flg','fxl','fsm','ftall','fwide','flg','fmd'];
const TILTS=[-1.8,1.5,-1.1,2.4,-2.6,0.8,1.9,-1.4,0.6,-2,1.2,-0.7];
function wireHTML(){return `<svg class="pf-wire" viewBox="0 0 70 40" fill="none"><path d="M35 2 Q14 18 4 38" stroke="rgba(140,105,40,.28)" stroke-width=".8"/><path d="M35 2 Q56 18 66 38" stroke="rgba(140,105,40,.28)" stroke-width=".8"/></svg>`;}

function render(){
  const stored=getItems();
  const demosNeeded=Math.max(0,6-stored.length);
  const allItems=[...stored,...DEMOS.slice(0,demosNeeded)];
  const root=document.getElementById('groot');
  if(allItems.length===0){root.innerHTML='<div class="mroom"><div class="fwall"><div class="empty-wall"><div class="ef-outline">🖼️</div><div class="e-txt">This room waits for your memories.<br><small style="font-size:14px;opacity:.6">Click "Hang a memory" to add your first photo</small></div></div></div></div>';return;}
  const rooms=[];let i=0,pat=[3,2,3,2,4],pi=0;
  while(i<allItems.length){const sz=Math.min(pat[pi%pat.length],allItems.length-i);rooms.push(allItems.slice(i,i+sz));i+=sz;pi++;}
  let gi=0;const BASE=0.28;
  root.innerHTML=rooms.map((room,ri)=>{
    const fh=room.map(item=>{
      const idx=gi++;const size=SIZES[idx%SIZES.length];const tilt=TILTS[idx%TILTS.length];const fd=(BASE+idx*.14).toFixed(2)+'s';
      let media='';
      if(item.demo||item.svg){media=`<div class="pf-demo">${item.svg}</div>`;}
      else if(item.type==='video'){media=`<video class="pf-img" src="${item.data}" muted preload="metadata"></video><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:28px;color:rgba(255,255,255,.65);z-index:3">▶</div>`;}
      else{media=`<img class="pf-img" src="${item.data}" alt="${esc(item.name)}" loading="lazy">`;}
      return `<div class="pf ${size}" style="--tilt:${tilt}deg;--fd:${fd}" onclick="openLB('${item.id}')"><div class="pf-nail"></div>${wireHTML()}<div class="pf-glow"></div><div class="pf-outer"><div class="pf-frame"><div class="pf-mat">${media}</div></div><div class="pf-plate"><span class="pf-pt">${esc(item.name)}</span><span class="pf-ps">${item.demo?item.sub:item.date}</span></div></div></div>`;
    }).join('');
    const arch=ri<rooms.length-1?`<div class="rarch" style="animation-delay:${(BASE+gi*.14+.2).toFixed(2)}s"><div class="ra-line"></div><span class="ra-orn">❧</span><span class="ra-lbl">Gallery continues</span><div class="ra-line"></div></div>`:'';
    return `<div class="mroom"><div class="rlabel" style="animation-delay:${(BASE+gi*.1).toFixed(2)}s"><span class="rl-num">Room ${ri+1} of ${rooms.length}</span><div class="rl-line"></div></div><div class="fwall">${fh}</div></div>${arch}`;
  }).join('');
}

/* LIGHTBOX */
let lbId=null;
function openLB(id){
  const allItems=[...getItems(),...DEMOS];
  const item=allItems.find(i=>i.id===id);if(!item)return;lbId=id;
  const img=document.getElementById('lbi'),vid=document.getElementById('lbv');
  const exsvg=document.getElementById('lb-svg');if(exsvg)exsvg.remove();
  if(item.demo||item.svg){
    img.style.display='none';vid.style.display='none';
    const w=document.createElement('div');w.id='lb-svg';w.style.cssText='width:min(82vw,500px)';w.innerHTML=item.svg;
    document.querySelector('.lb-mat').appendChild(w);
  }else if(item.type==='video'){img.style.display='none';vid.style.display='block';vid.src=item.data;}
  else{vid.style.display='none';img.style.display='block';img.src=item.data;}
  document.getElementById('lbt').textContent=item.name;
  document.getElementById('lbd').textContent=item.demo?'Demo placeholder · upload your own photo':item.date+' · '+item.uploader;
  document.getElementById('lb').classList.add('open');
}
function closeLB(){document.getElementById('lb').classList.remove('open');const v=document.getElementById('lbv');v.pause();v.src='';lbId=null;}
function delFromLB(){if(!lbId||lbId.startsWith('d'))return;if(!confirm('Remove this memory from the gallery?'))return;saveItems(getItems().filter(i=>i.id!==lbId));closeLB();render();showToast('Removed from the gallery');}
document.getElementById('lb').addEventListener('click',e=>{if(e.target===document.getElementById('lb'))closeLB();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLB();});

/* DUST */
(function(){const c=document.getElementById('dust'),ctx=c.getContext('2d');let W,H;function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}resize();window.addEventListener('resize',resize);const spotXs=[.12,.26,.42,.58,.74,.88];const motes=[];for(let i=0;i<90;i++)motes.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,r:Math.random()*1.5+.22,vx:(Math.random()-.5)*.2,vy:-(Math.random()*.22+.04),a:Math.random()*.13+.02,phase:Math.random()*Math.PI*2,freq:Math.random()*.006+.002});let t=0;function draw(){ctx.clearRect(0,0,W,H);t+=.009;for(const m of motes){m.x+=m.vx+Math.sin(t*m.freq+m.phase)*.3;m.y+=m.vy;if(m.y<-5){m.y=H+5;m.x=Math.random()*W;}if(m.x<0)m.x=W;if(m.x>W)m.x=0;let alpha=m.a;if(m.y>H*.22&&m.y<H*.74){for(const sx of spotXs){const cx=sx*W,coneW=88,dx=Math.abs(m.x-cx);if(dx<coneW){const frac=1-dx/coneW,yfrac=Math.max(0,1-(m.y-H*.22)/(H*.52)*.7);alpha=Math.min(.75,alpha+frac*yfrac*.36);}}}ctx.beginPath();ctx.arc(m.x,m.y,m.r,0,Math.PI*2);ctx.fillStyle='rgba(240,220,155,'+alpha+')';ctx.fill();}requestAnimationFrame(draw);}draw();})();

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
render();
</script>
