<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Gallery · Our World</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Lato:wght@300;400;700&family=Dancing+Script:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --wall:       #1a0c08;
  --wall2:      #221008;
  --wall3:      #2a1208;
  --floor:      #0e0604;
  --moulding:   #3d1e0e;
  --gold:       #c8a050;
  --gold2:      #e8c870;
  --gold-dim:   #7a5828;
  --rose:       #c97b84;
  --blush:      #e8b4b8;
  --cream:      #f5ede4;
  --text:       #f0e4dc;
  --muted:      #8a6a68;
  --border:     rgba(200,160,80,0.18);
  --light-warm: rgba(255,200,100,0.06);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Lato', sans-serif;
  background: var(--floor);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ── */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 52px;
  background: linear-gradient(to bottom, rgba(14,6,4,0.96), rgba(14,6,4,0));
  backdrop-filter: blur(4px);
}
.brand { display: flex; align-items: center; gap: 12px; }
.brand-heart { font-size: 18px; animation: heartbeat 2.8s ease-in-out infinite; filter: drop-shadow(0 0 7px rgba(200,100,100,.4)); }
@keyframes heartbeat { 0%,100%{transform:scale(1);} 14%{transform:scale(1.18);} 28%{transform:scale(1);} 42%{transform:scale(1.1);} 56%{transform:scale(1);} }
.brand-name { font-family: 'Dancing Script', cursive; font-size: 20px; color: var(--blush); opacity: .85; }
.header-right { display: flex; align-items: center; gap: 12px; }
.upload-pill {
  display: flex; align-items: center; gap: 8px;
  font-family: 'Playfair Display', serif; font-size: 13px; font-style: italic;
  color: var(--gold2); background: rgba(200,160,80,0.08);
  border: 1px solid rgba(200,160,80,0.25); border-radius: 2px;
  padding: 8px 18px; cursor: pointer; position: relative;
  transition: all .3s; overflow: hidden;
}
.upload-pill::before { content: ''; position: absolute; inset: 0; background: rgba(200,160,80,.1); transform: translateX(-101%); transition: transform .35s cubic-bezier(.22,1,.36,1); }
.upload-pill:hover::before { transform: translateX(0); }
.upload-pill:hover { color: var(--cream); }
.upload-pill span { position: relative; z-index: 1; }
.upload-pill input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.back-btn { font-size: 11px; letter-spacing: .12em; color: var(--muted); background: transparent; border: 1px solid rgba(138,106,104,.3); border-radius: 2px; padding: 7px 16px; cursor: pointer; transition: all .25s; text-transform: uppercase; font-family: 'Lato', sans-serif; }
.back-btn:hover { color: var(--blush); border-color: var(--border); }

/* ── ROOM SHELL ── */
.room {
  min-height: 100vh;
  padding-top: 80px;
  position: relative;
  background:
    /* Ceiling gradient */
    linear-gradient(to bottom,
      #0d0604 0px,
      #180c08 80px,
      var(--wall2) 180px,
      var(--wall2) calc(100% - 90px),
      var(--wall3) calc(100% - 90px),
      var(--moulding) calc(100% - 60px),
      #0a0402 calc(100% - 60px),
      #060302 100%
    );
}

/* Wall texture overlay */
.room::before {
  content: '';
  position: fixed; inset: 0;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,.04) 3px, rgba(0,0,0,.04) 4px),
    repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(0,0,0,.03) 3px, rgba(0,0,0,.03) 4px);
  pointer-events: none; z-index: 0;
}

/* Warm ceiling spotlight */
.room::after {
  content: '';
  position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
  width: 900px; height: 600px;
  background: radial-gradient(ellipse, rgba(255,160,60,.06) 0%, transparent 65%);
  pointer-events: none; z-index: 0;
  animation: ceilLight 8s ease-in-out infinite alternate;
}
@keyframes ceilLight { 0%{opacity:.7;} 100%{opacity:1;} }

/* ── WAINSCOTING / MOULDING ── */
.wall-top-rail {
  position: fixed; top: 72px; left: 0; right: 0; height: 6px;
  background: linear-gradient(to bottom, var(--gold-dim), rgba(100,60,20,.4));
  z-index: 2; pointer-events: none;
}
.wall-top-rail::before {
  content: ''; position: absolute; top: 6px; left: 0; right: 0; height: 2px;
  background: rgba(200,160,80,.12);
}
.floor-rail {
  position: fixed; bottom: 60px; left: 0; right: 0; height: 4px;
  background: linear-gradient(to top, var(--gold-dim), rgba(100,60,20,.3));
  z-index: 2; pointer-events: none;
}
.baseboard {
  position: fixed; bottom: 0; left: 0; right: 0; height: 60px;
  background: linear-gradient(to top, #040202, #0a0503, var(--moulding));
  z-index: 2; pointer-events: none;
  box-shadow: 0 -6px 30px rgba(0,0,0,.6);
}
.baseboard::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  opacity: .5;
}

/* ── PICTURE RAIL (hanging wire system) ── */
.picture-rail {
  position: fixed; top: 78px; left: 0; right: 0; height: 10px;
  background: linear-gradient(to bottom, rgba(200,160,80,.3), rgba(120,80,30,.15));
  z-index: 3; pointer-events: none;
  box-shadow: 0 2px 8px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,220,120,.15);
}

/* ── SPOTLIGHTS ── */
.spotlight {
  position: fixed; top: 0;
  width: 180px; height: 500px;
  background: linear-gradient(to bottom, rgba(255,180,80,.05) 0%, rgba(255,160,60,.02) 40%, transparent 100%);
  clip-path: polygon(30% 0%, 70% 0%, 100% 100%, 0% 100%);
  pointer-events: none; z-index: 1;
  animation: spotFlicker 6s ease-in-out infinite alternate;
}
@keyframes spotFlicker { 0%{opacity:.6;} 50%{opacity:.9;} 100%{opacity:.7;} }

/* ── ROOM CONTENT ── */
.gallery-content {
  position: relative; z-index: 5;
  padding: 40px 60px 140px;
  min-height: calc(100vh - 80px);
}

/* ── ENTRANCE PLACARD ── */
.room-placard {
  text-align: center; margin-bottom: 60px;
  animation: fadeUp .8s ease .1s both;
}
.placard-line {
  display: flex; align-items: center; gap: 20px; justify-content: center; margin-bottom: 14px;
}
.placard-ornament { font-size: 16px; color: var(--gold); opacity: .5; }
.placard-divider { width: 80px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold-dim), transparent); }
.room-name {
  font-family: 'Playfair Display', serif; font-size: clamp(28px,5vw,52px);
  font-style: italic; font-weight: 400;
  color: var(--cream); letter-spacing: .02em; line-height: 1.1;
  text-shadow: 0 0 40px rgba(255,160,60,.12);
}
.room-name em { color: var(--gold2); }
.room-subtitle {
  font-family: 'Dancing Script', cursive; font-size: 17px;
  color: var(--muted); letter-spacing: .06em; margin-top: 6px;
}

/* ── EMPTY STATE ── */
.empty-room {
  text-align: center; padding: 80px 0;
  animation: fadeUp .6s ease .3s both;
}
.empty-frame {
  display: inline-block;
  width: 220px; height: 180px;
  border: 2px solid rgba(200,160,80,.2);
  border-radius: 2px; margin-bottom: 28px;
  background: rgba(200,160,80,.03);
  box-shadow: 4px 4px 0 rgba(0,0,0,.3), 8px 8px 0 rgba(0,0,0,.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 48px; opacity: .3;
  position: relative; overflow: hidden;
}
.empty-frame::before {
  content: ''; position: absolute; inset: 8px;
  border: 1px solid rgba(200,160,80,.15); border-radius: 1px;
}
.empty-text { font-family: 'Dancing Script', cursive; font-size: 20px; color: var(--muted); line-height: 1.7; }

/* ── GALLERY WALL: masonry-like row layout ── */
.gallery-wall { display: flex; flex-direction: column; gap: 80px; }

/* Each row of frames */
.frame-row {
  display: flex; align-items: flex-end; justify-content: center;
  gap: clamp(32px, 5vw, 72px); flex-wrap: wrap;
  padding: 0 20px;
}

/* ── INDIVIDUAL FRAME ── */
.frame-wrap {
  position: relative; cursor: pointer;
  animation: frameHang .7s cubic-bezier(.22,1,.36,1) both;
  transform-origin: top center;
}
@keyframes frameHang {
  from { opacity: 0; transform: rotate(var(--tilt)) translateY(-30px) scale(.95); }
  to   { opacity: 1; transform: rotate(var(--tilt)) translateY(0) scale(1); }
}

/* Hanging wire */
.hang-wire {
  position: absolute; top: -44px; left: 50%; transform: translateX(-50%);
  width: 1px; height: 44px;
  background: linear-gradient(to bottom, rgba(200,160,80,.5), rgba(200,160,80,.2));
}
.hang-wire::before, .hang-wire::after {
  content: ''; position: absolute; top: 0;
  width: 30px; height: 1px;
  background: rgba(200,160,80,.25);
}
.hang-wire::before { right: 0; transform: rotate(-20deg); transform-origin: right; }
.hang-wire::after  { left: 0;  transform: rotate(20deg);  transform-origin: left; }

/* Nail */
.nail {
  position: absolute; top: -46px; left: 50%; transform: translateX(-50%);
  width: 5px; height: 5px; border-radius: 50%;
  background: radial-gradient(circle, var(--gold2), var(--gold-dim));
  box-shadow: 0 0 4px rgba(200,160,80,.4), 0 1px 2px rgba(0,0,0,.6);
}

/* ── FRAME OUTER (gold frame) ── */
.frame {
  position: relative;
  background: linear-gradient(135deg, #b88840, #8a5e20, #c8a050, #7a4e18, #b08030);
  border-radius: 2px;
  transition: transform .4s cubic-bezier(.22,1,.36,1), box-shadow .4s;
}
.frame-wrap:hover .frame {
  box-shadow:
    0 20px 60px rgba(0,0,0,.6),
    0 0 30px rgba(200,160,80,.15),
    inset 0 0 0 0 transparent !important;
}
.frame-wrap:hover {
  z-index: 20;
  transform: rotate(0deg) translateY(-12px) scale(1.04) !important;
}

/* Frame inner shadow/bevel */
.frame::before {
  content: '';
  position: absolute; inset: 0; border-radius: 2px;
  background: linear-gradient(135deg, rgba(255,220,120,.25) 0%, transparent 40%, rgba(0,0,0,.3) 100%);
  pointer-events: none; z-index: 2;
}

/* Frame inner mount (mat board) */
.frame-mat {
  margin: 10px; background: #f0e8d8; border-radius: 1px;
  position: relative; overflow: hidden;
}
.frame-mat::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.08) 0%, transparent 50%, rgba(0,0,0,.06) 100%);
  z-index: 2; pointer-events: none;
}

/* The actual image/video */
.frame-media {
  display: block; width: 100%; height: 100%;
  object-fit: cover; object-position: center;
}
video.frame-media { background: #000; }

/* Play icon over video */
.play-badge {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,.2); z-index: 3;
  font-size: 32px; color: rgba(255,255,255,.7);
  transition: background .3s;
}
.frame-wrap:hover .play-badge { background: rgba(0,0,0,.3); }

/* Spotlight glow on hover */
.frame-glow {
  position: absolute; inset: -20px; border-radius: 4px;
  background: radial-gradient(ellipse at top, rgba(255,180,80,.1) 0%, transparent 65%);
  opacity: 0; pointer-events: none; z-index: -1;
  transition: opacity .4s;
}
.frame-wrap:hover .frame-glow { opacity: 1; }

/* ── NAMEPLATE ── */
.nameplate {
  margin: 10px auto 0;
  display: table;
  background: linear-gradient(135deg, #a07830, #7a5820);
  border-radius: 1px;
  padding: 4px 14px 5px;
  box-shadow: 0 2px 6px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,220,100,.15);
  text-align: center;
  max-width: calc(100% - 20px);
}
.nameplate-title {
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: 11px; color: var(--gold2); letter-spacing: .06em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px;
  line-height: 1.4;
}
.nameplate-date { font-size: 9px; color: rgba(232,200,112,.5); letter-spacing: .08em; }

/* ── FRAME SIZE VARIANTS ── */
.frame-sm  .frame-mat { width: 150px; height: 130px; }
.frame-md  .frame-mat { width: 200px; height: 165px; }
.frame-lg  .frame-mat { width: 260px; height: 210px; }
.frame-xl  .frame-mat { width: 320px; height: 255px; }
.frame-tall .frame-mat { width: 160px; height: 220px; }
.frame-wide .frame-mat { width: 280px; height: 160px; }

/* Frame thickness varies by size */
.frame-sm  .frame { padding: 0; } /* mat handles it */
.frame-xl  .frame { background: linear-gradient(135deg, #c8a050, #8a5e20, #d8b060, #7a4e18, #c09040); }

/* ── SECTION DIVIDER IN WALL ── */
.wall-divider {
  display: flex; align-items: center; gap: 20px;
  margin: 0 auto 40px; max-width: 500px;
}
.wall-divider-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(200,160,80,.2), transparent); }
.wall-divider-ornament { font-size: 14px; color: var(--gold); opacity: .3; }

/* ── LIGHTBOX ── */
.lightbox {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(4,2,2,.97);
  display: none; align-items: center; justify-content: center; flex-direction: column;
  gap: 20px; padding: 20px;
}
.lightbox.open { display: flex; }
.lb-frame {
  position: relative;
  background: linear-gradient(135deg, #c8a050, #8a5e20, #d8b060, #7a4e18);
  padding: 12px; border-radius: 2px;
  box-shadow: 0 30px 80px rgba(0,0,0,.8), 0 0 60px rgba(200,160,80,.08);
  max-width: 90vw; max-height: 80vh;
  animation: lbIn .4s cubic-bezier(.22,1,.36,1) both;
}
@keyframes lbIn { from{opacity:0;transform:scale(.9);}to{opacity:1;transform:scale(1);} }
.lb-frame::before {
  content: ''; position: absolute; inset: 0; z-index: 2; pointer-events: none; border-radius: 2px;
  background: linear-gradient(135deg, rgba(255,220,120,.2) 0%, transparent 40%, rgba(0,0,0,.2) 100%);
}
.lb-mat { background: #f0e8d8; padding: 8px; }
.lb-img { display: block; max-width: min(80vw,800px); max-height: 70vh; object-fit: contain; }
.lb-vid { display: block; max-width: min(80vw,800px); max-height: 70vh; }
.lb-nameplate {
  background: linear-gradient(135deg, #a07830, #7a5820);
  padding: 6px 20px 7px; text-align: center; margin-top: -1px;
}
.lb-title { font-family: 'Playfair Display', serif; font-style: italic; font-size: 14px; color: var(--gold2); letter-spacing: .06em; }
.lb-date  { font-size: 10px; color: rgba(232,200,112,.5); letter-spacing: .08em; }
.lb-close {
  position: fixed; top: 24px; right: 28px;
  background: rgba(20,8,6,.8); border: 1px solid rgba(200,160,80,.2);
  border-radius: 50%; width: 40px; height: 40px;
  font-size: 22px; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .2s; line-height: 1;
}
.lb-close:hover { color: var(--blush); border-color: var(--border); }
.lb-del {
  font-family: 'Lato', sans-serif; font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
  color: var(--muted); background: transparent; border: 1px solid rgba(138,106,104,.25);
  border-radius: 2px; padding: 7px 18px; cursor: pointer; transition: all .25s;
}
.lb-del:hover { color: #d47a7a; border-color: rgba(212,120,120,.35); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 80px; left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: rgba(14,6,4,.95); border: 1px solid rgba(200,160,80,.22);
  border-radius: 2px; padding: 10px 28px;
  font-family: 'Dancing Script', cursive; font-size: 15px; color: var(--gold2);
  opacity: 0; transition: all .3s ease; z-index: 600; pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── DRAG ZONE ── */
.room.drag-over::after { opacity: 0 !important; }
.drag-hint {
  position: fixed; inset: 0; z-index: 400;
  background: rgba(14,6,4,.92);
  display: none; align-items: center; justify-content: center; flex-direction: column; gap: 16px;
  border: 2px dashed rgba(200,160,80,.3);
}
.drag-hint.show { display: flex; }
.drag-hint-text { font-family: 'Playfair Display', serif; font-size: 28px; font-style: italic; color: var(--gold2); }
.drag-hint-sub { font-family: 'Dancing Script', cursive; font-size: 18px; color: var(--muted); }

@keyframes fadeUp { from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:none;} }

@media (max-width: 600px) {
  .header { padding: 16px 20px; }
  .gallery-content { padding: 30px 20px 120px; }
  .frame-row { gap: 24px; }
  .frame-lg .frame-mat, .frame-xl .frame-mat { width: 200px; height: 165px; }
  .frame-wide .frame-mat { width: 200px; height: 140px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="brand">
    <span class="brand-heart">🌹</span>
    <span class="brand-name">Our Gallery</span>
  </div>
  <div class="header-right">
    <label class="upload-pill">
      <input type="file" id="file-input" multiple accept="image/*,video/*" onchange="handleFiles(this.files)">
      <span>+ Hang a memory</span>
    </label>
    <button class="back-btn" onclick="window.location.href='home.html'">← Home</button>
  </div>
</header>

<!-- ROOM -->
<div class="room" id="room">
  <div class="wall-top-rail"></div>
  <div class="picture-rail"></div>
  <div class="floor-rail"></div>
  <div class="baseboard"></div>

  <!-- Spotlights -->
  <div class="spotlight" style="left:15%;animation-delay:0s;"></div>
  <div class="spotlight" style="left:38%;animation-delay:1.5s;"></div>
  <div class="spotlight" style="left:62%;animation-delay:3s;"></div>
  <div class="spotlight" style="left:82%;animation-delay:1s;"></div>

  <div class="gallery-content">

    <!-- Room placard -->
    <div class="room-placard">
      <div class="placard-line">
        <div class="placard-divider"></div>
        <span class="placard-ornament">✦</span>
        <div class="placard-divider"></div>
      </div>
      <div class="room-name">The Gallery of <em>Our Story</em></div>
      <div class="room-subtitle">every frame holds a memory that lasts forever</div>
      <div class="placard-line" style="margin-top:14px;">
        <div class="placard-divider"></div>
        <span class="placard-ornament">✦</span>
        <div class="placard-divider"></div>
      </div>
    </div>

    <!-- Gallery wall (frames rendered here) -->
    <div class="gallery-wall" id="gallery-wall"></div>

  </div>
</div>

<!-- Drag hint -->
<div class="drag-hint" id="drag-hint">
  <div style="font-size:52px">🖼️</div>
  <div class="drag-hint-text">Drop your memory here</div>
  <div class="drag-hint-sub">it will be framed with love ♥</div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="closeLB()">×</button>
  <div class="lb-frame" id="lb-frame">
    <div class="lb-mat">
      <img class="lb-img" id="lb-img" src="" alt="" style="display:none">
      <video class="lb-vid" id="lb-vid" controls src="" style="display:none"></video>
    </div>
    <div class="lb-nameplate">
      <div class="lb-title" id="lb-title">—</div>
      <div class="lb-date"  id="lb-date">—</div>
    </div>
  </div>
  <button class="lb-del" id="lb-del" onclick="delFromLB()">Remove from gallery</button>
</div>

<div class="toast" id="toast"></div>

<script>
const user = localStorage.getItem('user');
if (!user) window.location.href = 'index.html';

/* ── STORAGE ── */
function getItems() { return JSON.parse(localStorage.getItem('gallery_items')) || []; }
function saveItems(items) { localStorage.setItem('gallery_items', JSON.stringify(items)); }

/* ── DRAG & DROP ── */
const roomEl = document.getElementById('room');
const dragHint = document.getElementById('drag-hint');
let dragCounter = 0;

document.addEventListener('dragenter', e => { e.preventDefault(); dragCounter++; dragHint.classList.add('show'); });
document.addEventListener('dragleave', e => { dragCounter--; if (dragCounter <= 0) { dragCounter = 0; dragHint.classList.remove('show'); } });
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault(); dragCounter = 0; dragHint.classList.remove('show');
  handleFiles(e.dataTransfer.files);
});

/* ── HANDLE FILES ── */
function handleFiles(files) {
  const arr = Array.from(files);
  if (!arr.length) return;
  let loaded = 0;
  arr.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      const items = getItems();
      items.push({
        id: Date.now() + '_' + Math.random().toString(36).slice(2),
        name: file.name.replace(/\.[^.]+$/, ''),
        type: file.type.startsWith('video') ? 'video' : 'image',
        data: e.target.result,
        date: new Date().toLocaleDateString([], { month: 'long', day: 'numeric', year: 'numeric' }),
        uploader: user
      });
      saveItems(items);
      loaded++;
      if (loaded === arr.length) { render(); showToast(loaded === 1 ? 'Memory framed ♥' : `${loaded} memories framed ♥`); }
    };
    reader.readAsDataURL(file);
  });
}

/* ── FRAME SIZE PICKER ── */
const SIZES = ['frame-md', 'frame-lg', 'frame-xl', 'frame-sm', 'frame-tall', 'frame-wide', 'frame-lg', 'frame-md'];
const TILTS = [-2.5, 1.8, -1.2, 3, -3.5, 1, 2.2, -1.8, 0.8, -2, 1.5, -0.8];

function getSize(index) { return SIZES[index % SIZES.length]; }
function getTilt(index) { return TILTS[index % TILTS.length]; }

/* ── RENDER ── */
function render() {
  const items = getItems();
  const wall = document.getElementById('gallery-wall');

  if (items.length === 0) {
    wall.innerHTML = `
      <div class="frame-row">
        <div class="empty-room">
          <div class="empty-frame">🖼️</div>
          <div class="empty-text">
            This room is waiting for your memories.<br>
            <span style="font-size:14px;opacity:.6">Click "Hang a memory" or drag photos here</span>
          </div>
        </div>
      </div>`;
    return;
  }

  // Group into rows of 2-4 frames
  const rows = [];
  let i = 0;
  while (i < items.length) {
    const rowSize = (i === 0) ? 3 : (i % 7 === 0 ? 2 : (i % 5 === 0 ? 4 : 3));
    const clampedSize = Math.min(rowSize, items.length - i);
    rows.push(items.slice(i, i + clampedSize));
    i += clampedSize;
  }

  let globalIndex = 0;
  wall.innerHTML = rows.map((row, ri) => {
    const framesHtml = row.map((item) => {
      const idx = globalIndex++;
      const size = getSize(idx);
      const tilt = getTilt(idx);
      const delay = (idx * 0.12).toFixed(2);
      const isVideo = item.type === 'video';
      const mediaHtml = isVideo
        ? `<video class="frame-media" src="${item.data}" muted preload="metadata"></video><div class="play-badge">▶</div>`
        : `<img class="frame-media" src="${item.data}" alt="${esc(item.name)}" loading="lazy">`;
      return `
        <div class="frame-wrap ${size}" style="--tilt:${tilt}deg;animation-delay:${delay}s" onclick="openLB('${item.id}')">
          <div class="nail"></div>
          <div class="hang-wire"></div>
          <div class="frame-glow"></div>
          <div class="frame">
            <div class="frame-mat">${mediaHtml}</div>
          </div>
          <div class="nameplate">
            <div class="nameplate-title">${esc(item.name)}</div>
            <div class="nameplate-date">${item.date}</div>
          </div>
        </div>`;
    }).join('');

    const divider = ri < rows.length - 1
      ? `<div class="wall-divider"><div class="wall-divider-line"></div><span class="wall-divider-ornament">❧</span><div class="wall-divider-line"></div></div>`
      : '';

    return `<div class="frame-row">${framesHtml}</div>${divider}`;
  }).join('');
}

/* ── LIGHTBOX ── */
let lbCurrentId = null;

function openLB(id) {
  const items = getItems();
  const item = items.find(i => i.id === id);
  if (!item) return;
  lbCurrentId = id;

  const img = document.getElementById('lb-img');
  const vid = document.getElementById('lb-vid');
  if (item.type === 'video') {
    img.style.display = 'none'; vid.style.display = 'block'; vid.src = item.data;
  } else {
    vid.style.display = 'none'; img.style.display = 'block'; img.src = item.data;
  }
  document.getElementById('lb-title').textContent = item.name;
  document.getElementById('lb-date').textContent = item.date + ' · ' + item.uploader;
  document.getElementById('lightbox').classList.add('open');
}

function closeLB() {
  document.getElementById('lightbox').classList.remove('open');
  const vid = document.getElementById('lb-vid');
  vid.pause(); vid.src = '';
  lbCurrentId = null;
}

function delFromLB() {
  if (!lbCurrentId) return;
  if (!confirm('Remove this memory from the gallery?')) return;
  const items = getItems().filter(i => i.id !== lbCurrentId);
  saveItems(items);
  closeLB(); render();
  showToast('Removed from the gallery ♥');
}

document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLB();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLB(); });

/* ── HELPERS ── */
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

render();
</script>
