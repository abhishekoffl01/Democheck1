<style>
:root{--wall:#f2ede6;--navy:#1e2d4a;--navy2:#2d3f5e;--navy-light:#4a6080;--slate:#6a7d94;--cream:#f8f4ee;--text:#1e2d4a;--text-soft:#6a7d94;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}html,body{overflow-x:hidden;}
body{font-family:'Jost',sans-serif;background:var(--wall);color:var(--text);min-height:100vh;}
/* ROOM */
.room-wall{position:fixed;inset:0;z-index:0;will-change:transform;background:radial-gradient(ellipse 110% 70% at 50% 32%,#f8f4ee 0%,#f2ede6 20%,#ebe3d8 45%,#e2d8cc 70%,#d8cec0 100%);}
.room-wall::before{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 28% 100% at 0% 50%,rgba(20,15,10,.1) 0%,transparent 62%),radial-gradient(ellipse 28% 100% at 100% 50%,rgba(20,15,10,.1) 0%,transparent 62%),radial-gradient(ellipse 100% 18% at 50% 0%,rgba(20,15,10,.09) 0%,transparent 52%);}
.room-wall::after{content:'';position:absolute;left:0;right:0;bottom:0;height:26%;background:linear-gradient(to top,#cfc5b5 0%,#d8d0c2 14%,#e0d8ca 30%,rgba(224,216,202,.35) 65%,transparent 100%);border-top:1px solid rgba(180,165,145,.3);}
.room-ceiling{position:fixed;top:0;left:0;right:0;z-index:8;height:20vh;will-change:transform;background:linear-gradient(to bottom,#ddd5c8 0%,#e5ddd2 25%,#ede7de 55%,rgba(237,231,222,.45) 80%,transparent 100%);}
.room-ceiling::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(30,45,74,.12),transparent);}
.track-rail{position:fixed;top:20vh;left:5%;right:5%;z-index:9;height:8px;background:linear-gradient(to bottom,#b0a898,#c4bcb0,#b0a898);border-radius:4px;box-shadow:0 2px 8px rgba(20,15,10,.1),inset 0 1px 0 rgba(255,255,255,.5);will-change:transform;}
.room-floor{position:fixed;bottom:0;left:0;right:0;z-index:8;height:24vh;will-change:transform;overflow:hidden;}
.fp{position:absolute;inset:0;background:repeating-linear-gradient(90deg,#c8b898 0px,#d8c8a8 59px,#b8a888 59px,#c8b898 60px,#ddd0b0 60px,#e8dcc0 119px,#c8b898 119px,#c8b898 120px),linear-gradient(to top,#a09070 0%,#b4a080 18%,#c8b090 40%,#d8c4a4 62%,#e8d8bc 85%,#f0e4cc 100%);background-blend-mode:multiply;}
.fs2{position:absolute;inset:0;background:linear-gradient(to top,rgba(255,250,235,.12) 0%,transparent 65%);animation:fsn 8s ease-in-out infinite alternate;}
@keyframes fsn{0%{opacity:.4;}100%{opacity:1;}}
.fao{position:absolute;top:0;left:0;right:0;height:38%;background:linear-gradient(to bottom,rgba(20,15,10,.07),transparent);}
.baseboard{position:fixed;bottom:24vh;left:0;right:0;z-index:9;height:11px;background:linear-gradient(to top,#c0b8ac,#d0c8bc,#c0b8ac);will-change:transform;}
.baseboard::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(30,45,74,.15),transparent);}
.spots{position:fixed;top:0;left:0;right:0;bottom:0;z-index:2;pointer-events:none;}
.sp-h{position:absolute;top:calc(20vh + 8px);width:14px;height:14px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#fff,#d8d0c4 55%,#a0988c);transform:translateX(-50%);box-shadow:0 0 5px rgba(255,255,255,.7),0 2px 4px rgba(20,15,10,.15);}
.sp-c{position:absolute;top:calc(20vh + 16px);transform:translateX(-50%);width:200px;height:56vh;background:linear-gradient(to bottom,rgba(255,245,215,.16) 0%,rgba(255,240,200,.08) 22%,rgba(255,235,190,.03) 48%,transparent 78%);clip-path:polygon(34% 0%,66% 0%,100% 100%,0% 100%);animation:spB var(--spd,5s) ease-in-out infinite alternate;}
@keyframes spB{0%{opacity:.5;transform:translateX(-50%);}40%{opacity:.88;transform:translateX(-50%) skewX(.5deg);}70%{opacity:.6;transform:translateX(-50%) skewX(-.3deg);}100%{opacity:.55;transform:translateX(-50%);}}
.sp-p{position:absolute;bottom:calc(24vh + 2px);transform:translateX(-50%);width:140px;height:18px;background:radial-gradient(ellipse,rgba(255,245,215,.2) 0%,transparent 70%);border-radius:50%;animation:spB var(--spd,5s) ease-in-out infinite alternate;}
canvas.dust{position:fixed;inset:0;z-index:4;pointer-events:none;}
.vignette{position:fixed;inset:0;z-index:5;pointer-events:none;background:radial-gradient(ellipse 88% 88% at 50% 50%,transparent 42%,rgba(20,15,10,.09) 100%);}
/* HEADER */
.site-header{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:18px 60px;background:linear-gradient(to bottom,rgba(242,237,230,.96) 65%,transparent);backdrop-filter:blur(8px);}
.brand{display:flex;align-items:center;gap:12px;}
.brand-mono{width:32px;height:32px;border:1.5px solid rgba(30,45,74,.18);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;color:var(--navy);}
.brand-name{font-family:'Playfair Display',serif;font-size:17px;font-weight:400;font-style:italic;color:var(--navy);}
.hbtns{display:flex;align-items:center;gap:10px;}
.hbtn{font-family:'Jost',sans-serif;font-size:9px;letter-spacing:.2em;color:var(--text-soft);background:transparent;border:1px solid rgba(30,45,74,.14);border-radius:2px;padding:7px 16px;cursor:pointer;transition:all .25s;text-transform:uppercase;font-weight:500;}
.hbtn:hover{color:var(--navy);border-color:rgba(30,45,74,.3);background:rgba(30,45,74,.04);}
/* Upload button */
.upload-btn{font-family:'Jost',sans-serif;font-size:9px;letter-spacing:.2em;color:white;background:var(--navy);border:none;border-radius:2px;padding:8px 18px;cursor:pointer;position:relative;overflow:hidden;transition:background .3s;font-weight:500;text-transform:uppercase;}
.upload-btn:hover{background:var(--navy2);}
.upload-btn input{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0;}
.upload-btn span{position:relative;z-index:1;}
/* Upload progress */
.upload-progress{position:fixed;top:0;left:0;right:0;z-index:200;height:3px;background:rgba(30,45,74,.1);display:none;}
.upload-progress-bar{height:100%;background:var(--navy);width:0%;transition:width .3s ease;}
.upload-progress.show{display:block;}
/* MUSEUM */
.museum{position:relative;z-index:15;padding:calc(20vh + 55px) 0 calc(24vh + 55px);min-height:100vh;}
.placard{text-align:center;padding:28px 60px 56px;animation:fu .9s ease .1s both;}
.pl-rule{display:flex;align-items:center;gap:18px;justify-content:center;margin-bottom:14px;}
.pl-line{width:60px;height:1px;background:linear-gradient(90deg,transparent,rgba(30,45,74,.18),transparent);}
.pl-orn{font-size:12px;color:var(--slate);opacity:.5;}
.pl-title{font-family:'Playfair Display',serif;font-size:clamp(26px,5vw,48px);font-weight:400;font-style:italic;color:var(--navy);line-height:1.1;}
.pl-title em{color:var(--navy-light);}
.pl-sub{font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;color:var(--text-soft);margin-top:8px;}
.mroom{padding:0 0 75px;}
.rlabel{display:flex;align-items:center;gap:16px;padding:0 60px 34px;}
.rl-num{font-family:'Jost',sans-serif;font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:var(--text-soft);padding:3px 12px;border:1px solid rgba(30,45,74,.12);border-radius:1px;white-space:nowrap;font-weight:500;}
.rl-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(30,45,74,.1),transparent);}
.fwall{display:flex;align-items:flex-end;justify-content:center;gap:clamp(24px,5vw,60px);flex-wrap:wrap;padding:48px 60px 0;}
/* FRAMES */
.pf{position:relative;cursor:pointer;--tilt:0deg;animation:fh .9s cubic-bezier(.22,1,.36,1) var(--fd,.3s) both;transform-origin:top center;}
@keyframes fh{from{opacity:0;transform:rotate(var(--tilt)) translateY(-16px);}to{opacity:1;transform:rotate(var(--tilt)) translateY(0);}}
.pf:hover{z-index:30;}
.pf:hover .pf-outer{transform:rotate(0deg) translateY(-15px) scale(1.04);box-shadow:0 24px 50px rgba(20,15,10,.18);}
.pf-outer{transform:rotate(var(--tilt));transition:transform .45s cubic-bezier(.22,1,.36,1),box-shadow .45s;}
.pf-nail{position:absolute;top:-42px;left:50%;transform:translateX(-50%);width:7px;height:7px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#d8d0c4,#9a9288 55%,#5a5248);box-shadow:0 0 3px rgba(0,0,0,.12),0 1px 3px rgba(0,0,0,.18);z-index:2;}
.pf-wire{position:absolute;top:-38px;left:50%;transform:translateX(-50%);width:65px;height:38px;z-index:1;pointer-events:none;}
.pf-frame{background:linear-gradient(148deg,#c8b878 0%,#906820 16%,#c0b068 32%,#785818 48%,#b8a858 62%,#785818 76%,#b8a858 100%);border-radius:2px;padding:10px;position:relative;box-shadow:2px 2px 0 rgba(0,0,0,.1),5px 5px 0 rgba(0,0,0,.06),0 6px 20px rgba(0,0,0,.12);}
.pf-frame::before{content:'';position:absolute;inset:0;border-radius:2px;z-index:2;pointer-events:none;background:linear-gradient(135deg,rgba(255,240,180,.18) 0%,transparent 42%,rgba(0,0,0,.08) 100%);}
.pf-mat{background:#f5f0e8;position:relative;overflow:hidden;}
.pf-img{display:block;width:100%;height:100%;object-fit:cover;}
.pf-demo{width:100%;height:100%;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.pf-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#f5f0e8;font-size:24px;opacity:.4;}
.pf-glow{position:absolute;top:-65px;left:50%;transform:translateX(-50%);width:250%;height:200px;background:radial-gradient(ellipse,rgba(255,245,210,.12) 0%,transparent 62%);opacity:0;pointer-events:none;z-index:-1;transition:opacity .4s;}
.pf:hover .pf-glow{opacity:1;}
.pf-plate{display:table;margin:8px auto 0;background:var(--navy);padding:4px 14px 5px;border-radius:1px;box-shadow:1px 1px 6px rgba(20,15,10,.15);max-width:calc(100% - 16px);}
.pf-pt{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;color:rgba(240,236,228,.9);letter-spacing:.05em;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
.pf-ps{font-size:9px;color:rgba(180,190,210,.5);letter-spacing:.07em;display:block;}
/* Frame sizes */
.fsm .pf-mat{width:145px;height:125px;}.fmd .pf-mat{width:195px;height:160px;}.flg .pf-mat{width:252px;height:202px;}.fxl .pf-mat{width:310px;height:246px;}.ftall .pf-mat{width:150px;height:212px;}.fwide .pf-mat{width:280px;height:158px;}
/* Arch */
.rarch{display:flex;align-items:center;gap:22px;padding:62px 60px 0;}
.ra-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(30,45,74,.12),transparent);}
.ra-orn{font-size:14px;color:var(--slate);opacity:.3;}
.ra-lbl{font-family:'Jost',sans-serif;font-size:8px;letter-spacing:.28em;text-transform:uppercase;color:rgba(30,45,74,.25);white-space:nowrap;font-weight:500;}
/* Empty */
.empty-wall{text-align:center;padding:80px 60px;}
.ef{width:200px;height:160px;margin:0 auto 24px;border:2px solid rgba(30,45,74,.12);border-radius:2px;background:rgba(30,45,74,.03);display:flex;align-items:center;justify-content:center;font-size:48px;opacity:.2;position:relative;}
.ef::before{content:'';position:absolute;inset:12px;border:1px solid rgba(30,45,74,.08);border-radius:1px;}
.e-txt{font-family:'Playfair Display',serif;font-size:19px;font-style:italic;color:var(--text-soft);line-height:1.75;}
/* Lightbox */
.lb{position:fixed;inset:0;z-index:100;background:rgba(242,237,230,.97);display:none;align-items:center;justify-content:center;flex-direction:column;gap:20px;padding:20px;}
.lb.open{display:flex;}
.lb-f{background:linear-gradient(148deg,#c8b878,#906820,#c0b068,#785818,#b8a858);padding:13px;border-radius:2px;box-shadow:0 24px 70px rgba(20,15,10,.25);max-width:90vw;max-height:82vh;animation:lbI .4s cubic-bezier(.22,1,.36,1) both;position:relative;}
.lb-f::before{content:'';position:absolute;inset:0;border-radius:2px;z-index:2;pointer-events:none;background:linear-gradient(135deg,rgba(255,240,180,.15) 0%,transparent 40%,rgba(0,0,0,.07) 100%);}
@keyframes lbI{from{opacity:0;transform:scale(.9);}to{opacity:1;transform:scale(1);}}
.lb-mat{background:#f5f0e8;padding:8px;}
.lb-img{display:block;max-width:min(82vw,860px);max-height:70vh;object-fit:contain;}
.lb-vid{display:block;max-width:min(82vw,860px);max-height:70vh;}
.lb-plate{background:var(--navy);padding:7px 22px 8px;text-align:center;}
.lb-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:rgba(240,236,228,.9);letter-spacing:.05em;display:block;}
.lb-date{font-size:10px;color:rgba(180,190,210,.45);letter-spacing:.07em;display:block;}
.lb-close{position:fixed;top:22px;right:26px;background:rgba(248,244,238,.95);border:1px solid rgba(30,45,74,.14);border-radius:50%;width:40px;height:40px;font-size:20px;color:var(--text-soft);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.lb-close:hover{color:var(--navy);border-color:rgba(30,45,74,.3);}
.lb-del{font-family:'Jost',sans-serif;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-soft);background:transparent;border:1px solid rgba(30,45,74,.14);border-radius:2px;padding:8px 20px;cursor:pointer;transition:all .25s;font-weight:500;}
.lb-del:hover{color:#904040;border-color:rgba(144,64,64,.25);}
/* Drag hint */
.dh{position:fixed;inset:0;z-index:90;background:rgba(242,237,230,.92);border:2px dashed rgba(30,45,74,.2);display:none;align-items:center;justify-content:center;flex-direction:column;gap:18px;backdrop-filter:blur(8px);}
.dh.show{display:flex;}
.dh-i{font-size:52px;opacity:.3;}.dh-t{font-family:'Playfair Display',serif;font-size:24px;font-style:italic;color:var(--navy);}.dh-s{font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;color:var(--text-soft);}
/* Toast */
.toast{position:fixed;bottom:calc(24vh + 16px);left:50%;transform:translateX(-50%) translateY(12px);background:var(--cream);border:1px solid rgba(30,45,74,.12);border-radius:2px;padding:10px 28px;font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;color:var(--navy);opacity:0;transition:all .3s;z-index:300;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(20,15,10,.1);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.loading-wall{text-align:center;padding:60px;font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:var(--text-soft);}
@keyframes fu{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
@media(max-width:640px){.site-header{padding:14px 20px;}.fwall{padding:40px 20px 0;gap:18px;}.rlabel,.rarch,.empty-wall,.placard{padding-left:20px;padding-right:20px;}.flg .pf-mat,.fxl .pf-mat{width:185px;height:148px;}.fwide .pf-mat{width:192px;height:135px;}}
</style>

/* ── PARALLAX & DUST ── */
const rceil=document.getElementById('rceil'),rtrack=document.getElementById('rtrack'),rfloor=document.getElementById('rfloor'),rbase=document.getElementById('rbase'),rwall=document.getElementById('rwall');
let _tk=false;
window.addEventListener('scroll',()=>{if(!_tk){requestAnimationFrame(()=>{const sy=window.scrollY;rceil.style.transform='translateY('+(sy*.05)+'px)';rtrack.style.transform='translateY('+(sy*.05)+'px)';rfloor.style.transform='translateY('+(-sy*.1)+'px)';rbase.style.transform='translateY('+(-sy*.1)+'px)';rwall.style.transform='translateY('+(sy*.018)+'px)';_tk=false;});_tk=true;}},{passive:true});
(function(){const c=document.getElementById('dust'),ctx=c.getContext('2d');let W,H;function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}resize();window.addEventListener('resize',resize);const sXs=[.11,.24,.38,.52,.66,.80,.91];const ms=[];for(let i=0;i<90;i++)ms.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,r:Math.random()*1.3+.2,vx:(Math.random()-.5)*.18,vy:-(Math.random()*.2+.04),a:Math.random()*.07+.012,ph:Math.random()*Math.PI*2,fr:Math.random()*.006+.002});let t=0;function draw(){ctx.clearRect(0,0,W,H);t+=.008;for(const m of ms){m.x+=m.vx+Math.sin(t*m.fr+m.ph)*.26;m.y+=m.vy;if(m.y<-5){m.y=H+5;m.x=Math.random()*W;}if(m.x<0)m.x=W;if(m.x>W)m.x=0;let a=m.a;const wt=H*.2,wb=H*.76;if(m.y>wt&&m.y<wb){for(const sx of sXs){const cx=sx*W,cw=85,dx2=Math.abs(m.x-cx);if(dx2<cw){const fr=1-dx2/cw,yf=Math.max(0,1-(m.y-wt)/(wb-wt)*.7);a=Math.min(.5,a+fr*yf*.24);}}}ctx.beginPath();ctx.arc(m.x,m.y,m.r,0,Math.PI*2);ctx.fillStyle='rgba(200,185,150,'+a+')';ctx.fill();}requestAnimationFrame(draw);}draw();})();

/* ── DRAG & DROP ── */
let dc=0;
document.addEventListener('dragenter',e=>{e.preventDefault();dc++;document.getElementById('dh').classList.add('show');});
document.addEventListener('dragleave',()=>{dc--;if(dc<=0){dc=0;document.getElementById('dh').classList.remove('show');}});

/* ── UPLOAD TO SUPABASE STORAGE ── */
async function handleFiles(files) {
  const arr = Array.from(files);
  if (!arr.length) return;

  // Show progress bar
  const prog = document.getElementById('uprogress');
  const bar  = document.getElementById('uprogress-bar');
  prog.classList.add('show');
  bar.style.width = '0%';

  let uploaded = 0;

  for (const file of arr) {
    try {
      // Unique file path in storage
      const ext = file.name.split('.').pop();
      const fileType = file.type.startsWith('video') ? 'video' : 'image';
      const path = `${user}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;

      // 1. Upload file to Supabase Storage
      const { error: uploadError } = await db.storage
        .from(BUCKET)
        .upload(path, file, { cacheControl: '3600', upsert: false });

      if (uploadError) throw uploadError;

      // 2. Get public URL
      const { data: urlData } = db.storage.from(BUCKET).getPublicUrl(path);
      const publicUrl = urlData.publicUrl;

      // 3. Save metadata to gallery table
      const { error: dbError } = await db.from('gallery').insert({
        id: Date.now() + '_' + Math.random().toString(36).slice(2),
        name: file.name.replace(/\.[^.]+$/, ''),
        type: fileType,
        path: path,
        url: publicUrl,
        date: new Date().toLocaleDateString([], {month:'long',day:'numeric',year:'numeric'}),
        uploader: user
      });

      if (dbError) throw dbError;

      uploaded++;
      bar.style.width = Math.round((uploaded / arr.length) * 100) + '%';

    } catch (err) {
      console.error('Upload error:', err);
      showToast('Upload failed — check storage bucket ♥');
    }
  }

  setTimeout(() => {
    prog.classList.remove('show');
    bar.style.width = '0%';
  }, 600);

  await render();
  showToast(uploaded === 1 ? 'Memory framed ♥' : `${uploaded} memories framed ♥`);
}

/* ── LOAD ITEMS FROM SUPABASE ── */
async function getItems() {
  try {
    const { data, error } = await db.from('gallery')
      .select('*')
      .order('created_at', { ascending: true });
    if (error) throw error;
    return data || [];
  } catch (e) {
    console.log('Gallery load error:', e);
    return [];
  }
}

/* ── FRAME CONFIG ── */
const SIZES  = ['fmd','flg','fxl','fsm','ftall','fwide','flg','fmd'];
const TILTS  = [-1.7,1.4,-1.0,2.2,-2.4,0.7,1.8,-1.3,0.5,-1.9,1.1,-0.6];
function wireHTML(){
  return `<svg class="pf-wire" viewBox="0 0 65 38" fill="none">
    <path d="M32 2 Q13 17 4 36" stroke="rgba(80,70,45,.22)" stroke-width=".8"/>
    <path d="M32 2 Q52 17 62 36" stroke="rgba(80,70,45,.22)" stroke-width=".8"/>
  </svg>`;
}

/* ── RENDER GALLERY ── */
async function render() {
  const stored = await getItems();
  const demosNeeded = Math.max(0, 6 - stored.length);
  const all = [...stored, ...DEMOS.slice(0, demosNeeded)];
  const root = document.getElementById('groot');

  if (all.length === 0) {
    root.innerHTML = `<div class="mroom"><div class="fwall"><div class="empty-wall">
      <div class="ef">🖼️</div>
      <div class="e-txt">This room waits for your memories.<br><small style="font-size:14px;opacity:.6">Click "+ Add Memory" to begin</small></div>
    </div></div></div>`;
    return;
  }

  // Group into rooms
  const rooms = [];
  let i = 0, pat = [3,2,3,2,4], pi = 0;
  while (i < all.length) {
    const sz = Math.min(pat[pi % pat.length], all.length - i);
    rooms.push(all.slice(i, i + sz));
    i += sz; pi++;
  }

  let gi = 0; const BASE = 0.25;
  root.innerHTML = rooms.map((room, ri) => {
    const fh = room.map(item => {
      const idx  = gi++;
      const size = SIZES[idx % SIZES.length];
      const tilt = TILTS[idx % TILTS.length];
      const fd   = (BASE + idx * 0.13).toFixed(2) + 's';

      let media = '';
      if (item.type === 'demo' || item.svg) {
        media = `<div class="pf-demo">${item.svg}</div>`;
      } else if (item.type === 'video') {
        // Use public URL from Supabase Storage
        media = `<video class="pf-img" src="${item.url}" muted preload="metadata"></video>
          <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:26px;color:rgba(30,45,74,.5);z-index:3">▶</div>`;
      } else {
        // Image from Supabase Storage — use public URL
        media = `<img class="pf-img" src="${item.url}" alt="${esc(item.name)}" loading="lazy">`;
      }

      return `<div class="pf ${size}" style="--tilt:${tilt}deg;--fd:${fd}" onclick="openLB('${item.id}')">
        <div class="pf-nail"></div>
        ${wireHTML()}
        <div class="pf-glow"></div>
        <div class="pf-outer">
          <div class="pf-frame">
            <div class="pf-mat">${media}</div>
          </div>
          <div class="pf-plate">
            <span class="pf-pt">${esc(item.name)}</span>
            <span class="pf-ps">${item.type === 'demo' ? 'demo · add your photo' : (item.date || '')}</span>
          </div>
        </div>
      </div>`;
    }).join('');

    const arch = ri < rooms.length - 1
      ? `<div class="rarch"><div class="ra-line"></div><span class="ra-orn">—</span><span class="ra-lbl">continues</span><div class="ra-line"></div></div>`
      : '';

    return `<div class="mroom">
      <div class="rlabel"><span class="rl-num">Room ${ri + 1}</span><div class="rl-line"></div></div>
      <div class="fwall">${fh}</div>
    </div>${arch}`;
  }).join('');
}

/* ── LIGHTBOX ── */
let lbId = null;
let lbPath = null;

async function openLB(id) {
  const all = [...await getItems(), ...DEMOS];
  const item = all.find(i => i.id === id);
  if (!item) return;
  lbId = id;
  lbPath = item.path || null;

  const img = document.getElementById('lbi');
  const vid = document.getElementById('lbv');
  const exs = document.getElementById('lb-svg');
  if (exs) exs.remove();

  if (item.type === 'demo' || item.svg) {
    img.style.display = 'none'; vid.style.display = 'none';
    const w = document.createElement('div');
    w.id = 'lb-svg'; w.style.cssText = 'width:min(82vw,500px)';
    w.innerHTML = item.svg;
    document.querySelector('.lb-mat').appendChild(w);
  } else if (item.type === 'video') {
    img.style.display = 'none'; vid.style.display = 'block';
    vid.src = item.url;
  } else {
    vid.style.display = 'none'; img.style.display = 'block';
    img.src = item.url;
  }

  document.getElementById('lbt').textContent = item.name;
  document.getElementById('lbd').textContent = item.type === 'demo'
    ? 'Demo · add your own photo'
    : (item.date + ' · ' + (item.uploader || ''));

  document.getElementById('lb').classList.add('open');
}

function closeLB() {
  document.getElementById('lb').classList.remove('open');
  const v = document.getElementById('lbv');
  v.pause(); v.src = '';
  lbId = null; lbPath = null;
}

async function delFromLB() {
  if (!lbId || lbId.startsWith('d')) return;
  if (!confirm('Remove this memory from the gallery?')) return;

  try {
    // Delete from Storage
    if (lbPath) {
      await db.storage.from(BUCKET).remove([lbPath]);
    }
    // Delete metadata from DB
    await db.from('gallery').delete().eq('id', lbId);
  } catch (e) {
    console.error('Delete error:', e);
  }

  closeLB();
  await render();
  showToast('Removed from the gallery');
}

document.getElementById('lb').addEventListener('click', e => {
  if (e.target === document.getElementById('lb')) closeLB();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLB(); });

/* ── REAL-TIME SYNC ── */
db.channel('gallery-rt')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'gallery' }, () => render())
  .subscribe();

/* ── HELPERS ── */
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

render();
</script>
